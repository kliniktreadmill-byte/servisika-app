<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Servisika Management App</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ef4444; }
        
        @media print {
            body * { visibility: hidden; }
            #printable-invoice, #printable-invoice * { visibility: visible; }
            #printable-invoice { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; }
            .no-print { display: none !important; }
        }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800 selection:bg-red-200 selection:text-red-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const SUPABASE_URL = 'https://fpvnlwcjnmfiyrlbhgvi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdm5sd2Nqbm1maXlybGJoZ3ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1ODA0ODksImV4cCI6MjEwMDE1NjQ4OX0.Y5eBJEjxfOEv0ES-LUYfY6aP7zaRIdp5L2XAzvLZLks';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const parseCurrency = (val) => Number(val.toString().replace(/[^0-9]/g, ''));
        const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number || 0);
        const formatNumberStr = (val) => val.toString().replace(/[^0-9]/g, '').replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        
        const getCleanPhone = (phone) => {
            let cleanPhone = (phone || '').replace(/\D/g, ''); 
            if (cleanPhone.startsWith('0')) cleanPhone = '62' + cleanPhone.substring(1);
            if (!cleanPhone.startsWith('62')) cleanPhone = '62' + cleanPhone;
            return cleanPhone;
        };

        const copyToClipboard = (text) => {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert('Link berhasil disalin ke clipboard!');
        };

        const App = () => {
            // App State
            const [isInitialLoading, setIsInitialLoading] = useState(true);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [role, setRole] = useState(null); 
            const [currentUser, setCurrentUser] = useState(null); 
            const [loginError, setLoginError] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            
            // Special Views
            const [isBossView, setIsBossView] = useState(false);
            const [publicInvoiceOrder, setPublicInvoiceOrder] = useState(null);

            // Data State
            const [transactions, setTransactions] = useState([]);
            const [technicians, setTechnicians] = useState([]);
            const [orders, setOrders] = useState([]);

            // Modals & UI State
            const [jadwalView, setJadwalView] = useState('list');
            const [financeFilter, setFinanceFilter] = useState({ search: '', category: 'Semua', startDate: '', endDate: '' });
            const [showOrderModal, setShowOrderModal] = useState(false);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [modalParts, setModalParts] = useState([]); 
            const [showFinanceModal, setShowFinanceModal] = useState(false);
            const [showCashDetailModal, setShowCashDetailModal] = useState({ isOpen: false, type: null });
            const [showTechModal, setShowTechModal] = useState(false);
            
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                const initApp = async () => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const techCode = urlParams.get('tech');
                    const bossParam = urlParams.get('boss');
                    const invoiceId = urlParams.get('invoice');

                    try {
                        // Fetch Data
                        const { data: trxData } = await supabase.from('transactions').select('*').order('date', { ascending: false });
                        if (trxData) setTransactions(trxData);
                        
                        const { data: techData } = await supabase.from('technicians').select('*').order('created_at', { ascending: false });
                        if (techData) setTechnicians(techData);
                        
                        const { data: ordData } = await supabase.from('orders').select('*, order_parts(*)').order('date', { ascending: false });
                        if (ordData) setOrders(ordData);

                        // Routing Logic
                        if (invoiceId) {
                            // Public Invoice View
                            if(ordData) {
                                const foundOrder = ordData.find(o => o.id === invoiceId);
                                if(foundOrder) setPublicInvoiceOrder(foundOrder);
                            }
                            setIsInitialLoading(false);
                            return; // Stop here, render invoice
                        }

                        if (bossParam === 'true') {
                            setIsBossView(true);
                            setIsLoggedIn(true);
                            setRole('bos');
                            setIsInitialLoading(false);
                            return;
                        }
                        
                        if (techCode && techData) {
                            const foundTech = techData.find(t => t.access_code === techCode);
                            if (foundTech) {
                                loginUser('teknisi', foundTech);
                                window.history.replaceState({}, document.title, window.location.pathname);
                                setIsInitialLoading(false);
                                return;
                            }
                        }

                        // Check Local Storage
                        const savedRole = localStorage.getItem('svk_role');
                        const savedUser = localStorage.getItem('svk_user');
                        if (savedRole) {
                            setRole(savedRole);
                            if (savedUser) setCurrentUser(JSON.parse(savedUser));
                            setIsLoggedIn(true);
                        }

                    } catch (error) {
                        console.error("Gagal load data:", error);
                    } finally {
                        setIsInitialLoading(false);
                    }
                };
                initApp();
            }, []);

            const loginUser = (userRole, userData) => {
                setIsLoggedIn(true);
                setRole(userRole);
                setCurrentUser(userData);
                localStorage.setItem('svk_role', userRole);
                if(userData) localStorage.setItem('svk_user', JSON.stringify(userData));
                setLoginError('');
            };

            const handleLogout = () => {
                if(window.confirm('Yakin ingin keluar dari portal?')) {
                    setIsLoggedIn(false);
                    setRole(null);
                    setCurrentUser(null);
                    setActiveTab('dashboard');
                    localStorage.removeItem('svk_role');
                    localStorage.removeItem('svk_user');
                }
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                const pin = e.target.pin.value;
                if(pin === 'serviceika_112') { 
                    loginUser('admin', { name: 'Admin Utama' });
                } else {
                    setLoginError('PIN Admin tidak valid!');
                }
            };

            const handleTechLogin = (e) => {
                e.preventDefault();
                const code = e.target.code.value.trim();
                const foundTech = technicians.find(t => t.access_code === code);
                if(foundTech) {
                    loginUser('teknisi', foundTech);
                } else {
                    setLoginError('Kode akses Teknisi tidak ditemukan!');
                }
            };

            const kasBerjalan = transactions.filter(t => t.category === 'Kas Berjalan').reduce((sum, t) => t.type === 'in' ? sum + Number(t.amount) : sum - Number(t.amount), 0);
            const kasTetap = transactions.filter(t => t.category === 'Kas Tetap').reduce((sum, t) => t.type === 'in' ? sum + Number(t.amount) : sum - Number(t.amount), 0);

            const filteredTransactions = useMemo(() => {
                return transactions.filter(trx => {
                    const matchSearch = trx.description.toLowerCase().includes(financeFilter.search.toLowerCase());
                    const matchCategory = financeFilter.category === 'Semua' || trx.category === financeFilter.category;
                    const matchStart = financeFilter.startDate ? trx.date >= financeFilter.startDate : true;
                    const matchEnd = financeFilter.endDate ? trx.date <= financeFilter.endDate : true;
                    return matchSearch && matchCategory && matchStart && matchEnd;
                });
            }, [transactions, financeFilter]);

            const InvoiceTemplate = ({ order, isStandalone = false }) => {
                const total = (order.order_parts || []).reduce((s, p) => s + Number(p.price), 0);
                return (
                    <div className="bg-white p-8 max-w-3xl mx-auto rounded-xl shadow-lg border border-slate-100 text-slate-800">
                        <div className="flex justify-between border-b-2 border-red-600 pb-6 mb-8">
                            <div>
                                <h1 className="text-3xl font-black text-red-700 m-0">SERVISIKA</h1>
                                <p className="text-slate-500 text-sm mt-1">Layanan Servis Alat Fitness Profesional</p>
                            </div>
                            <div className="text-right">
                                <h2 className="text-2xl font-black text-slate-800 m-0">INVOICE / TAGIHAN</h2>
                                <p className="text-sm font-bold mt-2">No: <span className="text-slate-600 font-medium">{order.order_id_text}</span></p>
                                <p className="text-sm font-bold">Tanggal: <span className="text-slate-600 font-medium">{new Date().toLocaleDateString('id-ID')}</span></p>
                            </div>
                        </div>
                        
                        <div className="flex justify-between mb-8 text-sm">
                            <div>
                                <p className="font-black text-slate-400 uppercase tracking-wider text-[10px] mb-1">Klien (Ditagihkan Kepada):</p>
                                <p className="font-bold text-lg">{order.customer}</p>
                                <p className="text-slate-600 max-w-xs">{order.address}</p>
                                <p className="text-slate-600 mt-1"><i className="fa-brands fa-whatsapp text-emerald-500"></i> {order.phone}</p>
                            </div>
                            <div className="text-right">
                                <p className="font-black text-slate-400 uppercase tracking-wider text-[10px] mb-1">Detail Pengerjaan:</p>
                                <p className="font-bold">{order.unit}</p>
                                <p className="text-slate-600">Teknisi: {order.technician_name}</p>
                            </div>
                        </div>

                        <table className="w-full mb-8 text-left text-sm">
                            <thead>
                                <tr className="bg-slate-100 text-slate-600">
                                    <th className="p-3 font-bold border-b-2 border-slate-200">Deskripsi (Jasa & Sparepart)</th>
                                    <th className="p-3 font-bold border-b-2 border-slate-200 text-center">Garansi</th>
                                    <th className="p-3 font-bold border-b-2 border-slate-200 text-right">Harga (Rp)</th>
                                </tr>
                            </thead>
                            <tbody>
                                {(order.order_parts || []).map((p, i) => (
                                    <tr key={i} className="border-b border-slate-100">
                                        <td className="p-3 font-medium">{p.name}</td>
                                        <td className="p-3 text-center text-slate-500">{p.warranty_months > 0 ? `${p.warranty_months} Bulan` : '-'}</td>
                                        <td className="p-3 text-right font-medium">{formatRupiah(p.price)}</td>
                                    </tr>
                                ))}
                                <tr className="border-t-2 border-slate-800">
                                    <td colSpan="2" className="p-4 text-right font-black text-lg">TOTAL TAGIHAN:</td>
                                    <td className="p-4 text-right font-black text-xl text-red-700">{formatRupiah(total)}</td>
                                </tr>
                            </tbody>
                        </table>

                        <div className="flex flex-col sm:flex-row justify-between gap-6 border-t border-slate-200 pt-6">
                            <div className="bg-slate-50 p-4 rounded-xl flex-1 border border-slate-100">
                                <p className="font-black text-xs text-slate-500 uppercase tracking-wider mb-2">Informasi Pembayaran</p>
                                <p className="text-sm font-medium mb-2">Metode Pembayaran: <span className="font-bold text-slate-800">Transfer / Cash</span></p>
                                <div className="bg-white border border-slate-200 p-3 rounded-lg mt-2">
                                    <p className="font-black text-blue-800 text-lg">BCA: 638 - 042 - 8651</p>
                                    <p className="text-sm font-bold text-slate-600">A.n: Saepul Anwar</p>
                                </div>
                            </div>
                            
                            <div className="flex-1 flex flex-col items-center justify-center pt-4">
                                <p className="text-sm font-bold text-slate-600 mb-16">Hormat Kami,</p>
                                {/* Placeholder for signature image */}
                                <div className="w-32 h-16 border-b-2 border-slate-300 border-dashed relative flex items-center justify-center opacity-50 mb-2">
                                    <span className="text-[10px] text-slate-400 font-bold uppercase">(Tanda Tangan)</span>
                                </div>
                                <p className="font-bold text-slate-800">Admin Servisika</p>
                            </div>
                        </div>
                        
                        {isStandalone && (
                            <div className="mt-8 text-center no-print">
                                <button onClick={() => window.print()} className="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2 mx-auto">
                                    <i className="fa-solid fa-print"></i> Cetak / Simpan PDF
                                </button>
                                <p className="text-xs text-slate-400 mt-4">Gunakan fitur Print browser Anda dan pilih "Save as PDF".</p>
                            </div>
                        )}
                    </div>
                );
            };

            const handlePrintInvoice = (order) => {
                const printContent = ReactDOMServer.renderToString(<InvoiceTemplate order={order} isStandalone={false} />);
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                    <head>
                        <title>Invoice - ${order.order_id_text}</title>
                        <script src="https://cdn.tailwindcss.com"><\/script>
                        <style>
                            body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; }
                            @media print { body { padding: 0; background: white; } }
                        </style>
                    </head>
                    <body>${printContent}</body>
                    <script>window.onload = () => { setTimeout(() => { window.print(); }, 500); }<\/script>
                    </html>
                `);
                printWindow.document.close();
            };

            const generateInvoiceLink = (orderId) => {
                const appUrl = window.location.origin + window.location.pathname;
                return `${appUrl}?invoice=${orderId}`;
            };

            const handleSaveUpdateOrder = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const formData = new FormData(e.target);
                const status = formData.get('status');
                const notes = formData.get('notes');
                
                // Admin can edit core info
                const customer = formData.get('customer') || selectedOrder.customer;
                const address = formData.get('address') || selectedOrder.address;
                const phone = formData.get('phone') || selectedOrder.phone;
                const date = formData.get('date') || selectedOrder.date;

                try {
                    await supabase.from('orders').update({ status, notes, customer, address, phone, date }).eq('id', selectedOrder.id);
                    
                    await supabase.from('order_parts').delete().eq('order_id', selectedOrder.id);
                    const partsToInsert = modalParts.filter(p => p.name.trim() !== '').map(p => ({
                        order_id: selectedOrder.id,
                        name: p.name,
                        price: parseCurrency(p.price),
                        warranty_months: Number(p.warranty_months || 0)
                    }));
                    if(partsToInsert.length > 0) {
                        await supabase.from('order_parts').insert(partsToInsert);
                    }

                    if(status === 'Lunas' && selectedOrder.status !== 'Lunas' && role === 'admin') {
                        const totalAmount = partsToInsert.reduce((sum, p) => sum + p.price, 0);
                        if(totalAmount > 0) {
                            const newTrx = {
                                date: new Date().toISOString().split('T')[0],
                                type: 'in', category: 'Kas Berjalan',
                                amount: totalAmount, description: `Pelunasan Order: ${customer} (${selectedOrder.order_id_text})`
                            };
                            const { data } = await supabase.from('transactions').insert([newTrx]).select();
                            if(data) setTransactions([data[0], ...transactions]);
                        }
                    }

                    const { data: ordData } = await supabase.from('orders').select('*, order_parts(*)').order('date', { ascending: false });
                    if(ordData) setOrders(ordData);
                    setShowOrderModal(false);
                    alert('Data Pengerjaan berhasil diperbarui!');
                } catch (error) {
                    console.error("Gagal simpan:", error);
                    alert('Gagal menyimpan data.');
                } finally {
                    setIsSaving(false);
                }
            };
            
            const handleDeleteOrder = async (id) => {
                if(window.confirm('YAKIN INGIN MENGHAPUS ORDER INI? Data invoice akan hilang permanen.')) {
                    await supabase.from('orders').delete().eq('id', id);
                    setOrders(orders.filter(o => o.id !== id));
                    setShowOrderModal(false);
                }
            };

            const handleAddTransaction = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const formData = new FormData(e.target);
                const newTrx = {
                    date: formData.get('date'), type: formData.get('type'),
                    category: formData.get('category'), amount: parseCurrency(formData.get('amount')),
                    description: formData.get('desc')
                };
                const { data, error } = await supabase.from('transactions').insert([newTrx]).select();
                if (!error && data) {
                    setTransactions([data[0], ...transactions]);
                    setShowFinanceModal(false);
                }
                setIsSaving(false);
            };

            const handleDeleteTransaction = async (id) => {
                if(window.confirm('Yakin ingin menghapus mutasi ini? Saldo otomatis menyesuaikan.')) {
                    await supabase.from('transactions').delete().eq('id', id);
                    setTransactions(transactions.filter(t => t.id !== id));
                }
            };

            const handleAddTechnician = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const formData = new FormData(e.target);
                const randomCode = 'tech_' + Math.random().toString(36).substring(2, 8);
                const newTech = { name: formData.get('name'), phone: formData.get('phone'), access_code: randomCode };
                
                const { data, error } = await supabase.from('technicians').insert([newTech]).select();
                if (!error && data) {
                    setTechnicians([data[0], ...technicians]);
                    setShowTechModal(false);
                }
                setIsSaving(false);
            };

            const handleCreateOrder = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const formData = new FormData(e.target);
                const newOrder = {
                    date: formData.get('date'), customer: formData.get('customer'),
                    phone: formData.get('phone'), address: formData.get('address'),
                    unit: formData.get('unit'), issue: formData.get('issue'),
                    technician_name: formData.get('technician'), status: 'Proses',
                    order_id_text: 'ORD-' + Math.floor(Math.random() * 10000)
                };
                const { data, error } = await supabase.from('orders').insert([newOrder]).select();
                if (!error && data) {
                    const defaultPart = { order_id: data[0].id, name: 'Jasa Kunjungan & Pengecekan', price: 250000, warranty_months: 0 };
                    await supabase.from('order_parts').insert([defaultPart]);
                    const { data: ordData } = await supabase.from('orders').select('*, order_parts(*)').order('date', { ascending: false });
                    if(ordData) setOrders(ordData);
                    setShowOrderModal(false);
                }
                setIsSaving(false);
            };

            if (isInitialLoading) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center">
                        <i className="fa-solid fa-circle-notch fa-spin text-4xl text-red-600 mb-4"></i>
                        <p className="font-bold text-slate-500 animate-pulse tracking-wide">Menghubungkan ke Sistem...</p>
                    </div>
                );
            }

            // Public Invoice View
            if (publicInvoiceOrder) {
                return (
                    <div className="min-h-screen bg-slate-100 p-4 sm:p-8 flex items-center justify-center fade-in">
                        <div className="w-full">
                            <InvoiceTemplate order={publicInvoiceOrder} isStandalone={true} />
                        </div>
                    </div>
                );
            }

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 fade-in">
                        <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-red-600"></div>
                            <div className="text-center mb-8 pt-2">
                                <div className="bg-red-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                                    <i className="fa-solid fa-wrench text-2xl text-red-600"></i>
                                </div>
                                <h1 className="text-3xl font-black text-slate-800 tracking-tight">SERVISIKA</h1>
                                <p className="text-slate-500 text-sm mt-1 font-medium">Portal Operasional & Lapangan</p>
                            </div>
                            
                            {loginError && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm font-bold text-center mb-6 border border-red-100 animate-pulse"><i className="fa-solid fa-circle-exclamation mr-1"></i> {loginError}</div>}
                            
                            <div className="space-y-6">
                                <form onSubmit={handleAdminLogin} className="bg-slate-50 p-5 rounded-xl border border-slate-200 focus-within:border-slate-400 transition-colors shadow-sm">
                                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3"><i className="fa-solid fa-shield-halved mr-1"></i> Akses Admin (Kantor)</h3>
                                    <div className="flex gap-2">
                                        <input type="password" name="pin" placeholder="Masukkan PIN Rahasia" required className="flex-1 p-3 rounded-lg border border-slate-300 outline-none focus:border-slate-500 text-sm font-bold text-center" />
                                        <button type="submit" className="bg-slate-800 hover:bg-slate-900 text-white px-5 rounded-lg font-bold text-sm transition-colors shadow-md">Masuk</button>
                                    </div>
                                </form>

                                <div className="relative flex items-center py-2">
                                    <div className="flex-grow border-t border-slate-200"></div>
                                    <span className="flex-shrink-0 mx-4 text-slate-400 text-[10px] font-black uppercase tracking-widest">Atau</span>
                                    <div className="flex-grow border-t border-slate-200"></div>
                                </div>

                                <form onSubmit={handleTechLogin} className="bg-red-50/50 p-5 rounded-xl border border-red-100 focus-within:border-red-300 transition-colors">
                                    <h3 className="text-xs font-bold text-red-500 uppercase tracking-wider mb-3 text-center"><i className="fa-solid fa-helmet-safety mr-1"></i> Akses Teknisi (Lapangan)</h3>
                                    <input type="text" name="code" placeholder="Kode Akses (cth: tech_abc)" required className="w-full p-3 rounded-lg border border-red-200 outline-none focus:border-red-400 text-sm font-bold text-center mb-3 bg-white" />
                                    <button type="submit" className="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg font-bold text-sm transition-colors shadow-md">Buka Portal Teknisi</button>
                                    <p className="text-[10px] text-slate-400 text-center mt-3 font-medium">Klik link dari WhatsApp untuk login otomatis.</p>
                                </form>
                            </div>
                        </div>
                    </div>
                )

                    )}

                    {/* 2. Modal Form Order Baru (Khusus Admin) */}
                    {showOrderModal && !selectedOrder && role === 'admin' && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden border border-slate-200">
                                <div className="bg-slate-50 border-b border-slate-200 p-5 flex justify-between items-center">
                                    <h3 className="font-black text-xl text-slate-800 flex items-center gap-2"><i className="fa-solid fa-file-circle-plus text-red-600"></i> Buat Order Baru</h3>
                                    <button onClick={() => setShowOrderModal(false)} className="text-slate-400 hover:text-slate-800 bg-white p-2 rounded-full border border-slate-200 shadow-sm"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleCreateOrder} className="p-6 space-y-4 max-h-[70vh] overflow-y-auto">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Tgl Penjadwalan</label><input type="date" name="date" required defaultValue={new Date().toISOString().split('T')[0]} className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-red-500 text-slate-700 bg-slate-50" /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Nama Klien/Instansi</label><input type="text" name="customer" required placeholder="Cth: Budi / PT Maju" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-red-500 text-slate-800" /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">No. WhatsApp</label><input type="text" name="phone" required placeholder="0812..." className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-red-500 text-slate-800" /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Tipe Alat & Kendala</label>
                                        <div className="space-y-2">
                                            <input type="text" name="unit" required placeholder="Tipe Alat (Treadmill, Sepeda...)" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-red-500 text-slate-800" />
                                            <textarea name="issue" required placeholder="Detail kendala yang dilaporkan..." rows="2" className="w-full border-2 border-slate-200 p-3 rounded-xl font-medium outline-none focus:border-red-500 text-slate-800 resize-none"></textarea>
                                        </div>
                                    </div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Alamat Lokasi</label><textarea name="address" required placeholder="Alamat lengkap..." rows="2" className="w-full border-2 border-slate-200 p-3 rounded-xl font-medium outline-none focus:border-red-500 text-slate-800 resize-none"></textarea></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Pilih Teknisi</label>
                                        <select name="technician" required className="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold outline-none focus:border-red-500 cursor-pointer bg-slate-50 text-slate-800">
                                            <option value="">-- Tugaskan ke Teknisi --</option>
                                            {technicians.map(t => <option key={t.id} value={t.name}>{t.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="pt-2 border-t border-slate-100">
                                        <button type="submit" disabled={isSaving} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95 disabled:opacity-50">
                                            {isSaving ? 'Menyimpan...' : 'Simpan & Buat Order'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 3. Modal Tambah Transaksi Kas */}
                    {showFinanceModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden border border-slate-200">
                                <div className="bg-emerald-50 border-b border-emerald-100 p-5 flex justify-between items-center">
                                    <h3 className="font-black text-xl text-emerald-800 flex items-center gap-2"><i className="fa-solid fa-file-invoice-dollar"></i> Catat Transaksi</h3>
                                    <button onClick={() => setShowFinanceModal(false)} className="text-emerald-600 hover:text-emerald-800 bg-white p-2 rounded-full border border-emerald-200 shadow-sm"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleAddTransaction} className="p-6 space-y-4">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Tgl Transaksi</label><input type="date" name="date" required defaultValue={new Date().toISOString().split('T')[0]} className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-emerald-500 text-slate-700 bg-slate-50" /></div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Jenis</label>
                                            <select name="type" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-emerald-500 bg-slate-50 cursor-pointer text-slate-700">
                                                <option value="in">Pemasukan (+)</option>
                                                <option value="out">Pengeluaran (-)</option>
                                            </select>
                                        </div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Kategori Kas</label>
                                            <select name="category" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-emerald-500 bg-slate-50 cursor-pointer text-slate-700">
                                                <option value="Kas Berjalan">Kas Berjalan</option>
                                                <option value="Kas Tetap">Kas Tetap</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Nominal Rupiah</label>
                                        <div className="relative">
                                            <span className="absolute left-4 top-[17px] text-slate-400 font-black text-lg">Rp</span>
                                            <input type="text" name="amount" required onChange={(e) => e.target.value = formatNumberStr(e.target.value)} placeholder="0" className="w-full border-2 border-slate-200 p-4 pl-12 rounded-xl font-black text-2xl outline-none focus:border-emerald-500 text-slate-800" />
                                        </div>
                                    </div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Keterangan Lengkap</label><input type="text" name="desc" required placeholder="Cth: Beli oli mesin, Uang makan..." className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-emerald-500 text-slate-800" /></div>
                                    <div className="pt-2 border-t border-slate-100">
                                        <button type="submit" disabled={isSaving} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95 disabled:opacity-50">
                                            {isSaving ? 'Menyimpan...' : 'Simpan Transaksi'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 4. Modal Detail Kas Khusus (Popup Filter) */}
                    {showCashDetailModal.isOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-2xl w-full max-w-3xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden border border-slate-200">
                                <div className={`p-6 flex justify-between items-center shrink-0 text-white ${showCashDetailModal.type === 'Kas Berjalan' ? 'bg-blue-600' : 'bg-red-600'}`}>
                                    <div><p className="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">Riwayat Filter</p><h3 className="font-black text-2xl">{showCashDetailModal.type}</h3></div>
                                    <button onClick={() => setShowCashDetailModal({ isOpen: false, type: null })} className="bg-black/20 hover:bg-black/30 p-2.5 rounded-full transition-colors"><i className="fa-solid fa-xmark text-lg px-1"></i></button>
                                </div>
                                <div className="overflow-y-auto flex-1 bg-slate-50">
                                    <div className="divide-y divide-slate-200 bg-white">
                                        {transactions.filter(t => t.category === showCashDetailModal.type).map(trx => (
                                            <div key={trx.id} className="p-4 sm:p-5 flex justify-between items-center hover:bg-slate-50 transition-colors group">
                                                <div>
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1"><i className="fa-regular fa-calendar mr-1"></i> {new Date(trx.date).toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})}</p>
                                                    <p className="font-bold text-slate-800 text-sm">{trx.description}</p>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <div className={`font-black text-base sm:text-lg ${trx.type === 'in' ? 'text-green-600' : 'text-red-600'}`}>
                                                        {trx.type === 'in' ? '+' : '-'}{formatRupiah(trx.amount)}
                                                    </div>
                                                    <button onClick={() => handleDeleteTransaction(trx.id)} className="text-slate-400 hover:text-red-600 p-2 bg-slate-50 hover:bg-red-50 border border-transparent hover:border-red-100 rounded-lg transition-all shadow-sm active:scale-95"><i className="fa-solid fa-trash"></i></button>
                                                </div>
                                            </div>
                                        ))}
                                        {transactions.filter(t => t.category === showCashDetailModal.type).length === 0 && <div className="py-16 text-center text-slate-400 font-medium"><i className="fa-solid fa-folder-open text-4xl mb-3 opacity-30 block"></i>Belum ada transaksi khusus di kas ini.</div>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );

            return (
                <div className="h-screen w-full flex overflow-hidden">
                    <Navigation />
                    <div className={`flex-1 flex flex-col h-full overflow-hidden relative bg-slate-50/50 ${isBossView ? '' : 'md:ml-64'}`}>
                        {!isBossView && (
                            <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 sm:px-6 py-4 flex items-center justify-between z-40 sticky top-0 no-print shadow-sm">
                                <div className="flex items-center gap-4">
                                    <button className="md:hidden text-slate-600 bg-slate-100 hover:bg-slate-200 p-2.5 rounded-xl transition-colors active:scale-95" onClick={() => setIsMobileMenuOpen(true)}><i className="fa-solid fa-bars-staggered text-xl"></i></button>
                                    <div>
                                        <h1 className="text-lg sm:text-xl font-black text-slate-800 leading-none mb-1">{role === 'admin' ? 'Portal Manajemen' : 'Aplikasi Teknisi'}</h1>
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                    </div>
                                </div>
                            </header>
                        )}
                        
                        <main className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 pb-24 no-print relative">
                            {role === 'admin' && activeTab === 'dashboard' && renderDashboard()}
                            {role === 'admin' && activeTab === 'jadwal' && renderJadwal()}
                            {role === 'admin' && activeTab === 'keuangan' && renderKeuangan()}
                            {role === 'admin' && activeTab === 'tim' && renderTim()}
                            
                            {role === 'bos' && activeTab === 'dashboard' && renderDashboard()}
                            
                            {role === 'teknisi' && renderTeknisiPortal()}
                        </main>
                    </div>
                    {renderModals()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
