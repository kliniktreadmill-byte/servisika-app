<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servisika Management App</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ef4444; }
        body { -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
    </style>
</head>
<body class="text-slate-800 font-sans selection:bg-red-200 selection:text-red-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SUPABASE_URL = 'https://fpvnlwcjnmfiyrlbhgvi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdm5sd2Nqbm1maXlybGJoZ3ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1ODA0ODksImV4cCI6MjEwMDE1NjQ4OX0.Y5eBJEjxfOEv0ES-LUYfY6aP7zaRIdp5L2XAzvLZLks';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [role, setRole] = useState('admin');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [techAccessCode, setTechAccessCode] = useState(''); // Simulasi login teknisi

            // State Data Database
            const [transactions, setTransactions] = useState([]);
            const [technicians, setTechnicians] = useState([]);
            const [orders, setOrders] = useState([]);

            // State UI & Filter
            const [dashView, setDashView] = useState('mingguan'); // Dashboard jadwal view
            const [jadwalView, setJadwalView] = useState('list'); // list atau calendar
            
            // State Filter Arus Kas
            const [financeFilter, setFinanceFilter] = useState({ search: '', category: 'Semua', startDate: '', endDate: '' });

            // State Modals
            const [showOrderModal, setShowOrderModal] = useState(false);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [showFinanceModal, setShowFinanceModal] = useState(false);
            const [showCashDetailModal, setShowCashDetailModal] = useState({ isOpen: false, type: null });
            const [showTechModal, setShowTechModal] = useState(false);

            // Fetch Data saat aplikasi dimuat
            useEffect(() => {
                fetchAllData();
            }, []);

            const fetchAllData = async () => {
                setIsLoading(true);
                try {
                    // Ambil Transaksi
                    const { data: trxData } = await supabase.from('transactions').select('*').order('date', { ascending: false });
                    if (trxData) setTransactions(trxData);

                    // Ambil Teknisi
                    const { data: techData } = await supabase.from('technicians').select('*').order('created_at', { ascending: false });
                    if (techData) setTechnicians(techData);

                    // Ambil Order + Parts nya sekalian
                    const { data: ordData } = await supabase.from('orders').select('*, order_parts(*)').order('date', { ascending: false });
                    if (ordData) setOrders(ordData);
                } catch (error) {
                    console.error("Gagal load data:", error);
                } finally {
                    setIsLoading(false);
                }
            };

            const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number || 0);

            const kasBerjalan = transactions.filter(t => t.category === 'Kas Berjalan').reduce((sum, t) => t.type === 'in' ? sum + Number(t.amount) : sum - Number(t.amount), 0);
            const kasTetap = transactions.filter(t => t.category === 'Kas Tetap').reduce((sum, t) => t.type === 'in' ? sum + Number(t.amount) : sum - Number(t.amount), 0);

            const filteredTransactions = useMemo(() => {
                return transactions.filter(trx => {
                    const matchSearch = trx.description.toLowerCase().includes(financeFilter.search.toLowerCase());
                    const matchCategory = financeFilter.category === 'Semua' || trx.category === financeFilter.category;
                    const matchStart = financeFilter.startDate ? trx.date >= financeFilter.startDate : true;
                    const matchEnd = financeFilter.endDate ? trx.date <= financeFilter.endDate : true;
                    return matchSearch && matchCategory && matchStart && matchEnd;
                });
            }, [transactions, financeFilter]);

            const handleAddTransaction = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newTrx = {
                    date: formData.get('date'), type: formData.get('type'),
                    category: formData.get('category'), amount: parseFloat(formData.get('amount')),
                    description: formData.get('desc')
                };
                const { data, error } = await supabase.from('transactions').insert([newTrx]).select();
                if (!error && data) {
                    setTransactions([data[0], ...transactions]);
                    setShowFinanceModal(false);
                }
            };

            const handleDeleteTransaction = async (id) => {
                if(window.confirm('Yakin ingin menghapus mutasi ini? Saldo otomatis menyesuaikan.')) {
                    await supabase.from('transactions').delete().eq('id', id);
                    setTransactions(transactions.filter(t => t.id !== id));
                }
            };

            const handleAddTechnician = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const randomCode = 'tech_' + Math.random().toString(36).substring(2, 8);
                const newTech = { name: formData.get('name'), phone: formData.get('phone'), access_code: randomCode };
                
                const { data, error } = await supabase.from('technicians').insert([newTech]).select();
                if (!error && data) {
                    setTechnicians([data[0], ...technicians]);
                    setShowTechModal(false);
                }
            };

            const handleDeleteTechnician = async (id) => {
                if(window.confirm('Hapus akses teknisi ini?')) {
                    await supabase.from('technicians').delete().eq('id', id);
                    setTechnicians(technicians.filter(t => t.id !== id));
                }
            };

            // Order Management (Buat baru)
            const handleCreateOrder = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newOrder = {
                    date: formData.get('date'), customer: formData.get('customer'),
                    phone: formData.get('phone'), address: formData.get('address'),
                    unit: formData.get('unit'), issue: formData.get('issue'),
                    technician_name: formData.get('technician'), status: 'Proses',
                    order_id_text: 'ORD-' + Math.floor(Math.random() * 10000)
                };
                const { data, error } = await supabase.from('orders').insert([newOrder]).select();
                if (!error && data) {
                    // Beri default part "Jasa Layanan Kunjungan" 250rb
                    const defaultPart = { order_id: data[0].id, name: 'Jasa Kunjungan & Pengecekan', price: 250000, warranty_months: 0 };
                    await supabase.from('order_parts').insert([defaultPart]);
                    fetchAllData(); // Refresh to get relations
                    setShowOrderModal(false);
                }
            };

            // Tombol "Set Lunas" (Otomatis masuk kas)
            const handleSetLunas = async (order) => {
                if(window.confirm(`Set status order ${order.customer} menjadi LUNAS?\n\nDana akan otomatis masuk ke Kas Berjalan.`)) {
                    // Hitung total dari parts
                    const totalAmount = (order.order_parts || []).reduce((sum, p) => sum + Number(p.price), 0);
                    
                    // 1. Update Order Status
                    await supabase.from('orders').update({ status: 'Lunas' }).eq('id', order.id);
                    
                    // 2. Insert ke Kas Berjalan
                    if(totalAmount > 0) {
                        const newTrx = {
                            date: new Date().toISOString().split('T')[0],
                            type: 'in', category: 'Kas Berjalan',
                            amount: totalAmount, description: `Pelunasan Order: ${order.customer} (${order.order_id_text || 'Tanpa ID'})`
                        };
                        await supabase.from('transactions').insert([newTrx]);
                    }
                    
                    setShowOrderModal(false);
                    fetchAllData(); // Refresh Data
                }
            };

            const Navigation = () => (
                <div className={`fixed inset-y-0 left-0 z-50 w-64 bg-red-700 text-white transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 transition-transform duration-300 shadow-2xl flex flex-col`}>
                    <div className="p-6 flex items-center justify-between border-b border-red-600/50">
                        <div className="flex items-center gap-3">
                            <i className="fa-solid fa-wrench text-xl bg-white/20 p-2 rounded-lg"></i>
                            <h1 className="text-xl font-black tracking-tight">SERVISIKA</h1>
                        </div>
                        <button className="md:hidden text-white/70 hover:text-white" onClick={() => setIsMobileMenuOpen(false)}>
                            <i className="fa-solid fa-xmark text-2xl"></i>
                        </button>
                    </div>

                    <div className="p-4 flex-1 overflow-y-auto">
                        <p className="text-red-200 text-[10px] font-bold uppercase tracking-wider mb-4 px-3">Menu {role === 'admin' ? 'Utama' : 'Teknisi'}</p>
                        <ul className="space-y-2">
                            {role === 'admin' ? (
                                <>
                                    {[{ id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard' },
                                      { id: 'jadwal', icon: 'fa-calendar-days', label: 'Jadwal & Order' },
                                      { id: 'keuangan', icon: 'fa-wallet', label: 'Arus Kas' },
                                      { id: 'tim', icon: 'fa-user-group', label: 'Tim Teknisi' }].map(item => (
                                        <li key={item.id}>
                                            <button onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === item.id ? 'bg-white text-red-700 shadow-md font-bold' : 'text-red-100 hover:bg-red-600/50 font-medium'}`}>
                                                <i className={`fa-solid ${item.icon} w-5 text-center`}></i> <span className="text-sm">{item.label}</span>
                                            </button>
                                        </li>
                                    ))}
                                </>
                            ) : (
                                <>
                                    <li>
                                        <button onClick={() => { setActiveTab('dashboard'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'dashboard' ? 'bg-white text-red-700 shadow-md font-bold' : 'text-red-100 hover:bg-red-600/50 font-medium'}`}>
                                            <i className="fa-solid fa-clipboard-list w-5 text-center"></i> <span className="text-sm">Tugas Saya</span>
                                        </button>
                                    </li>
                                </>
                            )}
                        </ul>
                    </div>
                    
                    <div className="p-5 border-t border-red-600/50 bg-red-800/30 mt-auto">
                        <button onClick={() => { setRole(role === 'admin' ? 'teknisi' : 'admin'); setActiveTab('dashboard'); }} className="w-full text-[11px] bg-red-900/50 hover:bg-red-900 text-white py-3 rounded-xl transition-colors font-bold border border-red-500/30">
                            <i className="fa-solid fa-repeat mr-1"></i> Simulasi: Ganti ke {role === 'admin' ? 'Teknisi' : 'Admin'}
                        </button>
                    </div>
                </div>
            );

            const renderDashboard = () => (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div><h2 className="text-2xl sm:text-3xl font-black text-slate-800">Overview</h2><p className="text-slate-500 text-sm mt-1">Ringkasan operasional Servisika.</p></div>
                        <button onClick={() => alert('Fitur berbagi laporan Bos (Read-Only) akan dibuat pada tahap update khusus analitik!')} className="w-full sm:w-auto bg-white border border-slate-200 text-slate-700 px-4 py-2.5 rounded-xl text-sm font-bold flex justify-center items-center gap-2 hover:bg-slate-50 shadow-sm">
                            <i className="fa-solid fa-arrow-up-right-from-square"></i> Link Laporan Bos
                        </button>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="glass-panel p-5 rounded-2xl flex items-center gap-4">
                            <div className="bg-blue-100 p-4 rounded-xl text-blue-600 shrink-0"><i className="fa-solid fa-wrench text-xl"></i></div>
                            <div><p className="text-xs text-slate-500 font-bold uppercase">Order Aktif</p><h3 className="text-2xl font-black text-slate-800">{orders.filter(o=>o.status==='Proses' || o.status==='Pending').length}</h3></div>
                        </div>
                        <div className="glass-panel p-5 rounded-2xl flex items-center gap-4">
                            <div className="bg-green-100 p-4 rounded-xl text-green-600 shrink-0"><i className="fa-solid fa-check text-xl"></i></div>
                            <div><p className="text-xs text-slate-500 font-bold uppercase">Selesai/Lunas</p><h3 className="text-2xl font-black text-slate-800">{orders.filter(o=>o.status==='Selesai' || o.status==='Lunas').length}</h3></div>
                        </div>
                        <div className="glass-panel p-5 rounded-2xl flex items-center gap-4">
                            <div className="bg-red-100 p-4 rounded-xl text-red-600 shrink-0"><i className="fa-solid fa-triangle-exclamation text-xl"></i></div>
                            <div><p className="text-xs text-slate-500 font-bold uppercase">Kendala/Pending</p><h3 className="text-2xl font-black text-slate-800">{orders.filter(o=>o.status==='Pending').length}</h3></div>
                        </div>
                        <div className="glass-panel p-5 rounded-2xl flex items-center gap-4">
                            <div className="bg-emerald-100 p-4 rounded-xl text-emerald-600 shrink-0"><i className="fa-solid fa-money-bill-wave text-xl"></i></div>
                            <div className="overflow-hidden">
                                <p className="text-xs text-slate-500 font-bold uppercase truncate">Kas Berjalan</p>
                                <h3 className="text-lg font-black text-slate-800 truncate">{formatRupiah(kasBerjalan)}</h3>
                            </div>
                        </div>
                    </div>

                    <div className="glass-panel rounded-2xl p-5">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                            <h3 className="font-bold text-slate-800">Ringkasan Pengerjaan</h3>
                            <div className="flex items-center gap-3 w-full sm:w-auto">
                                <select value={dashView} onChange={(e)=>setDashView(e.target.value)} className="bg-slate-100 border-none text-xs font-bold p-2 rounded-lg outline-none cursor-pointer">
                                    <option value="hari_ini">Hari Ini</option>
                                    <option value="mingguan">Minggu Ini</option>
                                </select>
                                <button onClick={() => setActiveTab('jadwal')} className="text-xs text-red-600 font-bold hover:underline">Lihat Semua &rarr;</button>
                            </div>
                        </div>
                        <div className="space-y-3">
                            {orders.slice(0, 3).map(o => (
                                <div key={o.id} className="flex justify-between items-center p-3 hover:bg-slate-50 rounded-xl transition-colors border border-slate-100">
                                    <div className="flex gap-3 items-center">
                                        <div className={`w-2 h-10 rounded-full ${o.status === 'Proses' ? 'bg-yellow-400' : o.status === 'Lunas' ? 'bg-green-500' : 'bg-blue-400'}`}></div>
                                        <div>
                                            <p className="font-bold text-sm text-slate-800">{o.customer}</p>
                                            <p className="text-xs text-slate-500">{o.unit} • <span className="font-medium text-red-500">{o.technician_name}</span></p>
                                        </div>
                                    </div>
                                    <span className="text-[10px] bg-slate-100 px-2 py-1 rounded font-bold">{o.date}</span>
                                </div>
                            ))}
                            {orders.length === 0 && <p className="text-center text-slate-400 text-sm py-5">Belum ada data pengerjaan.</p>}
                        </div>
                    </div>
                </div>
            );

            const renderJadwal = () => (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div><h2 className="text-2xl sm:text-3xl font-black text-slate-800">Jadwal & Order</h2><p className="text-slate-500 text-sm mt-1">Kelola data perbaikan & penugasan.</p></div>
                        <div className="flex gap-2 w-full sm:w-auto">
                            <button onClick={() => setJadwalView(jadwalView === 'list' ? 'calendar' : 'list')} className="bg-white border border-slate-200 text-slate-600 px-4 py-2.5 rounded-xl text-sm font-bold shadow-sm">
                                <i className={`fa-solid ${jadwalView === 'list' ? 'fa-calendar' : 'fa-list'} mr-2`}></i> {jadwalView === 'list' ? 'Kalender' : 'Daftar'}
                            </button>
                            <button onClick={() => { setSelectedOrder(null); setShowOrderModal(true); }} className="flex-1 bg-red-600 text-white px-4 py-2.5 rounded-xl text-sm font-bold shadow-md hover:bg-red-700">
                                <i className="fa-solid fa-plus mr-2"></i> Order Baru
                            </button>
                        </div>
                    </div>

                    <div className="glass-panel rounded-2xl overflow-hidden shadow-sm">
                        {jadwalView === 'list' ? (
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm min-w-[800px]">
                                    <thead className="bg-slate-50/80 text-slate-500 border-b border-slate-200">
                                        <tr>
                                            <th className="p-4 font-bold text-xs uppercase">Tanggal</th>
                                            <th className="p-4 font-bold text-xs uppercase">Klien & Unit</th>
                                            <th className="p-4 font-bold text-xs uppercase">Teknisi</th>
                                            <th className="p-4 font-bold text-xs uppercase">Status</th>
                                            <th className="p-4 font-bold text-xs uppercase text-center">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {orders.map(o => (
                                            <tr key={o.id} className="hover:bg-slate-50/50 transition-colors">
                                                <td className="p-4"><p className="font-bold text-slate-800">{o.date}</p><p className="text-[10px] text-slate-400">{o.order_id_text}</p></td>
                                                <td className="p-4"><p className="font-bold text-slate-800">{o.customer}</p><p className="text-xs text-slate-500 truncate max-w-[200px]">{o.unit}</p></td>
                                                <td className="p-4"><span className="bg-blue-50 text-blue-600 text-xs font-bold px-2 py-1 rounded">{o.technician_name}</span></td>
                                                <td className="p-4">
                                                    <span className={`text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider border ${
                                                        o.status === 'Proses' ? 'bg-yellow-50 text-yellow-700 border-yellow-200' : 
                                                        o.status === 'Lunas' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-slate-100 text-slate-600 border-slate-200'
                                                    }`}>{o.status}</span>
                                                </td>
                                                <td className="p-4 text-center">
                                                    <button onClick={() => { setSelectedOrder(o); setShowOrderModal(true); }} className="text-red-600 bg-red-50 hover:bg-red-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">Detail</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        ) : (
                            <div className="p-10 text-center text-slate-400">
                                <i className="fa-regular fa-calendar-xmark text-4xl mb-3"></i>
                                <p className="font-medium">Tampilan Kalender interaktif akan tersedia setelah integrasi kalender penuh di versi berikutnya.</p>
                            </div>
                        )}
                    </div>
                </div>
            );

            const renderKeuangan = () => (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div><h2 className="text-2xl sm:text-3xl font-black text-slate-800">Arus Kas</h2><p className="text-slate-500 text-sm mt-1">Pantau, catat, dan analisa keuangan.</p></div>
                        <button onClick={() => setShowFinanceModal(true)} className="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-sm flex justify-center items-center gap-2">
                            <i className="fa-solid fa-plus"></i> Catat Transaksi
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div onClick={() => setShowCashDetailModal({ isOpen: true, type: 'Kas Berjalan' })} className="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-2xl text-white shadow-lg cursor-pointer hover:scale-[1.02] transition-transform">
                            <p className="text-blue-200 text-xs font-bold uppercase tracking-wider mb-1">Kas Berjalan (Operasional)</p>
                            <h3 className="text-3xl sm:text-4xl font-black mb-4">{formatRupiah(kasBerjalan)}</h3>
                            <div className="inline-flex items-center gap-2 text-xs bg-white/20 px-3 py-1.5 rounded-lg backdrop-blur-sm font-medium hover:bg-white/30">
                                Buka Detail Transaksi <i className="fa-solid fa-arrow-right"></i>
                            </div>
                        </div>
                        <div onClick={() => setShowCashDetailModal({ isOpen: true, type: 'Kas Tetap' })} className="bg-gradient-to-br from-red-600 to-red-800 p-6 rounded-2xl text-white shadow-lg cursor-pointer hover:scale-[1.02] transition-transform">
                            <p className="text-red-200 text-xs font-bold uppercase tracking-wider mb-1">Kas Tetap (Tabungan)</p>
                            <h3 className="text-3xl sm:text-4xl font-black mb-4">{formatRupiah(kasTetap)}</h3>
                            <div className="inline-flex items-center gap-2 text-xs bg-white/20 px-3 py-1.5 rounded-lg backdrop-blur-sm font-medium hover:bg-white/30">
                                Buka Detail Transaksi <i className="fa-solid fa-arrow-right"></i>
                            </div>
                        </div>
                    </div>

                    {/* Filter & Daftar Mutasi Keseluruhan */}
                    <div className="glass-panel rounded-2xl overflow-hidden shadow-sm">
                        <div className="p-4 sm:p-5 border-b border-slate-200 bg-slate-50/50 flex flex-col gap-4">
                            <h3 className="font-black text-slate-800 text-lg">Mutasi Keseluruhan</h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                                <div className="flex bg-white border border-slate-200 rounded-xl px-3 items-center focus-within:border-blue-500 overflow-hidden shadow-sm">
                                    <i className="fa-solid fa-search text-slate-400 text-sm"></i>
                                    <input type="text" placeholder="Cari ket. (cth: pembukuan)" value={financeFilter.search} onChange={e => setFinanceFilter({...financeFilter, search: e.target.value})} className="w-full p-2 outline-none text-sm" />
                                </div>
                                <select value={financeFilter.category} onChange={e => setFinanceFilter({...financeFilter, category: e.target.value})} className="bg-white border border-slate-200 p-2.5 rounded-xl text-sm outline-none shadow-sm font-medium">
                                    <option value="Semua">Semua Kategori Kas</option>
                                    <option value="Kas Berjalan">Hanya Kas Berjalan</option>
                                    <option value="Kas Tetap">Hanya Kas Tetap</option>
                                </select>
                                <div className="flex flex-col">

                    <Navigation />
                    <div className="flex-1 md:ml-64 flex flex-col h-full overflow-hidden relative">
                        <header className="glass-panel border-b border-slate-200 px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between z-40 relative sticky top-0">
                            <div className="flex items-center gap-3">
                                <button className="md:hidden text-slate-600 bg-slate-100 p-2 rounded-lg" onClick={() => setIsMobileMenuOpen(true)}><i className="fa-solid fa-bars text-xl"></i></button>
                                <div>
                                    <h1 className="text-lg sm:text-xl font-black text-slate-800 leading-tight">{role === 'admin' ? 'Portal Manajemen' : 'Aplikasi Lapangan'}</h1>
                                    <p className="text-[10px] sm:text-xs text-slate-500 font-medium">{new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                </div>
                            </div>
                        </header>
                        <main className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 pb-20">
                            <div className="max-w-6xl mx-auto">
                                {role === 'admin' && activeTab === 'dashboard' && renderDashboard()}
                                {role === 'admin' && activeTab === 'jadwal' && renderJadwal()}
                                {role === 'admin' && activeTab === 'keuangan' && renderKeuangan()}
                                {role === 'admin' && activeTab === 'tim' && renderTim()}
                                {role === 'teknisi' && renderTeknisiPortal()}
                            </div>
                        </main>
                    </div>
                    {renderModals()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
