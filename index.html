<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servisika Management App</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ef4444; }
        body { -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        
        /* Print Styles for Invoice */
        @media print {
            body * { visibility: hidden; }
            #printable-invoice, #printable-invoice * { visibility: visible; }
            #printable-invoice { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="text-slate-800 font-sans selection:bg-red-200 selection:text-red-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SUPABASE_URL = 'https://fpvnlwcjnmfiyrlbhgvi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdm5sd2Nqbm1maXlybGJoZ3ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1ODA0ODksImV4cCI6MjEwMDE1NjQ4OX0.Y5eBJEjxfOEv0ES-LUYfY6aP7zaRIdp5L2XAzvLZLks';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Helper to convert formatted string back to number
        const parseCurrency = (val) => Number(val.toString().replace(/[^0-9]/g, ''));
        // Helper to format number to IDR string with dots
        const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number || 0);
        // Helper to just add dots while typing
        const formatNumberStr = (val) => {
            let num = val.toString().replace(/[^0-9]/g, '');
            return num.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        };

        const App = () => {
            // App State
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [role, setRole] = useState(null); // 'admin', 'teknisi', or 'bos'
            const [currentUser, setCurrentUser] = useState(null); 
            const [loginError, setLoginError] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isLoading, setIsLoading] = useState(true);

            // Data State
            const [transactions, setTransactions] = useState([]);
            const [technicians, setTechnicians] = useState([]);
            const [orders, setOrders] = useState([]);

            // Modals & UI State
            const [jadwalView, setJadwalView] = useState('list');
            const [financeFilter, setFinanceFilter] = useState({ search: '', category: 'Semua', startDate: '', endDate: '' });
            const [showOrderModal, setShowOrderModal] = useState(false);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [modalParts, setModalParts] = useState([]); // Dynamic rows for order editing
            const [showFinanceModal, setShowFinanceModal] = useState(false);
            const [showCashDetailModal, setShowCashDetailModal] = useState({ isOpen: false, type: null });
            const [showTechModal, setShowTechModal] = useState(false);

            useEffect(() => {
                const initApp = async () => {
                    setIsLoading(true);
                    try {
                        // 1. Fetch Data
                        const { data: trxData } = await supabase.from('transactions').select('*').order('date', { ascending: false });
                        if (trxData) setTransactions(trxData);
                        const { data: techData } = await supabase.from('technicians').select('*').order('created_at', { ascending: false });
                        if (techData) setTechnicians(techData);
                        const { data: ordData } = await supabase.from('orders').select('*, order_parts(*)').order('date', { ascending: false });
                        if (ordData) setOrders(ordData);

                        // 2. Check Magic Link
                        const urlParams = new URLSearchParams(window.location.search);
                        const techCode = urlParams.get('tech');
                        
                        if (techCode && techData) {
                            const foundTech = techData.find(t => t.access_code === techCode);
                            if (foundTech) {
                                loginUser('teknisi', foundTech);
                                window.history.replaceState({}, document.title, window.location.pathname);
                                setIsLoading(false);
                                return;
                            }
                        }

                        // 3. Check Local Storage (Remember Login)
                        const savedRole = localStorage.getItem('svk_role');
                        const savedUser = localStorage.getItem('svk_user');
                        if (savedRole) {
                            setRole(savedRole);
                            if (savedUser) setCurrentUser(JSON.parse(savedUser));
                            setIsLoggedIn(true);
                        }

                    } catch (error) {
                        console.error("Gagal load data:", error);
                    } finally {
                        setIsLoading(false);
                    }
                };
                initApp();
            }, []);

            const loginUser = (userRole, userData) => {
                setIsLoggedIn(true);
                setRole(userRole);
                setCurrentUser(userData);
                localStorage.setItem('svk_role', userRole);
                if(userData) localStorage.setItem('svk_user', JSON.stringify(userData));
                setLoginError('');
            };

            const handleLogout = () => {
                if(window.confirm('Yakin ingin keluar dari portal?')) {
                    setIsLoggedIn(false);
                    setRole(null);
                    setCurrentUser(null);
                    setActiveTab('dashboard');
                    localStorage.removeItem('svk_role');
                    localStorage.removeItem('svk_user');
                }
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                const pin = e.target.pin.value;
                if(pin === 'serviceika_112') { // Updated Secure PIN
                    loginUser('admin', { name: 'Admin Utama' });
                } else {
                    setLoginError('PIN Admin tidak valid!');
                }
            };

            const handleTechLogin = (e) => {
                e.preventDefault();
                const code = e.target.code.value.trim();
                const foundTech = technicians.find(t => t.access_code === code);
                if(foundTech) {
                    loginUser('teknisi', foundTech);
                } else {
                    setLoginError('Kode akses Teknisi tidak ditemukan!');
                }
            };

            const kasBerjalan = transactions.filter(t => t.category === 'Kas Berjalan').reduce((sum, t) => t.type === 'in' ? sum + Number(t.amount) : sum - Number(t.amount), 0);
            const kasTetap = transactions.filter(t => t.category === 'Kas Tetap').reduce((sum, t) => t.type === 'in' ? sum + Number(t.amount) : sum - Number(t.amount), 0);

            const filteredTransactions = useMemo(() => {
                return transactions.filter(trx => {
                    const matchSearch = trx.description.toLowerCase().includes(financeFilter.search.toLowerCase());
                    const matchCategory = financeFilter.category === 'Semua' || trx.category === financeFilter.category;
                    const matchStart = financeFilter.startDate ? trx.date >= financeFilter.startDate : true;
                    const matchEnd = financeFilter.endDate ? trx.date <= financeFilter.endDate : true;
                    return matchSearch && matchCategory && matchStart && matchEnd;
                });
            }, [transactions, financeFilter]);

            // Clean Phone Number for WA
            const getCleanPhone = (phone) => {
                let cleanPhone = (phone || '').replace(/\D/g, ''); 
                if (cleanPhone.startsWith('0')) cleanPhone = '62' + cleanPhone.substring(1);
                if (!cleanPhone.startsWith('62')) cleanPhone = '62' + cleanPhone;
                return cleanPhone;
            };

            // Invoice Generator (Printable)
            const handlePrintInvoice = (order) => {
                const total = (order.order_parts || []).reduce((s, p) => s + Number(p.price), 0);
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                    <head>
                        <title>Invoice - ${order.order_id_text}</title>
                        <style>
                            body { font-family: 'Arial', sans-serif; padding: 40px; color: #333; line-height: 1.6; }
                            .header { display: flex; justify-content: space-between; border-bottom: 2px solid #ef4444; padding-bottom: 20px; margin-bottom: 30px; }
                            .brand h1 { color: #b91c1c; margin: 0; font-size: 28px; }
                            .brand p { margin: 5px 0 0; color: #666; font-size: 14px; }
                            .invoice-details { text-align: right; }
                            .invoice-details h2 { margin: 0; color: #333; font-size: 24px; text-transform: uppercase; }
                            .info-section { display: flex; justify-content: space-between; margin-bottom: 30px; }
                            table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
                            th { background: #f8fafc; text-align: left; padding: 12px; border-bottom: 2px solid #cbd5e1; }
                            td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
                            .total-row td { font-weight: bold; font-size: 18px; border-top: 2px solid #333; }
                            .footer { margin-top: 50px; font-size: 14px; text-align: center; color: #666; }
                            .payment-info { background: #f8fafc; padding: 15px; border-radius: 8px; margin-top: 20px; }
                        </style>
                    </head>
                    <body>
                        <div class="header">
                            <div class="brand">
                                <h1>SERVISIKA</h1>
                                <p>Layanan Servis Alat Fitness Profesional</p>
                            </div>
                            <div class="invoice-details">
                                <h2>INVOICE</h2>
                                <p><strong>No:</strong> ${order.order_id_text}</p>
                                <p><strong>Tanggal:</strong> ${new Date().toLocaleDateString('id-ID')}</p>
                            </div>
                        </div>
                        <div class="info-section">
                            <div>
                                <p><strong>Kepada Yth:</strong></p>
                                <p>${order.customer}<br>${order.address}<br>Telp: ${order.phone}</p>
                            </div>
                            <div>
                                <p><strong>Detail Unit:</strong></p>
                                <p>${order.unit}<br>Kendala: ${order.issue}<br>Teknisi: ${order.technician_name}</p>
                            </div>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Deskripsi (Jasa & Sparepart)</th>
                                    <th>Garansi</th>
                                    <th style="text-align: right;">Harga (Rp)</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${(order.order_parts || []).map(p => `
                                    <tr>
                                        <td>${p.name}</td>
                                        <td>${p.warranty_months > 0 ? p.warranty_months + ' Bulan' : '-'}</td>
                                        <td style="text-align: right;">${formatRupiah(p.price)}</td>
                                    </tr>
                                `).join('')}
                                <tr class="total-row">
                                    <td colspan="2" style="text-align: right;">TOTAL:</td>
                                    <td style="text-align: right; color: #b91c1c;">${formatRupiah(total)}</td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="payment-info">
                            <p><strong>Informasi Pembayaran:</strong></p>
                            <p>Pembayaran dapat dilakukan secara tunai kepada teknisi, atau transfer ke:<br>
                            <strong>BCA: (Nomor Rekening Anda)</strong> a.n (Nama Anda)</p>
                        </div>
                        <div class="footer">
                            <p>Terima kasih atas kepercayaan Anda menggunakan jasa Servisika.</p>
                        </div>
                    </body>
                    </html>
                `);
                printWindow.document.close();
                printWindow.print();
            };

            const handleSaveUpdateOrder = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const status = formData.get('status');
                const notes = formData.get('notes');

                // Update Order basic info
                await supabase.from('orders').update({ status, notes }).eq('id', selectedOrder.id);
                
                // Update Parts (Delete old, insert new)
                await supabase.from('order_parts').delete().eq('order_id', selectedOrder.id);
                const partsToInsert = modalParts.filter(p => p.name.trim() !== '').map(p => ({
                    order_id: selectedOrder.id,
                    name: p.name,
                    price: parseCurrency(p.price),
                    warranty_months: Number(p.warranty_months || 0)
                }));
                if(partsToInsert.length > 0) {
                    await supabase.from('order_parts').insert(partsToInsert);
                }

                // If Admin sets to Lunas, auto-create transaction
                if(status === 'Lunas' && selectedOrder.status !== 'Lunas' && role === 'admin') {
                    const totalAmount = partsToInsert.reduce((sum, p) => sum + p.price, 0);
                    if(totalAmount > 0) {
                        const newTrx = {
                            date: new Date().toISOString().split('T')[0],
                            type: 'in', category: 'Kas Berjalan',
                            amount: totalAmount, description: `Pelunasan Order: ${selectedOrder.customer} (${selectedOrder.order_id_text})`
                        };
                        const { data } = await supabase.from('transactions').insert([newTrx]).select();
                        if(data) setTransactions([data[0], ...transactions]);
                    }
                }

                // Refresh orders
                const { data: ordData } = await supabase.from('orders').select('*, order_parts(*)').order('date', { ascending: false });
                if(ordData) setOrders(ordData);
                setShowOrderModal(false);
                alert('Pembaruan berhasil disimpan!');
            };

            const handleAddTransaction = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newTrx = {
                    date: formData.get('date'), type: formData.get('type'),
                    category: formData.get('category'), amount: parseCurrency(formData.get('amount')),
                    description: formData.get('desc')
                };
                const { data, error } = await supabase.from('transactions').insert([newTrx]).select();
                if (!error && data) {
                    setTransactions([data[0], ...transactions]);
                    setShowFinanceModal(false);
                }
            };

            const handleDeleteTransaction = async (id) => {
                if(window.confirm('Yakin ingin menghapus mutasi ini? Saldo otomatis menyesuaikan.')) {
                    await supabase.from('transactions').delete().eq('id', id);
                    setTransactions(transactions.filter(t => t.id !== id));
                }
            };

            const handleAddTechnician = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const randomCode = 'tech_' + Math.random().toString(36).substring(2, 8);
                const newTech = { name: formData.get('name'), phone: formData.get('phone'), access_code: randomCode };
                
                const { data, error } = await supabase.from('technicians').insert([newTech]).select();
                if (!error && data) {
                    setTechnicians([data[0], ...technicians]);
                    setShowTechModal(false);
                }
            };

            const handleCreateOrder = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newOrder = {
                    date: formData.get('date'), customer: formData.get('customer'),
                    phone: formData.get('phone'), address: formData.get('address'),
                    unit: formData.get('unit'), issue: formData.get('issue'),
                    technician_name: formData.get('technician'), status: 'Proses',
                    order_id_text: 'ORD-' + Math.floor(Math.random() * 10000)
                };
                const { data, error } = await supabase.from('orders').insert([newOrder]).select();
                if (!error && data) {
                    const defaultPart = { order_id: data[0].id, name: 'Jasa Kunjungan & Pengecekan', price: 250000, warranty_months: 0 };
                    await supabase.from('order_parts').insert([defaultPart]);
                    const { data: ordData } = await supabase.from('orders').select('*, order_parts(*)').order('date', { ascending: false });
                    if(ordData) setOrders(ordData);
                    setShowOrderModal(false);
                }
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
                            <div className="text-center mb-8">
                                <div className="bg-red-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i className="fa-solid fa-wrench text-2xl text-red-600"></i>
                                </div>
                                <h1 className="text-3xl font-black text-slate-800 tracking-tight">SERVISIKA</h1>
                                <p className="text-slate-500 text-sm mt-1">Sistem Manajemen & Lapangan</p>
                            </div>
                            
                            {loginError && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm font-bold text-center mb-6 border border-red-100 animate-pulse"><i className="fa-solid fa-circle-exclamation mr-1"></i> {loginError}</div>}
                            
                            <div className="space-y-6">
                                <form onSubmit={handleAdminLogin} className="bg-slate-50 p-5 rounded-xl border border-slate-200 focus-within:border-slate-400 transition-colors">
                                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Login Administrator</h3>
                                    <div className="flex gap-2">
                                        <input type="password" name="pin" placeholder="Masukkan PIN Rahasia" required className="flex-1 p-3 rounded-lg border border-slate-300 outline-none focus:border-slate-500 text-sm font-bold text-center" />
                                        <button type="submit" className="bg-slate-800 hover:bg-slate-900 text-white px-5 rounded-lg font-bold text-sm transition-colors shadow-sm">Masuk</button>
                                    </div>
                                </form>

                                <div className="relative flex items-center py-2">
                                    <div className="flex-grow border-t border-slate-200"></div>
                                    <span className="flex-shrink-0 mx-4 text-slate-400 text-xs font-medium uppercase tracking-wider">Akses Teknisi</span>
                                    <div className="flex-grow border-t border-slate-200"></div>
                                </div>

                                <form onSubmit={handleTechLogin} className="bg-red-50 p-5 rounded-xl border border-red-100 focus-within:border-red-300 transition-colors">
                                    <p className="text-xs text-red-500 font-medium mb-3 text-center">Masukkan kode dari link WhatsApp Anda</p>
                                    <input type="text" name="code" placeholder="Kode Akses (cth: tech_abc)" required className="w-full p-3 rounded-lg border border-red-200 outline-none focus:border-red-500 text-sm font-bold text-center mb-3 bg-white" />
                                    <button type="submit" className="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg font-bold text-sm transition-colors shadow-sm">Buka Portal Teknisi</button>
                                </form>
                            </div>
                        </div>
                    </div>
                )
            }

            const Navigation = () => (
                <div className={`fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-white transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 transition-transform duration-300 shadow-2xl flex flex-col`}>
                    <div className="p-6 flex items-center justify-between border-b border-slate-800">
                        <div className="flex items-center gap-3">
                            <i className="fa-solid fa-wrench text-xl text-red-500"></i>
                            <h1 className="text-xl font-black tracking-tight text-white">SERVISIKA</h1>
                        </div>
                        <button className="md:hidden text-slate-400 hover:text-white" onClick={() => setIsMobileMenuOpen(false)}>
                            <i className="fa-solid fa-xmark text-2xl"></i>
                        </button>
                    </div>

                    <div className="p-4 flex-1 overflow-y-auto">
                        <p className="text-slate-500 text-[10px] font-bold uppercase tracking-wider mb-4 px-3">Menu {role === 'admin' ? 'Utama' : 'Teknisi'}</p>
                        <ul className="space-y-1.5">
                            {role === 'admin' ? (
                                <>
                                    {[{ id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard' },
                                      { id: 'jadwal', icon: 'fa-calendar-days', label: 'Jadwal & Order' },
                                      { id: 'keuangan', icon: 'fa-wallet', label: 'Arus Kas' },
                                      { id: 'tim', icon: 'fa-user-group', label: 'Tim Teknisi' }].map(item => (
                                        <li key={item.id}>
                                            <button onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); setRole('admin'); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === item.id && role === 'admin' ? 'bg-red-600 text-white shadow-md font-bold' : 'text-slate-300 hover:bg-slate-800 font-medium'}`}>
                                                <i className={`fa-solid ${item.icon} w-5 text-center`}></i> <span className="text-sm">{item.label}</span>
                                            </button>
                                        </li>
                                    ))}
                                </>
                            ) : (
                                <>
                                    <li>
                                        <button onClick={() => { setActiveTab('dashboard'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'dashboard' ? 'bg-red-600 text-white shadow-md font-bold' : 'text-slate-300 hover:bg-slate-800 font-medium'}`}>
                                            <i className="fa-solid fa-clipboard-list w-5 text-center"></i> <span className="text-sm">Tugas Saya</span>
                                        </button>
                                    </li>
                                </>
                            )}
                        </ul>
                    </div>
                    
                    <div className="p-5 border-t border-slate-800 bg-slate-950/50 mt-auto">
                        <div className="flex items-center gap-3 mb-4">
                            <div className="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center font-bold text-slate-300 border border-slate-700">{currentUser.name.charAt(0).toUpperCase()}</div>
                            <div className="overflow-hidden">
                                <p className="font-bold text-sm truncate leading-tight text-white">{currentUser.name}</p>
                                <p className="text-[10px] text-slate-400 capitalize">{role}</p>
                            </div>
                        </div>
                        <button onClick={handleLogout} className="w-full text-xs bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white py-2.5 rounded-xl transition-colors font-bold border border-red-600/30">
                            <i className="fa-solid fa-arrow-right-from-bracket mr-1"></i> Keluar (Logout)
                        </button>
                    </div>
                </div>
            );

            const renderDashboard = () => (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div><h2 className="text-2xl sm:text-3xl font-black text-slate-800">Overview</h2><p className="text-slate-500 text-sm mt-1">Ringkasan operasional Servisika.</p></div>
                        {role === 'admin' && (
                            <button onClick={() => setRole('bos')} className="w-full sm:w-auto bg-white border border-slate-200 text-slate-700 px-4 py-2.5 rounded-xl text-sm font-bold flex justify-center items-center gap-2 hover:bg-slate-50 shadow-sm transition-colors">
                                <i className="fa-solid fa-arrow-up-right-from-square text-blue-500"></i> Mode Tampilan Bos
                            </button>
                        )}
                        {role === 'bos' && (
                            <button onClick={() => setRole('admin')} className="w-full sm:w-auto bg-slate-800 text-white px-4 py-2.5 rounded-xl text-sm font-bold flex justify-center items-center gap-2 shadow-sm transition-colors">
                                Kembali ke Mode Admin
                            </button>
                        )}
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">

                                                <div className="flex gap-2">
                                                    <button onClick={() => window.open(`https://api.whatsapp.com/send?phone=${finalWaPhone}`, '_blank')} className="flex-1 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 py-2.5 rounded-xl text-xs font-bold flex justify-center items-center gap-1.5 border border-emerald-200 transition-colors">
                                                        <i className="fa-brands fa-whatsapp text-lg"></i> WA Klien
                                                    </button>
                                                    <button onClick={() => window.open(`https://maps.google.com/?q=${encodeURIComponent(o.address)}`, '_blank')} className="flex-1 bg-blue-50 text-blue-700 hover:bg-blue-100 py-2.5 rounded-xl text-xs font-bold flex justify-center items-center gap-1.5 border border-blue-200 transition-colors">
                                                        <i className="fa-solid fa-map-location-dot text-lg"></i> Buka Maps
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="border-t border-slate-100 p-4 bg-slate-50 flex justify-between items-center gap-4">
                                                <p className="text-xs font-medium text-slate-500 flex-1 leading-snug truncate"><i className="fa-solid fa-location-dot mr-1"></i> {o.address}</p>
                                                <button onClick={() => { setModalParts(o.order_parts||[]); setSelectedOrder(o); setShowOrderModal(true); }} className="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2.5 rounded-xl text-xs font-bold shadow-sm shrink-0 transition-colors">Update Progres</button>
                                            </div>
                                        </div>
                                    )
                                })}
                                {myOrders.length === 0 && <div className="text-center bg-white border border-slate-200 border-dashed rounded-2xl p-10"><i className="fa-regular fa-face-smile text-4xl text-slate-300 mb-3"></i><p className="text-slate-500 font-medium text-sm">Bagus! Tidak ada antrean saat ini.</p></div>}
                            </div>
                        ) : (
                            <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden p-4">
                                <h3 className="font-bold text-slate-800 mb-4 border-b border-slate-100 pb-2">Jadwal Minggu Ini</h3>
                                <div className="space-y-3">
                                    {days.map((day, idx) => {
                                        // Visual representation only for mockup logic, mapping real dates requires complex date logic.
                                        // We simulate finding orders for this day visually.
                                        return (
                                        <div key={idx} className="flex gap-3 items-start border-l-2 border-slate-100 pl-3 py-1">
                                            <div className="w-16 shrink-0">
                                                <p className="text-xs font-bold text-slate-500">{day}</p>
                                            </div>
                                            <div className="flex-1 space-y-2">
                                                {/* Simulate orders if it's the current active list, just spreading them out visually for the prototype */}
                                                {idx === 0 || idx === 2 ? myOrders.slice(0, 1).map(o => (
                                                    <div key={o.id} className="bg-slate-50 p-2 rounded-lg border border-slate-100 text-xs cursor-pointer hover:border-red-300" onClick={() => { setModalParts(o.order_parts||[]); setSelectedOrder(o); setShowOrderModal(true); }}>
                                                        <p className="font-bold text-slate-800">{o.customer}</p>
                                                        <p className="text-slate-500 truncate">{o.unit}</p>
                                                    </div>
                                                )) : <p className="text-xs text-slate-300 italic">Kosong</p>}
                                            </div>
                                        </div>
                                    )})}
                                </div>
                            </div>
                        )}
                    </div>
                )
            };

            const renderModals = () => (
                <>
                    {/* 1. Modal Order (Update Progress / Detail Admin) */}
                    {showOrderModal && selectedOrder && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm overflow-y-auto">
                            <div className="bg-white rounded-2xl w-full max-w-2xl shadow-2xl my-8 flex flex-col max-h-[90vh]">
                                <form onSubmit={handleSaveUpdateOrder} className="flex flex-col h-full">
                                    <div className="sticky top-0 bg-white border-b border-slate-100 p-5 flex justify-between items-center z-10 rounded-t-2xl">
                                        <div>
                                            <h3 className="font-black text-xl text-slate-800 leading-tight">{role === 'admin' ? 'Detail & Edit Order' : 'Laporan Pengerjaan Teknisi'}</h3>
                                            <p className="text-xs text-slate-500 font-medium mt-0.5">{selectedOrder.customer} - {selectedOrder.order_id_text}</p>
                                        </div>
                                        <button type="button" onClick={() => setShowOrderModal(false)} className="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full"><i className="fa-solid fa-xmark"></i></button>
                                    </div>
                                    
                                    <div className="p-5 overflow-y-auto space-y-6 flex-1">
                                        {/* Status */}
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 block ml-1">Status Progres</label>
                                            <select name="status" defaultValue={selectedOrder.status} className="w-full font-bold text-slate-800 border-2 border-slate-200 p-3 rounded-xl outline-none focus:border-red-500 bg-slate-50 shadow-sm cursor-pointer">
                                                <option value="Proses">Sedang Dikerjakan (Berlanjut)</option>
                                                <option value="Pending">Tertunda / Tunggu Sparepart</option>
                                                <option value="Selesai">Pengerjaan Selesai</option>
                                                {role === 'admin' && <option value="Lunas">Selesai & Lunas (Otomatis Masuk Kas)</option>}
                                            </select>
                                        </div>

                                        {/* Teknisi File Upload Visual */}
                                        {role === 'teknisi' && (
                                            <div>
                                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 block ml-1">Upload Dokumentasi (Before/After)</label>
                                                <div className="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center bg-slate-50 cursor-pointer hover:bg-red-50 hover:border-red-300 transition-colors" onClick={()=>alert('Fitur Upload ke Supabase Storage akan diaktifkan setelah setup keamanan Storage selesai.')}>
                                                    <i className="fa-solid fa-cloud-arrow-up text-3xl text-slate-400 mb-2"></i>
                                                    <p className="text-sm font-bold text-slate-600">Klik untuk pilih Foto / Video</p>
                                                    <p className="text-xs text-slate-400 mt-1">Maks. 50MB per file</p>
                                                </div>
                                            </div>
                                        )}

                                        {/* Rincian Dynamic Rows */}
                                        <div>
                                            <div className="flex justify-between items-center mb-2">
                                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1">Rincian Jasa & Sparepart</label>
                                                <button type="button" onClick={() => setModalParts([...modalParts, {name: '', price: 0, warranty_months: 0}])} className="text-[10px] font-bold bg-red-50 text-red-600 px-2 py-1 rounded border border-red-200 hover:bg-red-100">+ Tambah Baris</button>
                                            </div>
                                            <div className="border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                                {modalParts.map((part, idx) => (
                                                    <div key={idx} className="p-3 bg-slate-50 border-b border-slate-100 flex flex-col sm:flex-row gap-2 relative group">
                                                        <div className="flex-1">
                                                            <input type="text" value={part.name} onChange={e => { const newP = [...modalParts]; newP[idx].name = e.target.value; setModalParts(newP); }} placeholder="Nama Jasa / Sparepart" className="w-full p-2.5 border border-slate-200 rounded-lg text-sm font-bold outline-none focus:border-red-400" required />
                                                        </div>
                                                        <div className="w-full sm:w-40 relative">
                                                            <span className="absolute left-3 top-2.5 text-slate-400 font-bold text-sm">Rp</span>
                                                            <input type="text" value={formatNumberStr(part.price)} onChange={e => { const newP = [...modalParts]; newP[idx].price = parseCurrency(e.target.value); setModalParts(newP); }} className="w-full p-2.5 pl-9 border border-slate-200 rounded-lg text-sm font-bold outline-none focus:border-red-400" required />
                                                        </div>
                                                        {role === 'admin' && (
                                                            <div className="w-full sm:w-28 relative">
                                                                <input type="number" value={part.warranty_months} onChange={e => { const newP = [...modalParts]; newP[idx].warranty_months = e.target.value; setModalParts(newP); }} placeholder="0" className="w-full p-2.5 pr-8 border border-slate-200 rounded-lg text-sm text-center font-bold outline-none focus:border-red-400" />
                                                                <span className="absolute right-2 top-2.5 text-xs text-slate-400 font-bold">Bln</span>
                                                            </div>
                                                        )}
                                                        <button type="button" onClick={() => { const newP = [...modalParts]; newP.splice(idx,1); setModalParts(newP); }} className="absolute -right-2 -top-2 bg-white border border-slate-200 text-red-500 rounded-full w-6 h-6 flex items-center justify-center opacity-0 group-hover:opacity-100 hover:bg-red-50 shadow-sm transition-all"><i className="fa-solid fa-xmark text-xs"></i></button>
                                                    </div>
                                                ))}
                                                {modalParts.length === 0 && <div className="p-4 text-center text-xs text-slate-400 bg-white">Belum ada rincian. Klik Tambah Baris.</div>}
                                                <div className="p-4 bg-white flex justify-between items-center font-bold border-t border-slate-200">
                                                    <span className="text-sm text-slate-500 uppercase tracking-wider">Total:</span>
                                                    <span className="text-xl text-slate-900">{formatRupiah(modalParts.reduce((s, p)=>s+Number(p.price),0))}</span>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Notes */}
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 block ml-1">Catatan Laporan Tambahan</label>
                                            <textarea name="notes" rows="3" defaultValue={selectedOrder.notes} placeholder="Detail kondisi, alasan pending..." className="w-full font-medium text-slate-800 border-2 border-slate-200 p-3 rounded-xl outline-none focus:border-red-500 bg-slate-50 resize-none shadow-sm"></textarea>
                                        </div>
                                    </div>
                                    
                                    <div className="sticky bottom-0 bg-white border-t border-slate-200 p-4 sm:p-5 flex flex-col sm:flex-row justify-end gap-3 rounded-b-2xl">
                                        <button type="button" onClick={() => handlePrintInvoice(selectedOrder)} className="w-full sm:w-auto px-5 py-2.5 rounded-xl font-bold text-slate-700 bg-slate-100 hover:bg-slate-200 border border-slate-200 transition-colors sm:mr-auto flex justify-center items-center gap-2">
                                            <i className="fa-solid fa-file-pdf text-red-600"></i> Download / Print Invoice
                                        </button>
                                        <button type="button" onClick={() => setShowOrderModal(false)} className="w-full sm:w-auto px-5 py-2.5 rounded-xl font-bold text-slate-600 hover:bg-slate-50 transition-colors">Batal</button>
                                        <button type="submit" className="w-full sm:w-auto px-6 py-2.5 rounded-xl font-bold text-white bg-red-600 hover:bg-red-700 shadow-md transition-colors">Simpan Pembaruan</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 2. Modal Form Order Baru (Khusus Admin) */}
                    {showOrderModal && !selectedOrder && role === 'admin' && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-in zoom-in duration-200">
                                <div className="bg-slate-50 border-b border-slate-100 p-5 flex justify-between items-center">
                                    <h3 className="font-black text-lg text-slate-800">Buat Order Baru</h3>
                                    <button onClick={() => setShowOrderModal(false)} className="text-slate-400 hover:text-slate-600 bg-white p-1.5 rounded-lg border border-slate-200"><i className="fa-solid fa-xmark text-lg px-1"></i></button>
                                </div>
                                <form onSubmit={handleCreateOrder} className="p-5 space-y-4">
                                    <div><label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Tgl Penjadwalan</label><input type="date" name="date" required defaultValue={new Date().toISOString().split('T')[0]} className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-red-500" /></div>
                                    <input type="text" name="customer" required placeholder="Nama Klien/Instansi" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-red-500" />
                                    <input type="text" name="phone" required placeholder="No. WA (cth: 0812...)" className="w-full border-2 border-slate-200 p-3 rounded-xl font-medium outline-none focus:border-red-500" />
                                    <input type="text" name="unit" required placeholder="Tipe Alat (cth: Treadmill Bodysolid)" className="w-full border-2 border-slate-200 p-3 rounded-xl font-medium outline-none focus:border-red-500" />
                                    <textarea name="address" required placeholder="Alamat lengkap lokasi..." rows="2" className="w-full border-2 border-slate-200 p-3 rounded-xl font-medium outline-none focus:border-red-500 resize-none"></textarea>
                                    <textarea name="issue" required placeholder="Kendala/Keluhan yang dilaporkan..." rows="2" className="w-full border-2 border-slate-200 p-3 rounded-xl font-medium outline-none focus:border-red-500 resize-none"></textarea>
                                    <select name="technician" required className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-red-500 cursor-pointer bg-slate-50">
                                        <option value="">-- Tugaskan ke Teknisi --</option>
                                        {technicians.map(t => <option key={t.id} value={t.name}>{t.name}</option>)}
                                    </select>
                                    <button type="submit" className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3.5 rounded-xl shadow-md mt-2 transition-colors">Simpan & Tugaskan</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 3. Modal Tambah Transaksi Kas */}
                    {showFinanceModal && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-in zoom-in duration-200">
                                <div className="bg-slate-50 border-b border-slate-100 p-5 flex justify-between items-center">
                                    <h3 className="font-black text-lg text-slate-800">Catat Transaksi</h3>
                                    <button onClick={() => setShowFinanceModal(false)} className="text-slate-400 hover:text-slate-600 bg-white p-1.5 rounded-lg border border-slate-200"><i className="fa-solid fa-xmark text-lg px-1"></i></button>
                                </div>
                                <form onSubmit={handleAddTransaction} className="p-5 space-y-4">
                                    <div><label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Tgl Transaksi</label><input type="date" name="date" required defaultValue={new Date().toISOString().split('T')[0]} className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-emerald-500" /></div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <select name="type" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-emerald-500 bg-slate-50 cursor-pointer">
                                            <option value="in">Pemasukan (+)</option>
                                            <option value="out">Pengeluaran (-)</option>
                                        </select>
                                        <select name="category" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-emerald-500 bg-slate-50 cursor-pointer">
                                            <option value="Kas Berjalan">Kas Berjalan</option>
                                            <option value="Kas Tetap">Kas Tetap</option>
                                        </select>
                                    </div>
                                    <div className="relative">
                                        <span className="absolute left-4 top-4 text-slate-400 font-bold text-xl">Rp</span>
                                        <input type="text" name="amount" required onChange={(e) => e.target.value = formatNumberStr(e.target.value)} placeholder="0" className="w-full border-2 border-slate-200 p-4 pl-12 rounded-xl font-black text-xl outline-none focus:border-emerald-500" />
                                    </div>
                                    <input type="text" name="desc" required placeholder="Keterangan / Keperluan (cth: Beli oli)" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-emerald-500" />
                                    <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl shadow-md mt-2 transition-colors">Simpan Transaksi</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 4. Modal Detail Kas Khusus (Popup) */}
                    {showCashDetailModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[85vh] flex flex-col shadow-2xl animate-in zoom-in duration-200">
                                <div className={`p-6 flex justify-between items-start rounded-t-2xl text-white ${showCashDetailModal.type === 'Kas Berjalan' ? 'bg-blue-600' : 'bg-red-600'}`}>
                                    <div><h3 className="font-black text-2xl mb-1">Rincian {showCashDetailModal.type}</h3><p className="text-sm font-medium text-white/80">Riwayat transaksi khusus laci ini.</p></div>
                                    <button onClick={() => setShowCashDetailModal({ isOpen: false, type: null })} className="bg-black/10 hover:bg-black/20 p-2 rounded-full transition-colors"><i className="fa-solid fa-xmark text-lg px-1"></i></button>
                                </div>
                                <div className="p-0 overflow-y-auto flex-1 bg-slate-50">
                                    <div className="divide-y divide-slate-100 bg-white">
                                        {transactions.filter(t => t.category === showCashDetailModal.type).map(trx => (
                                            <div key={trx.id} className="p-4 sm:p-5 flex justify-between items-center hover:bg-slate-50 transition-colors group">
                                                <div>
                                                    <p className="font-bold text-slate-800 text-sm">{trx.description}</p>
                                                    <p className="text-xs text-slate-400 mt-1 font-medium"><i className="fa-regular fa-calendar mr-1"></i> {trx.date}</p>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <div className={`font-black text-base sm:text-lg ${trx.type === 'in' ? 'text-green-600' : 'text-red-600'}`}>
                                                        {trx.type === 'in' ? '+' : '-'}{formatRupiah(trx.amount)}
                                                    </div>
                                                    <button onClick={() => handleDeleteTransaction(trx.id)} className="text-slate-300 hover:text-red-600 p-2 bg-slate-50 hover:bg-red-50 border border-transparent hover:border-red-100 rounded-lg transition-all sm:opacity-0 sm:group-hover:opacity-100"><i className="fa-solid fa-trash"></i></button>
                                                </div>
                                            </div>
                                        ))}
                                        {transactions.filter(t => t.category === showCashDetailModal.type).length === 0 && <div className="py-12 text-center text-slate-400 font-medium">Belum ada transaksi.</div>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );

            if (isLoading) return <div className="h-screen w-full flex flex-col items-center justify-center bg-slate-50"><i className="fa-solid fa-circle-notch fa-spin text-4xl text-red-600 mb-4"></i><p className="font-bold text-slate-500 animate-pulse">Menghubungkan ke Database...</p></div>;

            return (
                <div className="h-screen w-full flex overflow-hidden">
                    <Navigation />
                    <div className="flex-1 md:ml-64 flex flex-col h-full overflow-hidden relative bg-slate-50/50">
                        <header className="glass-panel border-b border-slate-200 px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between z-40 relative sticky top-0 no-print">
                            <div className="flex items-center gap-3">
                                <button className="md:hidden text-slate-600 bg-slate-100 hover:bg-slate-200 p-2 rounded-lg transition-colors" onClick={() => setIsMobileMenuOpen(true)}><i className="fa-solid fa-bars text-xl"></i></button>
                                <div>
                                    <h1 className="text-lg sm:text-xl font-black text-slate-800 leading-tight">{role === 'admin' ? 'Portal Manajemen' : role === 'bos' ? 'Laporan Eksekutif' : 'Aplikasi Lapangan'}</h1>
                                    <p className="text-[10px] sm:text-xs text-slate-500 font-medium">{new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                </div>
                            </div>
                        </header>
                        <main className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 pb-24 no-print">
                            <div className="max-w-6xl mx-auto">
                                {(role === 'admin' || role === 'bos') && activeTab === 'dashboard' && renderDashboard()}
                                {role === 'admin' && activeTab === 'jadwal' && renderJadwal()}
                                {role === 'admin' && activeTab === 'keuangan' && renderKeuangan()}
                                {role === 'admin' && activeTab === 'tim' && renderTim()}
                                {role === 'teknisi' && renderTeknisiPortal()}
                            </div>
                        </main>
                    </div>
                    {renderModals()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
