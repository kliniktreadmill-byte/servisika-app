<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Servisika Management App</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ef4444; }
        
        @media print {
            body * { visibility: hidden; }
            #printable-invoice, #printable-invoice * { visibility: visible; }
            #printable-invoice { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; }
            .no-print { display: none !important; }
        }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800 selection:bg-red-200 selection:text-red-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const SUPABASE_URL = 'https://fpvnlwcjnmfiyrlbhgvi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdm5sd2Nqbm1maXlybGJoZ3ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1ODA0ODksImV4cCI6MjEwMDE1NjQ4OX0.Y5eBJEjxfOEv0ES-LUYfY6aP7zaRIdp5L2XAzvLZLks';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const parseCurrency = (val) => Number(val.toString().replace(/[^0-9]/g, ''));
        const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number || 0);
        const formatNumberStr = (val) => val.toString().replace(/[^0-9]/g, '').replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        
        const getCleanPhone = (phone) => {
            let cleanPhone = (phone || '').replace(/[\D\s-]/g, ''); 
            if (cleanPhone.startsWith('0')) cleanPhone = '62' + cleanPhone.substring(1);
            if (!cleanPhone.startsWith('62')) cleanPhone = '62' + cleanPhone;
            return cleanPhone;
        };

        const getLocalDateString = (d) => {
            const tzOffset = d.getTimezoneOffset() * 60000;
            return new Date(d.getTime() - tzOffset).toISOString().split('T')[0];
        };

        const copyToClipboard = (text, customAlert = 'Teks berhasil disalin!') => {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => alert(customAlert));
            } else {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert(customAlert);
            }
        };

        const App = () => {
            // App State
            const [isInitialLoading, setIsInitialLoading] = useState(true);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [role, setRole] = useState(null); 
            const [currentUser, setCurrentUser] = useState(null); 
            const [loginError, setLoginError] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            
            // Special Views
            const [isBossView, setIsBossView] = useState(false);
            const [publicInvoiceOrder, setPublicInvoiceOrder] = useState(null);

            // Data State
            const [transactions, setTransactions] = useState([]);
            const [technicians, setTechnicians] = useState([]);
            const [orders, setOrders] = useState([]);

            // Modals & UI State
            const [dashFilter, setDashFilter] = useState(null); 
            const [jadwalTab, setJadwalTab] = useState('aktif'); 
            const [jadwalFilterTech, setJadwalFilterTech] = useState('');
            const [jadwalFilterStatus, setJadwalFilterStatus] = useState('');
            
            const [financeFilter, setFinanceFilter] = useState({ search: '', category: 'Semua', startDate: '', endDate: '' });
            const [showOrderModal, setShowOrderModal] = useState(false);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [modalParts, setModalParts] = useState([]); 
            
            const [showFinanceModal, setShowFinanceModal] = useState(false);
            const [showCashDetailModal, setShowCashDetailModal] = useState({ isOpen: false, type: null });
            const [showTechModal, setShowTechModal] = useState(false);
            
            const [selectedGalleryFolder, setSelectedGalleryFolder] = useState(null);
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                const initApp = async () => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const techCode = urlParams.get('tech');
                    const bossParam = urlParams.get('boss');
                    const invoiceId = urlParams.get('invoice');

                    try {
                        const { data: trxData } = await supabase.from('transactions').select('*').order('date', { ascending: false });
                        if (trxData) setTransactions(trxData);
                        
                        const { data: techData } = await supabase.from('technicians').select('*').order('created_at', { ascending: false });
                        if (techData) setTechnicians(techData);
                        
                        const { data: ordData } = await supabase.from('orders').select('*, order_parts(*)').order('date', { ascending: false });
                        if (ordData) setOrders(ordData);

                        if (invoiceId) {
                            if(ordData) {
                                const foundOrder = ordData.find(o => o.id === invoiceId);
                                if(foundOrder) setPublicInvoiceOrder(foundOrder);
                            }
                            setIsInitialLoading(false);
                            return; 
                        }

                        if (bossParam === 'true') {
                            setIsBossView(true);
                            setIsLoggedIn(true);
                            setRole('bos');
                            setIsInitialLoading(false);
                            return;
                        }
                        
                        if (techCode && techData) {
                            const foundTech = techData.find(t => t.access_code === techCode);
                            if (foundTech) {
                                loginUser('teknisi', foundTech);
                                window.history.replaceState({}, document.title, window.location.pathname);
                                setIsInitialLoading(false);
                                return;
                            }
                        }

                        const savedRole = localStorage.getItem('svk_role');
                        const savedUser = localStorage.getItem('svk_user');
                        if (savedRole) {
                            setRole(savedRole);
                            if (savedUser) setCurrentUser(JSON.parse(savedUser));
                            setIsLoggedIn(true);
                        }

                    } catch (error) {
                        console.error("Gagal load data:", error);
                    } finally {
                        setIsInitialLoading(false);
                    }
                };
                initApp();
            }, []);

            const loginUser = (userRole, userData) => {
                setIsLoggedIn(true);
                setRole(userRole);
                setCurrentUser(userData);
                localStorage.setItem('svk_role', userRole);
                if(userData) localStorage.setItem('svk_user', JSON.stringify(userData));
                setLoginError('');
            };

            const handleLogout = () => {
                if(window.confirm('Yakin ingin keluar dari portal?')) {
                    setIsLoggedIn(false);
                    setRole(null);
                    setCurrentUser(null);
                    setActiveTab('dashboard');
                    localStorage.removeItem('svk_role');
                    localStorage.removeItem('svk_user');
                }
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                const pin = e.target.pin.value;
                if(pin === 'serviceika_112') { 
                    loginUser('admin', { name: 'Admin Utama' });
                } else {
                    setLoginError('PIN Admin tidak valid!');
                }
            };

            const handleTechLogin = (e) => {
                e.preventDefault();
                const code = e.target.code.value.trim();
                const foundTech = technicians.find(t => t.access_code === code);
                if(foundTech) {
                    loginUser('teknisi', foundTech);
                } else {
                    setLoginError('Kode akses Teknisi tidak valid!');
                }
            };

            const kasBerjalan = transactions.filter(t => t.category === 'Kas Berjalan').reduce((sum, t) => t.type === 'in' ? sum + Number(t.amount) : sum - Number(t.amount), 0);
            const kasTetap = transactions.filter(t => t.category === 'Kas Tetap').reduce((sum, t) => t.type === 'in' ? sum + Number(t.amount) : sum - Number(t.amount), 0);

            const filteredTransactions = useMemo(() => {
                return transactions.filter(trx => {
                    const matchSearch = trx.description.toLowerCase().includes(financeFilter.search.toLowerCase());
                    const matchCategory = financeFilter.category === 'Semua' || trx.category === financeFilter.category;
                    
                    let matchStart = true;
                    let matchEnd = true;
                    if (financeFilter.startDate) {
                        matchStart = new Date(trx.date) >= new Date(financeFilter.startDate);
                    }
                    if (financeFilter.endDate) {
                        matchEnd = new Date(trx.date) <= new Date(financeFilter.endDate);
                    }
                    
                    return matchSearch && matchCategory && matchStart && matchEnd;
                });
            }, [transactions, financeFilter]);

            const isOrderActive = (status) => !['Lunas', 'Batal'].includes(status) && !status.includes('Selesai');

            const InvoiceTemplate = ({ order, isStandalone = false }) => {
                const parts = order.order_parts || [];
                const total = parts.reduce((s, p) => s + (p.is_estimate ? 0 : Number(p.price)), 0);
                
                return (
                    <div className="bg-white p-4 sm:p-8 max-w-3xl mx-auto rounded-xl shadow-lg border border-slate-100 text-slate-800" id="printable-invoice">
                        <div className="flex flex-col sm:flex-row justify-between border-b-2 border-red-600 pb-4 sm:pb-6 mb-6 sm:mb-8 gap-4">
                            <div>
                                <h1 className="text-3xl sm:text-4xl font-black text-red-700 m-0 tracking-tighter">SERVISIKA</h1>
                                <p className="text-slate-500 text-xs sm:text-sm mt-1 font-medium">Layanan Servis Alat Fitness Profesional</p>
                            </div>
                            <div className="sm:text-right">
                                <h2 className="text-xl sm:text-2xl font-black text-slate-800 m-0 tracking-tight">INVOICE / TAGIHAN</h2>
                                <p className="text-xs sm:text-sm font-bold mt-2">No: <span className="text-slate-600 font-medium">{order.order_id_text}</span></p>
                                <p className="text-xs sm:text-sm font-bold">Tanggal: <span className="text-slate-600 font-medium">{new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})}</span></p>
                            </div>
                        </div>
                        
                        <div className="flex flex-col sm:flex-row justify-between mb-6 sm:mb-8 text-sm gap-4 sm:gap-6">
                            <div className="flex-1 bg-slate-50 p-4 rounded-xl border border-slate-100">
                                <p className="font-black text-slate-400 uppercase tracking-wider text-[10px] mb-2">Klien (Ditagihkan Kepada):</p>
                                <p className="font-black text-lg text-slate-800">{order.customer}</p>
                                <p className="text-slate-600 mt-1 leading-relaxed text-xs sm:text-sm">{order.address}</p>
                                <p className="text-slate-600 mt-2 font-medium text-xs sm:text-sm"><i className="fa-brands fa-whatsapp text-emerald-500"></i> {order.phone}</p>
                            </div>
                            <div className="flex-1 bg-slate-50 p-4 rounded-xl border border-slate-100 sm:text-right">
                                <p className="font-black text-slate-400 uppercase tracking-wider text-[10px] mb-2">Detail Pengerjaan:</p>
                                <p className="font-bold text-slate-800 text-base">{order.unit}</p>
                                <p className="text-slate-600 mt-1 text-xs">Teknisi: <span className="font-bold">{order.technician_name}</span></p>
                                <p className="text-slate-600 mt-1 text-xs">Status: <span className="font-bold uppercase text-red-600">{order.status}</span></p>
                            </div>
                        </div>

                        <div className="rounded-xl overflow-hidden border border-slate-200 mb-8 w-full">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm min-w-[500px]">
                                    <thead>
                                        <tr className="bg-slate-100 text-slate-600 border-b border-slate-200">
                                            <th className="p-3 sm:p-4 font-black uppercase tracking-wider text-xs">Deskripsi (Jasa & Sparepart)</th>
                                            <th className="p-3 sm:p-4 font-black uppercase tracking-wider text-xs text-center">Garansi</th>
                                            <th className="p-3 sm:p-4 font-black uppercase tracking-wider text-xs text-right">Harga (Rp)</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {parts.map((p, i) => (
                                            <tr key={i} className="border-b border-slate-100 last:border-0 bg-white">
                                                <td className="p-3 sm:p-4 font-bold text-slate-800 text-xs sm:text-sm">
                                                    {p.name}
                                                    {p.is_estimate && <span className="ml-2 bg-orange-100 text-orange-700 text-[9px] px-1.5 py-0.5 rounded font-black uppercase">Estimasi</span>}
                                                </td>
                                                <td className="p-3 sm:p-4 text-center text-slate-500 font-medium text-xs sm:text-sm">{p.warranty_months > 0 ? `${p.warranty_months} Bln` : '-'}</td>
                                                <td className="p-3 sm:p-4 text-right font-black text-slate-800 text-sm whitespace-nowrap">
                                                    {p.is_estimate ? (
                                                        <span className="text-orange-600 text-xs">{p.estimate_text || 'Menunggu Info'}</span>
                                                    ) : (
                                                        formatRupiah(p.price)
                                                    )}
                                                </td>
                                            </tr>
                                        ))}
                                        <tr className="bg-slate-800 text-white">
                                            <td colSpan="2" className="p-4 sm:p-5 text-right font-black uppercase tracking-wider text-xs sm:text-sm">TOTAL TAGIHAN:</td>
                                            <td className="p-4 sm:p-5 text-right font-black text-lg sm:text-xl whitespace-nowrap">{formatRupiah(total)}</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="flex flex-col sm:flex-row justify-between gap-8 mt-4">
                            <div className="flex-1 relative order-2 sm:order-1">
                                <p className="font-black text-xs text-slate-400 uppercase tracking-wider mb-2">Informasi Pembayaran</p>
                                <p className="text-sm font-medium mb-2 text-slate-600">Metode: <span className="font-bold text-slate-800">Transfer / Cash</span></p>
                                <div className="bg-blue-50 border border-blue-100 p-4 rounded-xl mt-2 flex flex-col items-start gap-2">
                                    <div>
                                        <p className="font-black text-blue-800 text-lg sm:text-xl tracking-wider mb-0.5">638-042-8651 <span className="text-xs sm:text-sm text-blue-600 font-bold">(BCA)</span></p>
                                        <p className="text-xs sm:text-sm font-bold text-slate-600 mb-1">A.n: Saepul Anwar</p>
                                    </div>
                                    {isStandalone && (
                                        <button onClick={() => copyToClipboard('6380428651', 'Nomor Rekening BCA berhasil disalin!')} className="bg-white hover:bg-blue-100 text-blue-700 border border-blue-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors flex items-center justify-center gap-1.5 shadow-sm active:scale-95 w-full sm:w-auto mt-1">
                                            <i className="fa-regular fa-copy"></i> Salin Rekening
                                        </button>
                                    )}
                                </div>
                            </div>
                            
                            <div className="flex-1 flex flex-col items-center sm:items-end justify-end pt-2 text-center sm:text-right order-1 sm:order-2 relative">
                                <p className="text-sm font-bold text-slate-500 z-10 relative">Hormat Kami,</p>
                                <img src="https://i.imghippo.com/files/xW8261yx.png" alt="Tanda Tangan Servisika" className="w-48 sm:w-56 object-contain mix-blend-multiply opacity-90 -my-8 sm:-my-10 relative z-0 pointer-events-none" />
                                <p className="font-black text-slate-800 border-t border-slate-300 pt-1 w-40 text-center sm:text-right z-10 relative">Admin Servisika</p>
                            </div>
                        </div>
                        
                        {isStandalone && (
                            <div className="mt-12 text-center no-print border-t border-slate-100 pt-8">
                                <button onClick={() => window.print()} className="bg-red-600 hover:bg-red-700 text-white px-8 py-3.5 rounded-xl font-bold shadow-xl shadow-red-600/20 transition-transform active:scale-95 flex items-center justify-center gap-2 mx-auto w-full sm:w-auto">
                                    <i className="fa-solid fa-print"></i> Cetak / Simpan PDF
                                </button>
                                <p className="text-xs text-slate-400 mt-4 font-medium max-w-sm mx-auto">Gunakan fitur Print browser Anda dan pilih "Save as PDF" (Simpan sebagai PDF) untuk menyimpan tagihan.</p>
                            </div>
                        )}
                    </div>
                );
            };

            const handlePrintInvoice = (order) => {
                const printContent = ReactDOMServer.renderToString(<InvoiceTemplate order={order} isStandalone={false} />);
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                    <head>
                        <title>Invoice - ${order.order_id_text}</title>
                        <script src="https://cdn.tailwindcss.com"><\/script>
                        <style>
                            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
                            body { font-family: 'Inter', sans-serif; background: #fff; padding: 20px; }
                            @media print { body { padding: 0; } }
                        </style>
                    </head>
                    <body>${printContent}</body>
                    <script>window.onload = () => { setTimeout(() => { window.print(); }, 500); }<\/script>
                    </html>
                `);
                printWindow.document.close();
            };

            const generateInvoiceLink = (orderId) => {
                const appUrl = window.location.origin + window.location.pathname;
                return `${appUrl}?invoice=${orderId}`;
            };

            const handleSaveUpdateOrder = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const formData = new FormData(e.target);
                const status = formData.get('status');
                const notes = formData.get('notes');
                
                const customer = formData.get('customer') || selectedOrder.customer;
                const address = formData.get('address') || selectedOrder.address;
                const phone = formData.get('phone') || selectedOrder.phone;
                const date = formData.get('date') || selectedOrder.date;
                const technician_name = formData.get('technician') || selectedOrder.technician_name;
                const time_estimate = formData.get('time_estimate') || selectedOrder.time_estimate || '';

                try {
                    await supabase.from('orders').update({ status, notes, customer, address, phone, date, technician_name, time_estimate }).eq('id', selectedOrder.id);
                    
                    await supabase.from('order_parts').delete().eq('order_id', selectedOrder.id);
                    const partsToInsert = modalParts.filter(p => p.name.trim() !== '').map(p => ({
                        order_id: selectedOrder.id,
                        name: p.name,
                        price: parseCurrency(p.price),
                        warranty_months: Number(p.warranty_months || 0),
                        is_estimate: p.is_estimate || false,
                        estimate_text: p.estimate_text || ''
                    }));
                    if(partsToInsert.length > 0) {
                        await supabase.from('order_parts').insert(partsToInsert);
                    }

                    if(status === 'Lunas' && selectedOrder.status !== 'Lunas' && role === 'admin') {
                        const totalAmount = partsToInsert.reduce((sum, p) => sum + (p.is_estimate ? 0 : p.price), 0);
                        if(totalAmount > 0) {
                            const newTrx = {
                                date: new Date().toISOString().split('T')[0],
                                type: 'in', category: 'Kas Berjalan',
                                amount: totalAmount, description: `Pelunasan Order: ${customer} (${selectedOrder.order_id_text})`
                            };
                            await supabase.from('transactions').insert([newTrx]);
                        }
                    }

                    const { data: trxData } = await supabase.from('transactions').select('*').order('date', { ascending: false });
                    if (trxData) setTransactions(trxData);

                    const { data: ordData } = await supabase.from('orders').select('*, order_parts(*)').order('date', { ascending: false });
                    if(ordData) setOrders(ordData);
                    setShowOrderModal(false);
                } catch (error) {
                    console.error("Gagal simpan:", error);
                    alert('Gagal menyimpan data ke database. Cek console log.');
                } finally {
                    setIsSaving(false);
                }
            };
            
            const handleDeleteOrder = async (id) => {
                if(window.confirm('YAKIN INGIN MENGHAPUS ORDER INI? Data invoice akan hilang permanen.')) {
                    await supabase.from('orders').delete().eq('id', id);
                    setOrders(orders.filter(o => o.id !== id));
                    setShowOrderModal(false);
                }
            };

            const handleAddTransaction = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const formData = new FormData(e.target);
                const newTrx = {
                    date: formData.get('date'), type: formData.get('type'),
                    category: formData.get('category'), amount: parseCurrency(formData.get('amount')),
                    description: formData.get('desc')
                };
                const { data, error } = await supabase.from('transactions').insert([newTrx]).select();
                if (!error && data) {
                    setTransactions([data[0], ...transactions]);
                    setShowFinanceModal(false);
                }
                setIsSaving(false);
            };

            const handleDeleteTransaction = async (id) => {
                if(window.confirm('Yakin ingin menghapus mutasi ini? Saldo akan disesuaikan otomatis.')) {
                    await supabase.from('transactions').delete().eq('id', id);
                    setTransactions(transactions.filter(t => t.id !== id));
                }
            };

            const handleCreateOrder = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const formData = new FormData(e.target);
                const technician_name = formData.get('technician') || 'Belum Ditugaskan';

                const newOrder = {
                    date: formData.get('date'), customer: formData.get('customer'),
                    phone: formData.get('phone'), address: formData.get('address'),
                    unit: formData.get('unit'), issue: formData.get('issue'),
                    technician_name: technician_name, status: 'Proses',
                    time_estimate: formData.get('time_estimate') || '',
                    order_id_text: 'ORD-' + Math.floor(Math.random() * 10000)
                };
                const { data, error } = await supabase.from('orders').insert([newOrder]).select();
                if (!error && data) {
                    const defaultPart = { order_id: data[0].id, name: 'Jasa Kunjungan & Pengecekan', price: 250000, warranty_months: 0, is_estimate: false };
                    await supabase.from('order_parts').insert([defaultPart]);
                    const { data: ordData } = await supabase.from('orders').select('*, order_parts(*)').order('date', { ascending: false });
                    if(ordData) setOrders(ordData);
                    setShowOrderModal(false);
                }
                setIsSaving(false);
            };

            const handleAddTechnician = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const formData = new FormData(e.target);
                const name = formData.get('name');
                const phone = formData.get('phone');
                const access_code = 'TECH_' + Math.random().toString(36).substring(2, 6).toUpperCase();

                try {
                    const { data, error } = await supabase.from('technicians').insert([{ name, phone, access_code }]).select();
                    if (error) throw error;
                    if (data) {
                        setTechnicians([data[0], ...technicians]);
                        setShowTechModal(false);

                                    <button onClick={() => setShowOrderModal(false)} className="text-slate-400 hover:text-slate-800 bg-white p-2 w-8 h-8 flex items-center justify-center rounded-full border border-slate-200 shadow-sm"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleCreateOrder} className="p-6 space-y-4 max-h-[70vh] overflow-y-auto">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Tgl Penjadwalan</label><input type="date" name="date" required defaultValue={new Date().toISOString().split('T')[0]} className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-red-500 text-slate-700 bg-slate-50" /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Nama Klien</label><input type="text" name="customer" required placeholder="Cth: Budi / PT Maju" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-red-500 text-slate-800" /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">No. WhatsApp</label><input type="text" name="phone" required placeholder="0812..." className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-red-500 text-slate-800" /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Tipe Alat & Kendala</label>
                                        <div className="space-y-2">
                                            <input type="text" name="unit" required placeholder="Tipe Alat (Treadmill...)" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-red-500 text-slate-800" />
                                            <textarea name="issue" required placeholder="Detail kendala..." rows="2" className="w-full border-2 border-slate-200 p-3 rounded-xl font-medium outline-none focus:border-red-500 text-slate-800 resize-none"></textarea>
                                        </div>
                                    </div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Alamat Lokasi</label><textarea name="address" required placeholder="Alamat lengkap..." rows="2" className="w-full border-2 border-slate-200 p-3 rounded-xl font-medium outline-none focus:border-red-500 text-slate-800 resize-none"></textarea></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Tugaskan Teknisi</label>
                                        <select name="technician" className="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold outline-none focus:border-red-500 cursor-pointer bg-slate-50 text-slate-800">
                                            <option value="">-- Belum Ditugaskan --</option>
                                            {technicians.map(t => <option key={t.id} value={t.name}>{t.name}</option>)}
                                        </select>
                                    </div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Estimasi Waktu Datang</label><input type="text" name="time_estimate" placeholder="Cth: 08:00 - 10:00" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-red-500 text-slate-800" /></div>
                                    
                                    <div className="pt-2 border-t border-slate-100">
                                        <button type="submit" disabled={isSaving} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-red-600/30 transition-transform active:scale-95 disabled:opacity-50">
                                            {isSaving ? 'Menyimpan...' : 'Simpan & Buat Order'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Pop-up Galeri Folder */}
                    {selectedGalleryFolder && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden border border-slate-200">
                                <div className="bg-blue-50 border-b border-blue-100 p-5 flex justify-between items-center">
                                    <h3 className="font-black text-xl text-blue-800 flex items-center gap-2"><i className="fa-solid fa-folder-open"></i> Isi Folder</h3>
                                    <button onClick={() => setSelectedGalleryFolder(null)} className="text-blue-400 hover:text-blue-800 bg-white p-2 w-8 h-8 flex items-center justify-center rounded-full border border-blue-200 shadow-sm"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="p-6">
                                    <p className="font-bold text-slate-800 text-lg mb-1">{selectedGalleryFolder.customer}</p>
                                    <p className="text-xs text-slate-500 font-medium mb-4">{selectedGalleryFolder.unit} - {selectedGalleryFolder.issue}</p>
                                    
                                    <div className="border border-slate-200 rounded-xl bg-slate-50 p-12 text-center shadow-inner">
                                        <i className="fa-regular fa-images text-5xl text-slate-300 mb-3 block"></i>
                                        <p className="font-bold text-slate-600 mb-1">Belum ada file di folder ini.</p>
                                        <p className="text-xs text-slate-400 font-medium">Fitur upload teknisi ke Supabase Storage akan segera diaktifkan.</p>
                                    </div>
                                    
                                    <div className="mt-6 flex justify-end">
                                        <button className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md transition-colors flex items-center gap-2">
                                            <i className="fa-solid fa-download"></i> Download Folder (ZIP)
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Tambah Transaksi Kas */}
                    {showFinanceModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden border border-slate-200">
                                <div className="bg-emerald-50 border-b border-emerald-100 p-5 flex justify-between items-center">
                                    <h3 className="font-black text-xl text-emerald-800 flex items-center gap-2"><i className="fa-solid fa-file-invoice-dollar"></i> Catat Transaksi</h3>
                                    <button onClick={() => setShowFinanceModal(false)} className="text-emerald-600 hover:bg-emerald-100 bg-white p-2 w-8 h-8 flex items-center justify-center rounded-full border border-emerald-200 shadow-sm"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleAddTransaction} className="p-6 space-y-4">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Tgl Transaksi</label><input type="date" name="date" required defaultValue={new Date().toISOString().split('T')[0]} className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-emerald-500 text-slate-700 bg-slate-50" /></div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Jenis</label>
                                            <select name="type" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-emerald-500 bg-slate-50 cursor-pointer text-slate-700">
                                                <option value="in">Pemasukan (+)</option>
                                                <option value="out">Pengeluaran (-)</option>
                                            </select>
                                        </div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Kategori Kas</label>
                                            <select name="category" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-emerald-500 bg-slate-50 cursor-pointer text-slate-700">
                                                <option value="Kas Berjalan">Kas Berjalan</option>
                                                <option value="Kas Tetap">Kas Tetap</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Nominal Rupiah</label>
                                        <div className="relative">
                                            <span className="absolute left-4 top-[17px] text-slate-400 font-black text-lg">Rp</span>
                                            <input type="text" name="amount" required onChange={(e) => e.target.value = formatNumberStr(e.target.value)} placeholder="0" className="w-full border-2 border-slate-200 p-4 pl-12 rounded-xl font-black text-2xl outline-none focus:border-emerald-500 text-slate-800" />
                                        </div>
                                    </div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Keterangan</label><input type="text" name="desc" required placeholder="Cth: Beli sparepart..." className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-emerald-500 text-slate-800" /></div>
                                    <div className="pt-2 border-t border-slate-100">
                                        <button type="submit" disabled={isSaving} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-600/30 transition-transform active:scale-95 disabled:opacity-50">
                                            {isSaving ? 'Menyimpan...' : 'Simpan Transaksi'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Detail Kas Khusus */}
                    {showCashDetailModal.isOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-2xl w-full max-w-3xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden border border-slate-200">
                                <div className={`p-6 flex justify-between items-center shrink-0 text-white ${showCashDetailModal.type === 'Kas Berjalan' ? 'bg-blue-600' : 'bg-red-600'}`}>
                                    <div><p className="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">Riwayat Filter</p><h3 className="font-black text-2xl">{showCashDetailModal.type}</h3></div>
                                    <button onClick={() => setShowCashDetailModal({ isOpen: false, type: null })} className="bg-black/20 hover:bg-black/30 w-10 h-10 flex items-center justify-center rounded-full transition-colors"><i className="fa-solid fa-xmark text-lg"></i></button>
                                </div>
                                <div className="overflow-y-auto flex-1 bg-slate-50">
                                    <div className="divide-y divide-slate-200 bg-white">
                                        {transactions.filter(t => t.category === showCashDetailModal.type).map(trx => (
                                            <div key={trx.id} className="p-4 sm:p-5 flex justify-between items-center hover:bg-slate-50 transition-colors group">
                                                <div>
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1"><i className="fa-regular fa-calendar mr-1"></i> {new Date(trx.date).toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})}</p>
                                                    <p className="font-bold text-slate-800 text-sm">{trx.description}</p>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <div className={`font-black text-base sm:text-lg ${trx.type === 'in' ? 'text-green-600' : 'text-red-600'}`}>
                                                        {trx.type === 'in' ? '+' : '-'}{formatRupiah(trx.amount)}
                                                    </div>
                                                    <button onClick={() => handleDeleteTransaction(trx.id)} className="text-slate-400 hover:text-red-600 p-2 bg-slate-50 hover:bg-red-50 border border-transparent hover:border-red-100 rounded-lg transition-all shadow-sm active:scale-95"><i className="fa-solid fa-trash"></i></button>
                                                </div>
                                            </div>
                                        ))}
                                        {transactions.filter(t => t.category === showCashDetailModal.type).length === 0 && <div className="py-16 text-center text-slate-400 font-medium"><i className="fa-solid fa-folder-open text-4xl mb-3 opacity-30 block"></i>Belum ada transaksi di kas ini.</div>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Modal Tambah Teknisi */}
                    {showTechModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden border border-slate-200">
                                <div className="bg-slate-50 border-b border-slate-200 p-5 flex justify-between items-center">
                                    <h3 className="font-black text-xl text-slate-800 flex items-center gap-2"><i className="fa-solid fa-user-plus text-red-600"></i> Tambah Teknisi</h3>
                                    <button onClick={() => setShowTechModal(false)} className="text-slate-400 hover:text-slate-800 bg-white p-2 w-8 h-8 flex items-center justify-center rounded-full border border-slate-200 shadow-sm"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleAddTechnician} className="p-6 space-y-4">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Nama Panggilan / Lengkap</label>
                                        <input type="text" name="name" required placeholder="Cth: Away" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-red-500 text-slate-700 bg-slate-50" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Nomor WA Aktif</label>
                                        <input type="text" name="phone" required placeholder="Cth: 08123..." className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-red-500 text-slate-700 bg-slate-50" />
                                    </div>
                                    <div className="pt-4 border-t border-slate-100">
                                        <button type="submit" disabled={isSaving} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-red-600/30 transition-transform active:scale-95 disabled:opacity-50">
                                            {isSaving ? 'Menyimpan...' : 'Simpan & Buat Akses'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </>
            );

            return (
                <div className="h-screen w-full flex overflow-hidden">
                    <Navigation />
                    <div className={`flex-1 flex flex-col h-full overflow-hidden relative bg-slate-50/50 ${isBossView ? '' : 'md:ml-64'}`}>
                        {!isBossView && (
                            <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 sm:px-6 py-4 flex items-center justify-between z-40 sticky top-0 no-print shadow-sm">
                                <div className="flex items-center gap-4">
                                    <button className="md:hidden text-slate-600 bg-slate-100 hover:bg-slate-200 p-2.5 rounded-xl transition-colors active:scale-95" onClick={() => setIsMobileMenuOpen(true)}><i className="fa-solid fa-bars-staggered text-xl"></i></button>
                                    <div>
                                        <h1 className="text-lg sm:text-xl font-black text-slate-800 leading-none mb-1 tracking-tight">{role === 'admin' ? 'Portal Manajemen' : 'Aplikasi Teknisi'}</h1>
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                    </div>
                                </div>
                            </header>
                        )}
                        
                        <main className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 pb-24 no-print relative">
                            {role === 'admin' && activeTab === 'dashboard' && renderDashboard()}
                            {role === 'admin' && activeTab === 'jadwal' && renderJadwal()}
                            {role === 'admin' && activeTab === 'galeri' && renderGaleri()}
                            {role === 'admin' && activeTab === 'keuangan' && renderKeuangan()}
                            {role === 'admin' && activeTab === 'tim' && renderTim()}
                            
                            {role === 'bos' && activeTab === 'dashboard' && renderDashboard()}
                            
                            {role === 'teknisi' && renderTeknisiPortal()}
                        </main>
                    </div>
                    {renderModals()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
