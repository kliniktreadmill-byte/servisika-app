<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servisika Management App</title>
    
    <!-- React & ReactDOM (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel untuk menerjemahkan JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans selection:bg-red-200 selection:text-red-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // KONEKSI DATABASE SUPABASE
        const SUPABASE_URL = 'https://fpvnlwcjnmfiyrlbhgvi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdm5sd2Nqbm1maXlybGJoZ3ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1ODA0ODksImV4cCI6MjEwMDE1NjQ4OX0.Y5eBJEjxfOEv0ES-LUYfY6aP7zaRIdp5L2XAzvLZLks';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            // STATE APLIKASI UTAMA
            const [role, setRole] = useState('admin');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isLoading, setIsLoading] = useState(true);

            // STATE DATA DATABASE
            const [transactions, setTransactions] = useState([]);
            const [technicians, setTechnicians] = useState([]);
            const [orders, setOrders] = useState([]);

            // MODAL STATES
            const [showFinanceModal, setShowFinanceModal] = useState(false);
            const [showCashDetailModal, setShowCashDetailModal] = useState({ isOpen: false, type: null });
            const [showTechModal, setShowTechModal] = useState(false);

            // FILTER & SEARCH STATES (Untuk Arus Kas)
            const [financeFilter, setFinanceFilter] = useState({
                search: '',
                category: 'Semua',
                startDate: '',
                endDate: ''
            });

            // FETCH DATA DARI SUPABASE SAAT APLIKASI DIBUKA
            useEffect(() => {
                fetchAllData();
            }, []);

            const fetchAllData = async () => {
                setIsLoading(true);
                try {
                    // Ambil Data Transaksi
                    const { data: trxData, error: trxError } = await supabase
                        .from('transactions')
                        .select('*')
                        .order('date', { ascending: false });
                    if (!trxError) setTransactions(trxData);

                    // Ambil Data Teknisi
                    const { data: techData, error: techError } = await supabase
                        .from('technicians')
                        .select('*')
                        .order('created_at', { ascending: false });
                    if (!techError) setTechnicians(techData);

                    // Ambil Data Order (Sederhana dulu untuk prototype)
                    const { data: ordData, error: ordError } = await supabase
                        .from('orders')
                        .select('*')
                        .order('date', { ascending: false });
                    if (!ordError) setOrders(ordData);

                } catch (error) {
                    console.error("Gagal mengambil data:", error);
                } finally {
                    setIsLoading(false);
                }
            };

            const formatRupiah = (number) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
            };

            // Hitung Saldo Kas Berjalan & Tetap
            const kasBerjalan = transactions.filter(t => t.category === 'Kas Berjalan').reduce((sum, t) => t.type === 'in' ? sum + Number(t.amount) : sum - Number(t.amount), 0);
            const kasTetap = transactions.filter(t => t.category === 'Kas Tetap').reduce((sum, t) => t.type === 'in' ? sum + Number(t.amount) : sum - Number(t.amount), 0);

            // Filter Transaksi Dinamis
            const filteredTransactions = useMemo(() => {
                return transactions.filter(trx => {
                    const matchSearch = trx.description.toLowerCase().includes(financeFilter.search.toLowerCase());
                    const matchCategory = financeFilter.category === 'Semua' || trx.category === financeFilter.category;
                    const matchStartDate = financeFilter.startDate ? trx.date >= financeFilter.startDate : true;
                    const matchEndDate = financeFilter.endDate ? trx.date <= financeFilter.endDate : true;
                    return matchSearch && matchCategory && matchStartDate && matchEndDate;
                });
            }, [transactions, financeFilter]);

            const handleAddTransaction = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newTrx = {
                    date: formData.get('date'),
                    type: formData.get('type'),
                    category: formData.get('category'),
                    amount: parseFloat(formData.get('amount')),
                    description: formData.get('desc')
                };

                const { data, error } = await supabase.from('transactions').insert([newTrx]).select();
                if (!error) {
                    setTransactions([data[0], ...transactions]);
                    setShowFinanceModal(false);
                } else {
                    alert("Gagal menyimpan transaksi!");
                }
            };

            const handleDeleteTransaction = async (id) => {
                if(window.confirm('Yakin ingin menghapus mutasi ini? Saldo akan disesuaikan otomatis.')) {
                    const { error } = await supabase.from('transactions').delete().eq('id', id);
                    if (!error) {
                        setTransactions(transactions.filter(t => t.id !== id));
                    }
                }
            };

            const handleAddTechnician = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const randomCode = Math.random().toString(36).substring(2, 10);
                
                const newTech = {
                    name: formData.get('name'),
                    phone: formData.get('phone'),
                    access_code: 'tech_' + randomCode
                };

                const { data, error } = await supabase.from('technicians').insert([newTech]).select();
                if (!error) {
                    setTechnicians([data[0], ...technicians]);
                    setShowTechModal(false);
                }
            };

            const handleDeleteTechnician = async (id) => {
                if(window.confirm('Yakin ingin menghapus teknisi ini?')) {
                    const { error } = await supabase.from('technicians').delete().eq('id', id);
                    if (!error) setTechnicians(technicians.filter(t => t.id !== id));
                }
            };

            const Navigation = () => (
                <div className={`fixed inset-y-0 left-0 z-50 w-64 bg-red-700 text-white transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col shadow-2xl`}>
                    <div className="p-6 flex items-center justify-between border-b border-red-600">
                        <div className="flex items-center gap-3">
                            <i className="fa-solid fa-wrench text-2xl"></i>
                            <h1 className="text-2xl font-black tracking-tight">SERVISIKA</h1>
                        </div>
                        <button className="md:hidden text-white bg-red-800 p-2 rounded-lg" onClick={() => setIsMobileMenuOpen(false)}>
                            <i className="fa-solid fa-xmark"></i>
                        </button>
                    </div>

                    <div className="p-4 flex-1 overflow-y-auto">
                        <p className="text-red-200 text-xs font-bold uppercase tracking-wider mb-4 px-3">Menu {role === 'admin' ? 'Admin' : 'Teknisi'}</p>
                        <ul className="space-y-2">
                            {role === 'admin' ? (
                                <>
                                    {[
                                        { id: 'dashboard', icon: 'fa-house', label: 'Dashboard' },
                                        { id: 'jadwal', icon: 'fa-calendar-days', label: 'Jadwal & Order' },
                                        { id: 'keuangan', icon: 'fa-money-bill-wave', label: 'Arus Kas' },
                                        { id: 'tim', icon: 'fa-users', label: 'Tim Teknisi' }
                                    ].map(item => (
                                        <li key={item.id}>
                                            <button onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === item.id ? 'bg-white text-red-700 shadow-md font-bold' : 'text-red-100 hover:bg-red-600 font-medium'}`}>
                                                <i className={`fa-solid ${item.icon} w-5 text-center`}></i> <span>{item.label}</span>
                                            </button>
                                        </li>
                                    ))}
                                </>
                            ) : (
                                <li>
                                    <button onClick={() => { setActiveTab('dashboard'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'dashboard' ? 'bg-white text-red-700 shadow-md font-bold' : 'text-red-100 hover:bg-red-600 font-medium'}`}>
                                        <i className="fa-solid fa-clock w-5 text-center"></i> <span>Tugas Hari Ini</span>
                                    </button>
                                </li>
                            )}
                        </ul>
                    </div>
                    
                    <div className="p-5 border-t border-red-600 bg-red-800/50 mt-auto">
                        <button 
                            onClick={() => { setRole(role === 'admin' ? 'teknisi' : 'admin'); setActiveTab('dashboard'); }}
                            className="w-full text-xs bg-red-900 hover:bg-red-950 text-white py-2.5 rounded-xl transition-colors font-bold border border-red-700/50 shadow-sm"
                        >
                            Simulasi: Ganti ke {role === 'admin' ? 'Teknisi' : 'Admin'}
                        </button>
                    </div>
                </div>
            );

            const renderDashboard = () => (
                <div className="space-y-6">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <h2 className="text-2xl sm:text-3xl font-black text-gray-800">Dashboard</h2>
                            <p className="text-gray-500 text-sm mt-1">Ringkasan operasional Servisika hari ini.</p>
                        </div>
                        <button className="w-full sm:w-auto bg-white border border-gray-200 text-gray-700 px-4 py-2.5 rounded-xl text-sm font-bold flex justify-center items-center gap-2 hover:bg-gray-50 shadow-sm transition-all active:scale-95">
                            <i className="fa-solid fa-link"></i> Link Laporan Bos
                        </button>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                            <div className="bg-blue-100 p-4 rounded-xl text-blue-600 shrink-0"><i className="fa-solid fa-wrench text-xl"></i></div>
                            <div><p className="text-sm text-gray-500 font-medium">Order Aktif</p><h3 className="text-2xl font-black text-gray-800">{orders.length}</h3></div>
                        </div>
                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                            <div className="bg-green-100 p-4 rounded-xl text-green-600 shrink-0"><i className="fa-solid fa-check text-xl"></i></div>
                            <div><p className="text-sm text-gray-500 font-medium">Selesai Bulan Ini</p><h3 className="text-2xl font-black text-gray-800">0</h3></div>
                        </div>
                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                            <div className="bg-red-100 p-4 rounded-xl text-red-600 shrink-0"><i className="fa-solid fa-circle-exclamation text-xl"></i></div>
                            <div><p className="text-sm text-gray-500 font-medium">Kendala/Pending</p><h3 className="text-2xl font-black text-gray-800">0</h3></div>
                        </div>
                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                            <div className="bg-yellow-100 p-4 rounded-xl text-yellow-600 shrink-0"><i className="fa-solid fa-money-bill-wave text-xl"></i></div>
                            <div className="overflow-hidden">
                                <p className="text-sm text-gray-500 font-medium truncate">Kas Berjalan</p>
                                <h3 className="text-lg font-black text-gray-800 truncate">{formatRupiah(kasBerjalan)}</h3>
                            </div>
                        </div>
                    </div>

                    {/* Ringkasan Jadwal & Order (Sesuai Noted) */}
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mt-6">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-bold text-gray-800">Jadwal Minggu Ini</h3>
                            <button onClick={() => setActiveTab('jadwal')} className="text-sm text-red-600 font-bold hover:underline">Lihat Semua Order &rarr;</button>
                        </div>
                        <div className="text-center p-8 bg-gray-50 rounded-xl border border-dashed border-gray-200">
                            <p className="text-gray-500 text-sm">Belum ada jadwal order untuk minggu ini.</p>
                            <button onClick={() => setActiveTab('jadwal')} className="mt-3 bg-white border border-gray-200 px-4 py-2 rounded-lg text-sm font-bold text-gray-700 hover:bg-gray-100 shadow-sm">Buat Order Pertama</button>
                        </div>
                    </div>
                </div>
            );

            const renderKeuangan = () => (
                <div className="space-y-6">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <h2 className="text-2xl sm:text-3xl font-black text-gray-800">Manajemen Arus Kas</h2>
                            <p className="text-gray-500 text-sm mt-1">Pantau dan kelola tabungan serta dana operasional.</p>
                        </div>
                        <button onClick={() => setShowFinanceModal(true)} className="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex justify-center items-center gap-2 shadow-sm transition-all">
                            <i className="fa-solid fa-plus"></i> Catat Transaksi
                        </button>
                    </div>

                    {/* Kartu Kas - Bisa diklik */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div onClick={() => setShowCashDetailModal({ isOpen: true, type: 'Kas Berjalan' })} className="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-2xl text-white shadow-md cursor-pointer hover:-translate-y-1 transition-transform group">
                            <p className="text-blue-200 font-medium mb-1 text-sm uppercase tracking-wider">Kas Berjalan (Operasional)</p>
                            <h3 className="text-3xl sm:text-4xl font-black mb-4 truncate">{formatRupiah(kasBerjalan)}</h3>
                            <div className="inline-flex items-center gap-2 text-sm bg-white/20 px-3 py-1.5 rounded-lg group-hover:bg-white/30 transition-colors">
                                Lihat Detail Mutasi <i className="fa-solid fa-arrow-right"></i>
                            </div>
                        </div>
                        <div onClick={() => setShowCashDetailModal({ isOpen: true, type: 'Kas Tetap' })} className="bg-gradient-to-br from-red-600 to-red-800 p-6 rounded-2xl text-white shadow-md cursor-pointer hover:-translate-y-1 transition-transform group">
                            <p className="text-red-200 font-medium mb-1 text-sm uppercase tracking-wider">Kas Tetap (Tabungan Usaha)</p>
                            <h3 className="text-3xl sm:text-4xl font-black mb-4 truncate">{formatRupiah(kasTetap)}</h3>
                            <div className="inline-flex items-center gap-2 text-sm bg-white/20 px-3 py-1.5 rounded-lg group-hover:bg-white/30 transition-colors">
                                Lihat Detail Mutasi <i className="fa-solid fa-arrow-right"></i>
                            </div>
                        </div>
                    </div>

                    {/* Filter & Mutasi Keseluruhan */}
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                        <div className="p-5 border-b border-gray-100 bg-gray-50 flex flex-col gap-4">
                            <h3 className="font-black text-gray-800 text-lg">Mutasi Keseluruhan</h3>
                            
                            {/* Alat Filter Sesuai Catatan */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3">
                                <div className="flex bg-white border border-gray-200 rounded-xl overflow-hidden px-3 items-center focus-within:border-red-500 focus-within:ring-1 focus-within:ring-red-500 transition-shadow">
                                    <i className="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
                                    <input type="text" placeholder="Cari keterangan..." value={financeFilter.search} onChange={e => setFinanceFilter({...financeFilter, search: e.target.value})} className="w-full p-2 outline-none text-sm font-medium" />
                                </div>
                                <select value={financeFilter.category} onChange={e => setFinanceFilter({...financeFilter, category: e.target.value})} className="bg-white border border-gray-200 p-2.5 rounded-xl text-sm font-medium outline-none">
                                    <option value="Semua">Semua Kategori</option>
                                    <option value="Kas Berjalan">Kas Berjalan Saja</option>
                                    <option value="Kas Tetap">Kas Tetap Saja</option>
                                </select>
                                <input type="date" value={financeFilter.startDate} onChange={e => setFinanceFilter({...financeFilter, startDate: e.target.value})} className="bg-white border border-gray-200 p-2.5 rounded-xl text-sm font-medium outline-none text-gray-500" title="Dari Tanggal" />
                                <input type="date" value={financeFilter.endDate} onChange={e => setFinanceFilter({...financeFilter, endDate: e.target.value})} className="bg-white border border-gray-200 p-2.5 rounded-xl text-sm font-medium outline-none text-gray-500" title="Sampai Tanggal" />
                            </div>
                        </div>

                        <div className="divide-y divide-gray-100">
                            {filteredTransactions.map(trx => (
                                <div key={trx.id} className="p-4 sm:p-5 flex justify-between items-center hover:bg-gray-50 transition-colors">
                                    <div className="flex-1">
                                        <div className="flex items-center gap-2 mb-1">
                                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded uppercase border ${trx.category === 'Kas Berjalan' ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-red-50 text-red-700 border-red-200'}`}>
                                                {trx.category}
                                            </span>
                                            <span className="text-xs text-gray-400 font-medium">{trx.date}</span>
                                        </div>
                                        <p className="font-bold text-gray-800 text-sm">{trx.description}</p>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <div className={`font-black text-lg ${trx.type === 'in' ? 'text-green-600' : 'text-red-600'}`}>
                                            {trx.type === 'in' ? '+' : '-'}{formatRupiah(trx.amount)}
                                        </div>
                                        <button onClick={() => handleDeleteTransaction(trx.id)} className="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-transparent hover:border-red-100" title="Hapus"><i className="fa-solid fa-trash"></i></button>
                                    </div>
                                </div>
                            ))}
                            {filteredTransactions.length === 0 && (
                                <div className="p-10 text-center text-gray-500">
                                    <i className="fa-solid fa-file-invoice text-3xl text-gray-300 mb-3"></i>
                                    <p className="font-medium text-sm">Tidak ada mutasi yang sesuai filter.</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            const renderTim = () => (
                <div className="space-y-6">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <h2 className="text-2xl sm:text-3xl font-black text-gray-800">Tim Teknisi</h2>
                            <p className="text-gray-500 text-sm mt-1">Kelola data teknisi dan kirim link akses mereka.</p>
                        </div>
                        <button onClick={() => setShowTechModal(true)} className="w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex justify-center items-center gap-2 shadow-sm transition-all active:scale-95">
                            <i className="fa-solid fa-plus"></i> Tambah Teknisi
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {technicians.map(tech => {
                            const waMessage = `Halo ${tech.name}, ini adalah link khusus untuk akses aplikasi teknisi Servisika kamu. Jangan bagikan link ini ke orang lain ya! \n\nLink Akses: https://servisika-app.vercel.app/portal/${tech.access_code}`;
                            const waUrl = `https://wa.me/${tech.phone.replace(/^0/, '62')}?text=${encodeURIComponent(waMessage)}`;

                            return (
                            <div key={tech.id} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 relative">
                                <div className="flex justify-between items-start mb-4">
                                    <div className="flex items-center gap-3">
                                        <div className="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center text-gray-600 font-black text-xl">
                                            {tech.name.charAt(0)}
                                        </div>
                                        <div>
                                            <h3 className="font-black text-lg text-gray-800 leading-none">{tech.name}</h3>
                                            <span className="text-[10px] text-green-600 font-bold uppercase tracking-wider">{tech.status}</span>
                                        </div>
                                    </div>
                                    <button onClick={() => handleDeleteTechnician(tech.id)} className="text-gray-400 hover:text-red-600 p-1">
                                        <i className="fa-solid fa-trash"></i>
                                    </button>
                                </div>
                                <div className="text-sm text-gray-600 bg-gray-50 p-2 rounded-lg mb-4 flex items-center gap-2">
                                    <i className="fa-solid fa-phone text-gray-400"></i> {tech.phone}
                                </div>
                                <div className="pt-4 border-t border-gray-100">
                                    <button onClick={() => window.open(waUrl, '_blank')} className="w-full bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 py-2 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition-colors">
                                        <i className="fa-brands fa-whatsapp text-lg"></i> Kirim Link ke WA
                                    </button>
                                </div>
                            </div>
                            )
                        })}
                        {technicians.length === 0 && (
                             <div className="col-span-full p-8 text-center text-gray-500 bg-white border border-gray-100 rounded-2xl border-dashed">
                                <p className="font-medium text-sm">Belum ada data teknisi.</p>
                            </div>
                        )}
                    </div>
                </div>
            );

            if (isLoading) return <div className="h-screen w-full flex items-center justify-center bg-gray-50"><p className="font-bold text-gray-500 animate-pulse">Menghubungkan ke Supabase...</p></div>;

            return (
                <div className="h-screen w-full flex overflow-hidden">
                    <Navigation />
                    
                    <div className="flex-1 md:ml-64 flex flex-col h-full overflow-hidden relative">
                        <header className="bg-white shadow-sm border-b border-gray-200 px-4 py-3 sm:py-4 flex items-center justify-between z-40">
                            <div className="flex items-center gap-3">
                                <button className="md:hidden text-gray-600 bg-gray-100 p-2 rounded-lg" onClick={() => setIsMobileMenuOpen(true)}>
                                    <i className="fa-solid fa-bars"></i>
                                </button>
                                <div>
                                    <h1 className="font-black text-gray-800 leading-tight">{role === 'admin' ? 'Portal Manajemen' : 'Aplikasi Teknisi'}</h1>
                                    <p className="text-[10px] sm:text-xs text-gray-500 font-medium">{new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                </div>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 pb-20">
                            <div className="max-w-6xl mx-auto">
                                {role === 'admin' && activeTab === 'dashboard' && renderDashboard()}
                                {role === 'admin' && activeTab === 'jadwal' && (
                                     <div className="text-center p-10 bg-white rounded-2xl border border-gray-100 shadow-sm mt-10">
                                         <i className="fa-solid fa-calendar-days text-4xl text-gray-300 mb-4"></i>
                                         <h3 className="text-xl font-black text-gray-800">Modul Jadwal & Order</h3>
                                         <p className="text-gray-500 text-sm max-w-md mx-auto mt-2">Struktur database untuk tabel order sudah siap di Supabase. Antarmuka form Order Baru akan dikembangkan pada update *repository* tahap berikutnya.</p>
                                     </div>
                                )}
                                {role === 'admin' && activeTab === 'keuangan' && renderKeuangan()}
                                {role === 'admin' && activeTab === 'tim' && renderTim()}
                                
                                {role === 'teknisi' && (
                                    <div className="text-center p-10 mt-10">
                                        <h3 className="text-xl font-black text-gray-800">Halo, Teknisi!</h3>
                                        <p className="text-gray-500 text-sm mt-2">Daftar tugas akan muncul di sini saat Admin memberikan orderan.</p>
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>

                    {/* MODAL CATAT TRANSAKSI KAS */}
                    {showFinanceModal && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
                                <div className="bg-gray-50 border-b border-gray-100 p-5 flex justify-between items-center">
                                    <h3 className="font-black text-lg text-gray-800">Catat Transaksi</h3>
                                    <button onClick={() => setShowFinanceModal(false)} className="text-gray-400 hover:text-gray-600"><i className="fa-solid fa-xmark text-xl"></i></button>
                                </div>
                                <form onSubmit={handleAddTransaction} className="p-5 space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 block mb-1">Tanggal</label>
                                        <input type="date" name="date" required defaultValue={new Date().toISOString().split('T')[0]} className="w-full border border-gray-200 p-3 rounded-xl outline-none focus:ring-1 focus:ring-red-500" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-xs font-bold text-gray-500 block mb-1">Jenis</label>
                                            <select name="type" className="w-full border border-gray-200 p-3 rounded-xl font-bold outline-none focus:ring-1 focus:ring-red-500">
                                                <option value="in">Pemasukan (+)</option>
                                                <option value="out">Pengeluaran (-)</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-gray-500 block mb-1">Sumber Kas</label>
                                            <select name="category" className="w-full border border-gray-200 p-3 rounded-xl font-bold outline-none focus:ring-1 focus:ring-red-500">
                                                <option value="Kas Berjalan">Kas Berjalan</option>
                                                <option value="Kas Tetap">Kas Tetap</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 block mb-1">Nominal (Rp)</label>
                                        <input type="number" name="amount" required placeholder="Contoh: 500000" className="w-full border border-gray-200 p-3 rounded-xl font-black text-lg outline-none focus:ring-1 focus:ring-red-500" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 block mb-1">Keterangan / Keperluan</label>
                                        <input type="text" name="desc" required placeholder="Contoh: Beli alat..." className="w-full border border-gray-200 p-3 rounded-xl outline-none focus:ring-1 focus:ring-red-500" />
                                    </div>
                                    <button type="submit" className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition-colors mt-2">Simpan Transaksi</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL DETAIL KAS KHUSUS */}
                    {showCashDetailModal.isOpen && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[80vh] flex flex-col shadow-2xl">
                                <div className={`p-5 flex justify-between items-start rounded-t-2xl text-white ${showCashDetailModal.type === 'Kas Berjalan' ? 'bg-blue-600' : 'bg-red-600'}`}>
                                    <div>
                                        <h3 className="font-black text-xl mb-1">Detail {showCashDetailModal.type}</h3>
                                        <p className="opacity-80 text-xs font-medium">Histori dan Edit Transaksi Kategori Ini.</p>
                                    </div>
                                    <button onClick={() => setShowCashDetailModal({ isOpen: false, type: null })} className="bg-white/20 p-2 rounded-full hover:bg-white/30"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="p-5 overflow-y-auto flex-1 bg-gray-50 divide-y divide-gray-100 bg-white">
                                    {transactions.filter(t => t.category === showCashDetailModal.type).map(trx => (
                                        <div key={trx.id} className="py-3 flex justify-between items-center group">
                                            <div>
                                                <p className="font-bold text-gray-800 text-sm">{trx.description}</p>
                                                <p className="text-xs text-gray-500">{trx.date}</p>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <div className={`font-black text-sm ${trx.type === 'in' ? 'text-green-600' : 'text-red-600'}`}>
                                                    {trx.type === 'in' ? '+' : '-'}{formatRupiah(trx.amount)}
                                                </div>
                                                <button onClick={() => { setShowCashDetailModal({ isOpen: false, type: null }); handleDeleteTransaction(trx.id); }} className="text-gray-400 hover:text-red-600 px-2 opacity-0 group-hover:opacity-100 transition-opacity"><i className="fa-solid fa-trash"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                    {transactions.filter(t => t.category === showCashDetailModal.type).length === 0 && (
                                        <div className="py-8 text-center text-gray-500 text-sm font-medium">Belum ada transaksi di kategori ini.</div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL TAMBAH TEKNISI */}
                    {showTechModal && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl">
                                <div className="p-5 border-b border-gray-100 flex justify-between items-center">
                                    <h3 className="font-black text-lg text-gray-800">Tambah Teknisi Baru</h3>
                                    <button onClick={() => setShowTechModal(false)} className="text-gray-400 hover:text-gray-600"><i className="fa-solid fa-xmark text-xl"></i></button>
                                </div>
                                <form onSubmit={handleAddTechnician} className="p-5 space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 block mb-1">Nama Lengkap / Panggilan</label>
                                        <input type="text" name="name" required placeholder="Contoh: Agus..." className="w-full border border-gray-200 p-3 rounded-xl outline-none focus:ring-1 focus:ring-red-500" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 block mb-1">Nomor WhatsApp Aktif</label>
                                        <input type="text" name="phone" required placeholder="Contoh: 0812..." className="w-full border border-gray-200 p-3 rounded-xl outline-none focus:ring-1 focus:ring-red-500" />
                                    </div>
                                    <button type="submit" className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl mt-4 transition-colors">
                                        Simpan & Buat Link Akses
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
