<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servisika - Sistem Manajemen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Khusus untuk tampilan invoice (Print Mode) */
        @media print {
            body * { visibility: hidden; }
            #invoice-print-area, #invoice-print-area * { visibility: visible; }
            #invoice-print-area { position: absolute; left: 0; top: 0; width: 100%; padding: 0; }
            .no-print { display: none !important; }
        }
        .invoice-table-container { overflow-x: auto; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // GANTI DENGAN URL DAN KEY SUPABASE MILIKMU (Sesuai yang kamu berikan sebelumnya)
        const SUPABASE_URL = 'https://fpvnlwcjnmfiyrlbhgvi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdm5sd2Nqbm1maXlybGJoZ3ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1ODA0ODksImV4cCI6MjEwMDE1NjQ4OX0.Y5eBJEjxfOEv0ES-LUYfY6aP7zaRIdp5L2XAzvLZLks';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const App = () => {
            const [isInitialLoading, setIsInitialLoading] = React.useState(true);
            const [isSaving, setIsSaving] = React.useState(false);

            // AUTH STATE
            const [userRole, setUserRole] = React.useState(null); // 'admin' atau 'tech_ID'
            const [loggedInUser, setLoggedInUser] = React.useState(null); // Menyimpan objek data user
            const [loginInput, setLoginInput] = React.useState('');
            const [loginError, setLoginError] = React.useState('');

            // UI STATE
            const [activeTab, setActiveTab] = React.useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = React.useState(false);
            const [isBosMode, setIsBosMode] = React.useState(false); // Mode Laporan Ringkas

            // DATA STATE
            const [orders, setOrders] = React.useState([]);
            const [technicians, setTechnicians] = React.useState([]);
            const [finance, setFinance] = React.useState({ kasBerjalan: 0, kasTetap: 0, transactions: [] });

            // MODAL STATE
            const [showOrderModal, setShowOrderModal] = React.useState(false);
            const [selectedOrder, setSelectedOrder] = React.useState(null);
            const [showFinanceModal, setShowFinanceModal] = React.useState(false);
            const [showTechModal, setShowTechModal] = React.useState(false);
            const [showCashDetailModal, setShowCashDetailModal] = React.useState({ isOpen: false, type: null });
            
            // FILTER STATE
            const [orderFilterTab, setOrderFilterTab] = React.useState('aktif'); // aktif | arsip
            const [financeSearch, setFinanceSearch] = React.useState('');

            React.useEffect(() => {
                const checkLogin = async () => {
                    // Cek magic link / URL parameters
                    const urlParams = new URLSearchParams(window.location.search);
                    const techCode = urlParams.get('tech');
                    const invoiceId = urlParams.get('invoice');
                    const isBos = urlParams.get('mode') === 'bos';

                    if(isBos) {
                        setIsBosMode(true);
                        setUserRole('bos');
                        fetchData();
                        return;
                    }

                    if (invoiceId) {
                        setUserRole('client_invoice');
                        fetchSingleInvoice(invoiceId);
                        return;
                    }

                    if (techCode) {
                        await attemptLogin(techCode);
                        return;
                    }

                    // Cek LocalStorage (Sistem Ingat Login)
                    const savedRole = localStorage.getItem('svsk_role');
                    const savedUser = localStorage.getItem('svsk_user');
                    if (savedRole) {
                        setUserRole(savedRole);
                        if (savedUser) setLoggedInUser(JSON.parse(savedUser));
                        fetchData();
                    } else {
                        setIsInitialLoading(false);
                    }
                };
                checkLogin();
            }, []);

            const attemptLogin = async (codeStr) => {
                setIsInitialLoading(true);
                setLoginError('');
                
                if (codeStr === 'serviceika_112') {
                    // Sukses Login Admin
                    setUserRole('admin');
                    setLoggedInUser({ name: 'Admin Utama' });
                    localStorage.setItem('svsk_role', 'admin');
                    localStorage.setItem('svsk_user', JSON.stringify({ name: 'Admin Utama' }));
                    await fetchData();
                } else if (codeStr.startsWith('TECH_')) {
                    // Cek Teknisi ke DB
                    const { data, error } = await supabase.from('technicians').select('*').eq('access_code', codeStr).single();
                    if (data) {
                        setUserRole('teknisi');
                        setLoggedInUser(data);
                        localStorage.setItem('svsk_role', 'teknisi');
                        localStorage.setItem('svsk_user', JSON.stringify(data));
                        await fetchData();
                    } else {
                        setLoginError('Kode akses Teknisi tidak valid atau sudah dihapus.');
                        setIsInitialLoading(false);
                    }
                } else {
                    setLoginError('PIN atau Kode Akses salah.');
                    setIsInitialLoading(false);
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('svsk_role');
                localStorage.removeItem('svsk_user');
                setUserRole(null);
                setLoggedInUser(null);
                window.location.href = '/'; // Reset URL
            };

            const fetchData = async () => {
                try {
                    // Fetch Orders
                    const { data: ordData } = await supabase.from('orders').select('*, order_parts(*)').order('date', { ascending: false });
                    if(ordData) setOrders(ordData);

                    // Fetch Technicians
                    const { data: techData } = await supabase.from('technicians').select('*').order('created_at', { ascending: false });
                    if(techData) setTechnicians(techData);

                    // Fetch Finance
                    const { data: finData } = await supabase.from('transactions').select('*').order('date', { ascending: false });
                    if (finData) {
                        let kasBerjalan = 0;
                        let kasTetap = 0;
                        finData.forEach(t => {
                            if (t.category === 'Kas Berjalan') {
                                kasBerjalan += (t.type === 'in' ? Number(t.amount) : -Number(t.amount));
                            } else {
                                kasTetap += (t.type === 'in' ? Number(t.amount) : -Number(t.amount));
                            }
                        });
                        setFinance({ kasBerjalan, kasTetap, transactions: finData });
                    }
                } catch (error) {
                    console.error("Error fetching data:", error);
                } finally {
                    setIsInitialLoading(false);
                }
            };

            const fetchSingleInvoice = async (id) => {
                const { data } = await supabase.from('orders').select('*, order_parts(*)').eq('id', id).single();
                if (data) {
                    setSelectedOrder(data);
                }
                setIsInitialLoading(false);
            };

            const formatRupiah = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num || 0);
            
            const cleanPhone = (phone) => {
                if(!phone) return "";
                let cleaned = phone.replace(/\D/g, ''); // Hapus semua kecuali angka
                if (cleaned.startsWith('0')) cleaned = '62' + cleaned.substring(1);
                return cleaned;
            };

            const generateWABoilerplate = (phone, text) => `https://api.whatsapp.com/send?phone=${cleanPhone(phone)}&text=${encodeURIComponent(text)}`;

            const copyToClipboard = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert('Tersalin ke clipboard!');
            };

            const autoFormatNumber = (e) => {
                // Menghilangkan titik sebelum disimpan ke raw value
                let val = e.target.value.replace(/\./g, '');
                if (val !== "") {
                     e.target.value = new Intl.NumberFormat('id-ID').format(val);
                }
            };

            const handleCreateOrder = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const formData = new FormData(e.target);
                const technician_name = formData.get('technician');

                const newOrder = {
                    date: formData.get('date'), customer: formData.get('customer'),
                    phone: formData.get('phone'), address: formData.get('address'),
                    unit: formData.get('unit'), issue: formData.get('issue'),
                    technician_name: technician_name === '-- Belum Ditugaskan --' ? null : technician_name, 
                    status: 'Proses',
                    time_estimate: formData.get('time_estimate') || '',
                    order_id_text: 'ORD-' + Math.floor(Math.random() * 10000)
                };

                const { data, error } = await supabase.from('orders').insert([newOrder]).select();
                if (!error && data) {
                    const defaultPart = { order_id: data[0].id, name: 'Jasa Kunjungan & Pengecekan', price: 250000, warranty_months: 0, is_estimate: false };
                    await supabase.from('order_parts').insert([defaultPart]);
                    await fetchData();
                    setShowOrderModal(false);
                } else {
                    alert('Gagal membuat order.');
                }
                setIsSaving(false);
            };

            const handleUpdateOrder = async (updatedOrder) => {
                setIsSaving(true);
                
                // Update tabel orders
                const orderData = { ...updatedOrder };
                delete orderData.order_parts; // Hapus relasi sebelum update ke tabel utama
                
                await supabase.from('orders').update(orderData).eq('id', updatedOrder.id);
                
                // Hapus parts lama & insert yang baru
                await supabase.from('order_parts').delete().eq('order_id', updatedOrder.id);
                const newParts = updatedOrder.order_parts.map(p => ({
                    order_id: updatedOrder.id,
                    name: p.name,
                    price: typeof p.price === 'string' ? p.price.replace(/\./g, '') : p.price,
                    warranty_months: p.warranty_months || 0,
                    is_estimate: p.is_estimate || false,
                    estimate_text: p.estimate_text || ''
                }));
                if (newParts.length > 0) {
                    await supabase.from('order_parts').insert(newParts);
                }

                // Jika status LUNAS, masukkan ke keuangan OTOMATIS (hanya admin yang trigger lunas)
                if (updatedOrder.status === 'Lunas' && userRole === 'admin') {
                    const totalTagihan = updatedOrder.order_parts.reduce((sum, p) => p.is_estimate ? sum : sum + Number(p.price || 0), 0);
                    const newTrx = {
                        date: new Date().toISOString().split('T')[0],
                        description: `Pembayaran Lunas - ${updatedOrder.customer} (${updatedOrder.order_id_text})`,
                        amount: totalTagihan,
                        type: 'in',
                        category: 'Kas Berjalan'
                    };
                    await supabase.from('transactions').insert([newTrx]);
                }

                await fetchData();
                setShowOrderModal(false);
                setIsSaving(false);
            };

            const handleDeleteOrder = async (id) => {
                if(window.confirm('Yakin ingin menghapus order ini beserta rinciannya?')) {
                    setIsSaving(true);
                    await supabase.from('orders').delete().eq('id', id);
                    await fetchData();
                    setShowOrderModal(false);
                    setIsSaving(false);
                }
            };

            const handleAddTechnician = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const formData = new FormData(e.target);
                const name = formData.get('name');
                const phone = formData.get('phone');
                const access_code = 'TECH_' + Math.random().toString(36).substring(2, 6).toUpperCase();

                const { data, error } = await supabase.from('technicians').insert([{ name, phone, access_code }]).select();
                if (!error && data) {
                    setTechnicians([data[0], ...technicians]);
                    setShowTechModal(false);
                } else {
                    alert('Gagal menambah teknisi. Periksa koneksi!');
                }
                setIsSaving(false);
            };

            const handleDeleteTechnician = async (id) => {
                if(window.confirm('Hapus teknisi ini?')) {
                    await supabase.from('technicians').delete().eq('id', id);
                    setTechnicians(technicians.filter(t => t.id !== id));
                }
            };

            const handleAddTransaction = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const formData = new FormData(e.target);
                const trx = {
                    date: formData.get('date'),
                    description: formData.get('description'),
                    amount: formData.get('amount').replace(/\./g, ''),
                    type: formData.get('type'),
                    category: formData.get('category')
                };
                await supabase.from('transactions').insert([trx]);
                await fetchData();
                setShowFinanceModal(false);
                setIsSaving(false);
            };

            const handleDeleteTransaction = async (id) => {
                if(window.confirm('Hapus riwayat transaksi ini? Saldo akan disesuaikan.')) {
                    await supabase.from('transactions').delete().eq('id', id);
                    await fetchData();
                }
            };

            if (isInitialLoading) {
                return (
                    <div className="h-screen flex items-center justify-center bg-slate-900">
                        <div className="text-center">
                            <i className="fa-solid fa-circle-notch fa-spin text-4xl text-red-600 mb-4"></i>
                            <p className="text-white font-bold animate-pulse">Menghubungkan ke Sistem...</p>
                        </div>
                    </div>
                );
            }

            if (!userRole) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-slate-800 p-4 relative overflow-hidden">
                        {/* Background Decoration */}
                        <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-red-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20"></div>
                        
                        <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden relative z-10 fade-in">
                            <div className="bg-red-700 p-8 text-center relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-white opacity-10 rounded-full -mr-10 -mt-10 blur-xl"></div>
                                <i className="fa-solid fa-wrench text-white text-5xl mb-3 drop-shadow-md"></i>
                                <h1 className="text-3xl font-black text-white tracking-tight">SERVISIKA</h1>
                                <p className="text-red-200 text-sm font-medium mt-1">Portal Manajemen Internal</p>
                            </div>
                            <form className="p-8 space-y-6" onSubmit={(e) => { e.preventDefault(); attemptLogin(loginInput); }}>
                                {loginError && (
                                    <div className="bg-red-50 border border-red-200 text-red-600 p-3 rounded-xl text-sm font-bold flex items-center gap-2">
                                        <i className="fa-solid fa-circle-exclamation"></i> {loginError}
                                    </div>
                                )}
                                <div>
                                    <label className="block text-xs font-black text-slate-400 uppercase tracking-widest ml-1 mb-2">PIN / Kode Akses</label>
                                    <div className="relative">
                                        <i className="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                        <input type="password" value={loginInput} onChange={e => setLoginInput(e.target.value)} placeholder="Masukkan kode..." className="w-full bg-slate-50 border-2 border-slate-200 text-slate-800 font-bold p-4 pl-12 rounded-xl focus:border-red-500 focus:bg-white outline-none transition-all" required />
                                    </div>
                                    <p className="text-[10px] text-slate-400 mt-2 ml-1 font-medium"><i className="fa-solid fa-info-circle mr-1"></i>Teknisi gunakan kode akses yang diberikan Admin.</p>
                                </div>
                                <button type="submit" className="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl shadow-lg shadow-red-600/30 transition-transform active:scale-95">
                                    Masuk ke Sistem <i className="fa-solid fa-arrow-right ml-1"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (userRole === 'client_invoice' && selectedOrder) {
                return (
                    <div className="min-h-screen bg-slate-100 p-4 sm:p-8 font-sans text-slate-800">
                        <div className="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden fade-in relative" id="invoice-print-area">
                            {/* Decorative Header Bar */}
                            <div className="h-3 w-full bg-gradient-to-r from-red-600 to-red-800"></div>
                            
                            <div className="p-8 sm:p-12">
                                {/* Header Invoice */}
                                <div className="flex flex-col md:flex-row justify-between items-start gap-6 border-b-2 border-slate-100 pb-8 mb-8">
                                    <div>
                                        <h1 className="text-3xl font-black text-red-700 tracking-tight flex items-center gap-2">
                                            <i className="fa-solid fa-wrench"></i> SERVISIKA
                                        </h1>
                                        <p className="text-sm font-medium text-slate-500 mt-1">Layanan Servis Alat Fitness Profesional</p>
                                    </div>
                                    <div className="md:text-right">
                                        <h2 className="text-2xl font-black text-slate-800 uppercase tracking-widest">INVOICE / TAGIHAN</h2>
                                        <p className="font-bold text-slate-600 mt-2">No: <span className="text-slate-800">{selectedOrder.order_id_text}</span></p>
                                        <p className="font-bold text-slate-600">Tanggal: <span className="text-slate-800">{new Date(selectedOrder.date).toLocaleDateString('id-ID', {day:'numeric',month:'long',year:'numeric'})}</span></p>
                                    </div>
                                </div>

                                {/* Info Klien & Pengerjaan */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                    <div className="bg-slate-50 p-5 rounded-xl border border-slate-100">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Klien (Ditagihkan Kepada):</p>
                                        <p className="font-black text-lg text-slate-800">{selectedOrder.customer}</p>
                                        <p className="text-sm text-slate-600 font-medium mt-1">{selectedOrder.address}</p>
                                        {selectedOrder.phone && <p className="text-sm text-slate-600 font-bold mt-2 flex items-center gap-2"><i className="fa-brands fa-whatsapp text-green-500"></i> {selectedOrder.phone}</p>}
                                    </div>
                                    <div className="bg-slate-50 p-5 rounded-xl border border-slate-100 md:text-right">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Detail Pengerjaan:</p>
                                        <p className="font-black text-lg text-slate-800">{selectedOrder.unit}</p>
                                        <p className="text-sm text-slate-600 font-medium mt-1">Teknisi: <span className="font-bold">{selectedOrder.technician_name || '-'}</span></p>
                                        <p className="text-sm text-slate-600 font-medium mt-1">Status: <span className={`font-black ${selectedOrder.status === 'Lunas' ? 'text-green-600' : 'text-red-600'}`}>{selectedOrder.status.toUpperCase()}</span></p>
                                    </div>
                                </div>

                                {/* Tabel Rincian */}
                                <div className="invoice-table-container mb-8 border border-slate-200 rounded-xl overflow-hidden">
                                    <table className="w-full text-left min-w-[500px]">
                                        <thead className="bg-slate-100">
                                            <tr>
                                                <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest">Deskripsi (Jasa & Sparepart)</th>
                                                <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest text-center w-24">Garansi</th>
                                                <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest text-right w-40">Harga (Rp)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {selectedOrder.order_parts.map((p, idx) => (
                                                <tr key={idx}>
                                                    <td className="p-4 font-bold text-slate-800 text-sm">{p.name} {p.is_estimate && <span className="ml-2 bg-yellow-100 text-yellow-700 text-[10px] px-2 py-0.5 rounded uppercase">Estimasi</span>}</td>
                                                    <td className="p-4 font-bold text-slate-600 text-sm text-center">{p.warranty_months > 0 ? `${p.warranty_months} Bln` : '-'}</td>
                                                    <td className="p-4 font-black text-slate-800 text-right">
                                                        {p.is_estimate ? p.estimate_text : formatRupiah(p.price)}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                        <tfoot className="bg-slate-800 text-white">
                                            <tr>
                                                <td colSpan="2" className="p-4 text-right font-black uppercase tracking-widest text-sm text-slate-300">Total Tagihan:</td>
                                                <td className="p-4 text-right font-black text-xl">
                                                    {formatRupiah(selectedOrder.order_parts.reduce((sum, p) => p.is_estimate ? sum : sum + Number(p.price), 0))}
                                                </td>
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>

                                {/* Informasi Pembayaran & Tanda Tangan */}
                                <div className="flex flex-col md:flex-row justify-between items-end gap-8 mt-12">
                                    <div className="w-full md:w-auto">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Informasi Pembayaran</p>
                                        <p className="font-bold text-slate-700 text-sm mb-3">Metode: <span className="text-slate-900">Transfer / Cash</span></p>
                                        <div className="bg-blue-50 border border-blue-100 p-4 rounded-xl inline-block w-full sm:w-auto text-left">
                                            <div className="flex flex-col sm:flex-row sm:items-center gap-3 mb-1">
                                                <span className="font-black text-2xl text-blue-900 tracking-wider">638 - 042 - 8651</span>
                                                <button onClick={() => copyToClipboard('6380428651')} className="no-print bg-white border border-blue-200 text-blue-700 hover:bg-blue-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors flex items-center justify-center gap-1 shadow-sm w-fit">
                                                    <i className="fa-regular fa-copy"></i> Salin Rekening
                                                </button>
                                            </div>
                                            <p className="font-bold text-blue-800 text-sm">A.n: Saepul Anwar (BCA)</p>
                                        </div>
                                    </div>
                                    <div className="text-center w-48 relative">
                                        <p className="text-xs font-bold text-slate-500 mb-2">Hormat Kami,</p>
                                        {/* TTD Diperbesar dan digeser ke atas sedikit */}
                                        <img src="https://i.imghippo.com/files/xW8261yx.png" alt="TTD A APEP" className="w-32 mx-auto mix-blend-multiply opacity-90 -my-4 relative z-10" />
                                        <div className="border-t-2 border-slate-300 w-full pt-2 relative z-20 bg-white">
                                            <p className="font-black text-sm text-slate-800">Admin Servisika</p>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="mt-16 text-center no-print">
                                    <button onClick={() => window.print()} className="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2 mx-auto">
                                        <i className="fa-solid fa-print"></i> Cetak / Simpan PDF
                                    </button>

                                    </div>
                                    <div className="pt-4 mt-2">
                                        <button type="submit" disabled={isSaving} className="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl shadow-lg shadow-red-600/30 transition-transform active:scale-95 disabled:opacity-50">
                                            {isSaving ? 'Menyimpan...' : 'Simpan Teknisi'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Order Detail */}
                    {showOrderModal && (
                        <div className="fixed inset-0 bg-slate-900/70 z-50 flex flex-col items-center justify-end sm:justify-center p-0 sm:p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-t-3xl sm:rounded-3xl w-full max-w-4xl max-h-[90vh] flex flex-col shadow-2xl relative overflow-hidden">
                                {/* Header Modal - Lengket di atas */}
                                <div className="bg-slate-50 border-b border-slate-200 p-5 flex justify-between items-center shrink-0">
                                    <div>
                                        <h3 className="font-black text-lg text-slate-800">{selectedOrder ? 'Kelola Detail Pengerjaan' : 'Buat Order Baru'}</h3>
                                        {selectedOrder && <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">{selectedOrder.order_id_text} &bull; {selectedOrder.customer}</p>}
                                    </div>
                                    <button onClick={() => setShowOrderModal(false)} className="bg-white w-8 h-8 rounded-full border border-slate-200 flex items-center justify-center text-slate-500 hover:text-red-600 shadow-sm"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                
                                {/* Body Modal - Bisa di-scroll */}
                                <form id="orderForm" className="p-6 overflow-y-auto flex-1 space-y-8" onSubmit={(e) => {
                                    e.preventDefault();
                                    if(selectedOrder) handleUpdateOrder(selectedOrder);
                                    else handleCreateOrder(e);
                                }}>
                                    {/* Status Section (Kalau Edit) */}
                                    {selectedOrder && (
                                        <div className="bg-slate-50 border-2 border-slate-200 p-5 rounded-2xl relative">
                                            <label className="absolute -top-3 left-4 bg-white px-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">Jadwal / Progres Saat Ini</label>
                                            <select 
                                                value={selectedOrder.status} 
                                                onChange={e => setSelectedOrder({...selectedOrder, status: e.target.value})} 
                                                className="w-full bg-transparent font-black text-lg outline-none cursor-pointer text-slate-800"
                                            >
                                                <option value="Proses">Sedang Diproses / Baru</option>
                                                <option value="Pending">Tertunda (Tunggu Sparepart / Alat)</option>
                                                <option value="Jadwal Ulang">Jadwal Ulang (Re-Schedule)</option>
                                                <option value="Pengerjaan Lanjutan">Pengerjaan Lanjutan (Part 2)</option>
                                                <option value="Selesai (Blm Bayar)">Pengerjaan Selesai (Belum Lunas)</option>
                                                {userRole === 'admin' && <option value="Lunas">SELESAI & LUNAS (Masuk Kas)</option>}
                                                {userRole === 'admin' && <option value="Komplain (Garansi)">Komplain (Tindak Lanjut Garansi)</option>}
                                                <option value="Batal">Batal / Cancel</option>
                                            </select>
                                            {userRole === 'admin' && selectedOrder.status === 'Lunas' && <p className="text-xs font-bold text-green-600 mt-2"><i className="fa-solid fa-circle-info mr-1"></i>Total uang akan otomatis dimasukkan ke Arus Kas Berjalan saat disimpan.</p>}
                                        </div>
                                    )}

                                    {/* Info Klien Section */}
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                        <div className="sm:col-span-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Nama Klien / Instansi</label>
                                            <input type="text" name="customer" required defaultValue={selectedOrder?.customer} onChange={e => selectedOrder && setSelectedOrder({...selectedOrder, customer: e.target.value})} className="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold outline-none focus:border-red-500 text-slate-700 bg-slate-50" disabled={userRole==='teknisi'} />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Nomor WhatsApp</label>
                                            <input type="text" name="phone" defaultValue={selectedOrder?.phone} onChange={e => selectedOrder && setSelectedOrder({...selectedOrder, phone: e.target.value})} className="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold outline-none focus:border-red-500 text-slate-700 bg-slate-50" disabled={userRole==='teknisi'} />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Tanggal Kunjungan</label>
                                            <input type="date" name="date" required defaultValue={selectedOrder?.date || new Date().toISOString().split('T')[0]} onChange={e => selectedOrder && setSelectedOrder({...selectedOrder, date: e.target.value})} className="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold outline-none focus:border-red-500 text-slate-700 bg-slate-50" disabled={userRole==='teknisi'} />
                                        </div>
                                        <div className="sm:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-5">
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Teknisi Tugas</label>
                                                <select name="technician" defaultValue={selectedOrder?.technician_name || '-- Belum Ditugaskan --'} onChange={e => selectedOrder && setSelectedOrder({...selectedOrder, technician_name: e.target.value === '-- Belum Ditugaskan --' ? null : e.target.value})} className="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold outline-none focus:border-red-500 text-slate-700 bg-slate-50" disabled={userRole==='teknisi'}>
                                                    <option>-- Belum Ditugaskan --</option>
                                                    {technicians.map(t => <option key={t.id} value={t.name}>{t.name}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Estimasi Waktu (Cth: 08:00 - 10:00)</label>
                                                <input type="text" name="time_estimate" placeholder="00:00 - 00:00" defaultValue={selectedOrder?.time_estimate} onChange={e => selectedOrder && setSelectedOrder({...selectedOrder, time_estimate: e.target.value})} className="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold outline-none focus:border-red-500 text-slate-700 bg-slate-50" disabled={userRole==='teknisi'} />
                                            </div>
                                        </div>
                                        <div className="sm:col-span-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Alamat Lengkap</label>
                                            <textarea name="address" rows="2" required defaultValue={selectedOrder?.address} onChange={e => selectedOrder && setSelectedOrder({...selectedOrder, address: e.target.value})} className="w-full border-2 border-slate-200 p-3.5 rounded-xl font-medium outline-none focus:border-red-500 text-slate-700 bg-slate-50 resize-none" disabled={userRole==='teknisi'}></textarea>
                                        </div>
                                    </div>

                                    {/* Upload Bukti (Visual Khusus Teknisi) */}
                                    {selectedOrder && (
                                        <div className="border-2 border-dashed border-slate-300 rounded-2xl p-6 text-center hover:bg-slate-50 cursor-pointer transition-colors relative">
                                            <label className="absolute -top-3 left-4 bg-white px-2 text-[10px] font-black text-slate-400 uppercase tracking-widest"><i className="fa-solid fa-link"></i> Bukti Pengerjaan</label>
                                            <i className="fa-solid fa-cloud-arrow-up text-4xl text-slate-300 mb-2"></i>
                                            <p className="font-bold text-slate-700 text-sm">Ketuk untuk pilih Foto / Video (Maks 50MB)</p>
                                            <p className="text-xs text-slate-400 mt-1">Sistem Storage belum diaktifkan di tahap ini.</p>
                                        </div>
                                    )}

                                    {/* Rincian Jasa & Sparepart Section */}
                                    {selectedOrder && (
                                        <div>
                                            <div className="flex justify-between items-center mb-3">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1"><i className="fa-solid fa-list-check"></i> Rincian Jasa & Sparepart</label>
                                                <button type="button" onClick={() => setSelectedOrder({...selectedOrder, order_parts: [...selectedOrder.order_parts, {name: '', price: 0, warranty_months: 0, is_estimate: false, estimate_text: ''}]})} className="text-[10px] font-black text-red-600 uppercase tracking-widest bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg transition-colors border border-red-100 flex items-center gap-1"><i className="fa-solid fa-plus"></i> Tambah Baris</button>
                                            </div>
                                            <div className="bg-white border-2 border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                                                {selectedOrder.order_parts.map((p, idx) => (
                                                    <div key={idx} className="flex flex-col sm:flex-row p-4 gap-4 border-b border-slate-100 last:border-b-0 items-start sm:items-center bg-slate-50/50">
                                                        <div className="flex-1 w-full">
                                                            <label className="text-[9px] text-slate-400 font-black uppercase tracking-widest block mb-1 ml-1">Deskripsi / Nama Part</label>
                                                            <input type="text" value={p.name} onChange={e => {
                                                                const newParts = [...selectedOrder.order_parts];
                                                                newParts[idx].name = e.target.value;
                                                                setSelectedOrder({...selectedOrder, order_parts: newParts});
                                                            }} className="w-full bg-white border border-slate-200 p-3 rounded-xl text-sm font-bold outline-none focus:border-red-400" placeholder="Cth: Perbaikan Mesin" />
                                                        </div>
                                                        <div className="w-full sm:w-1/3">
                                                            <div className="flex justify-between items-center mb-1 ml-1">
                                                                <label className="text-[9px] text-slate-400 font-black uppercase tracking-widest block">Harga (Rp)</label>
                                                                <label className="text-[9px] font-bold text-slate-500 flex items-center gap-1 cursor-pointer">
                                                                    <input type="checkbox" checked={p.is_estimate} onChange={e => {
                                                                         const newParts = [...selectedOrder.order_parts];
                                                                         newParts[idx].is_estimate = e.target.checked;
                                                                         setSelectedOrder({...selectedOrder, order_parts: newParts});
                                                                    }} className="accent-red-500" /> Estimasi?
                                                                </label>
                                                            </div>
                                                            {p.is_estimate ? (
                                                                <input type="text" value={p.estimate_text} onChange={e => {
                                                                    const newParts = [...selectedOrder.order_parts];
                                                                    newParts[idx].estimate_text = e.target.value;
                                                                    setSelectedOrder({...selectedOrder, order_parts: newParts});
                                                                }} className="w-full bg-yellow-50 border border-yellow-200 text-yellow-700 p-3 rounded-xl text-sm font-bold outline-none focus:border-yellow-400" placeholder="Cth: Rp 1 - 1.5 Jt" />
                                                            ) : (
                                                                <input type="text" value={p.price ? new Intl.NumberFormat('id-ID').format(p.price) : ''} onInput={autoFormatNumber} onChange={e => {
                                                                    const newParts = [...selectedOrder.order_parts];
                                                                    newParts[idx].price = e.target.value.replace(/\./g, '');
                                                                    setSelectedOrder({...selectedOrder, order_parts: newParts});
                                                                }} className="w-full bg-white border border-slate-200 p-3 rounded-xl text-sm font-bold outline-none focus:border-red-400" placeholder="0" />
                                                            )}
                                                        </div>
                                                        <div className="w-full sm:w-20">
                                                            <label className="text-[9px] text-slate-400 font-black uppercase tracking-widest block mb-1 text-center">Garansi</label>
                                                            <div className="relative">
                                                                <input type="number" value={p.warranty_months} onChange={e => {
                                                                    const newParts = [...selectedOrder.order_parts];
                                                                    newParts[idx].warranty_months = e.target.value;
                                                                    setSelectedOrder({...selectedOrder, order_parts: newParts});
                                                                }} className="w-full bg-white border border-slate-200 p-3 rounded-xl text-sm font-bold outline-none focus:border-red-400 text-center" />
                                                                <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[9px] font-black text-slate-300 uppercase">Bln</span>
                                                            </div>
                                                        </div>
                                                        <button type="button" onClick={() => {
                                                            const newParts = selectedOrder.order_parts.filter((_, i) => i !== idx);
                                                            setSelectedOrder({...selectedOrder, order_parts: newParts});
                                                        }} className="text-slate-300 hover:text-red-500 transition-colors p-3 mt-4 sm:mt-0 bg-white border border-slate-200 rounded-xl hover:bg-red-50 w-full sm:w-auto flex justify-center"><i className="fa-solid fa-trash"></i></button>
                                                    </div>
                                                ))}
                                                <div className="p-5 bg-slate-800 text-white flex justify-between items-center rounded-b-xl">
                                                    <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">Total Tagihan (Pasti):</span>
                                                    <span className="font-black text-xl">
                                                        {formatRupiah(selectedOrder.order_parts.reduce((sum, p) => p.is_estimate ? sum : sum + Number(p.price || 0), 0))}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    
                                    {!selectedOrder && (
                                        <div className="grid grid-cols-1 gap-5">
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 ml-1">Detail Unit & Kendala Awal</label>
                                                <input type="text" name="unit" required placeholder="Unit (Cth: Treadmill Shaga)" className="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold outline-none mb-3 bg-white" />
                                                <textarea name="issue" rows="2" placeholder="Kendala dilaporkan..." className="w-full border-2 border-slate-200 p-3.5 rounded-xl font-medium outline-none bg-white resize-none"></textarea>
                                            </div>
                                        </div>
                                    )}
                                </form>

                                {/* Footer Modal - Lengket di bawah (Action Buttons) */}
                                <div className="bg-white border-t border-slate-200 p-5 shrink-0 flex flex-col sm:flex-row gap-3 justify-between items-center z-10 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
                                    {selectedOrder ? (
                                        <div className="flex gap-2 w-full sm:w-auto overflow-x-auto pb-2 sm:pb-0 hide-scrollbar">
                                            <button type="button" onClick={() => window.open(`/?invoice=${selectedOrder.id}`, '_blank')} className="shrink-0 bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-3 rounded-xl font-bold text-xs flex items-center gap-2 border border-slate-200 transition-colors">
                                                <i className="fa-solid fa-file-pdf text-red-500"></i> PDF
                                            </button>
                                            <button type="button" onClick={() => copyToClipboard(`${window.location.origin}/?invoice=${selectedOrder.id}`)} className="shrink-0 bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-3 rounded-xl font-bold text-xs flex items-center gap-2 border border-slate-200 transition-colors">
                                                <i className="fa-solid fa-link text-blue-500"></i> Link Invoice
                                            </button>
                                            {userRole === 'admin' && (
                                                <button type="button" onClick={() => {
                                                    const link = `${window.location.origin}/?invoice=${selectedOrder.id}`;
                                                    const waLink = generateWABoilerplate(selectedOrder.phone, `Halo ${selectedOrder.customer}, berikut adalah rincian tagihan Servisika Anda. Silakan klik link di bawah untuk melihat Invoice:\n\n${link}`);
                                                    window.open(waLink, '_blank');
                                                }} className="shrink-0 bg-green-50 hover:bg-green-100 text-green-700 px-4 py-3 rounded-xl font-bold text-xs flex items-center gap-2 border border-green-200 transition-colors">
                                                    <i className="fa-brands fa-whatsapp text-lg"></i> WA Tagihan
                                                </button>
                                            )}
                                        </div>
                                    ) : <div></div>}
                                    
                                    <div className="flex gap-3 w-full sm:w-auto">
                                        {userRole === 'admin' && selectedOrder && (
                                            <button type="button" onClick={() => handleDeleteOrder(selectedOrder.id)} className="flex-1 sm:flex-none bg-red-50 hover:bg-red-100 text-red-600 px-5 py-3 rounded-xl font-bold text-sm transition-colors border border-red-100">
                                                Hapus
                                            </button>
                                        )}
                                        <button type="submit" form="orderForm" disabled={isSaving} className="flex-1 sm:flex-none bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-xl font-black text-sm shadow-lg shadow-red-600/30 transition-transform active:scale-95 disabled:opacity-50">
                                            {isSaving ? 'Menyimpan...' : (selectedOrder ? 'Simpan Perubahan' : 'Buat Order Baru')}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );

            // MAIN RENDER (Jika bukan layars login atau invoice)
            return (
                <div className="h-screen w-full flex overflow-hidden">
                    {renderNav()}
                    <div className={`flex-1 flex flex-col h-full overflow-hidden relative ${!isBosMode ? 'md:ml-64' : ''}`}>
                        {!isBosMode && (
                            <header className="bg-white/90 backdrop-blur border-b border-slate-200 px-4 sm:px-6 py-4 flex items-center justify-between z-30 shrink-0">
                                <div className="flex items-center gap-4">
                                    <button className="md:hidden text-slate-500 hover:text-red-600 bg-slate-100 p-2 rounded-lg" onClick={() => setIsMobileMenuOpen(true)}><i className="fa-solid fa-bars"></i></button>
                                    <div>
                                        <h1 className="text-xl font-black text-slate-800 tracking-tight leading-none">{userRole === 'admin' ? 'Portal Manajemen' : 'Aplikasi Lapangan'}</h1>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">{new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                    </div>
                                </div>
                                {userRole === 'admin' && (
                                    <div className="hidden sm:flex bg-slate-100 px-4 py-2.5 rounded-xl items-center gap-3 w-64 border border-slate-200">
                                        <i className="fa-solid fa-magnifying-glass text-slate-400"></i>
                                        <input type="text" placeholder="Cari data..." className="bg-transparent border-none outline-none text-sm font-bold w-full text-slate-600" />
                                    </div>
                                )}
                            </header>
                        )}
                        <main className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 bg-slate-50">
                            <div className="max-w-7xl mx-auto pb-24 md:pb-8">
                                {isBosMode ? renderDashboard() : (
                                    <>
                                        {activeTab === 'dashboard' && renderDashboard()}
                                        {activeTab === 'jadwal' && renderJadwal()}
                                        {activeTab === 'tim' && renderTim()}
                                        {/* Halaman Galeri disederhanakan dalam prototype ini */}
                                        {activeTab === 'galeri' && (
                                             <div className="space-y-6 fade-in text-center p-10 bg-white rounded-2xl border border-slate-200">
                                                 <i className="fa-solid fa-folder-tree text-6xl text-slate-300 mb-4"></i>
                                                 <h2 className="text-2xl font-black text-slate-800">Folder Galeri & Bukti</h2>
                                                 <p className="text-slate-500 font-medium">Fitur ini akan diintegrasikan dengan sistem Cloud Storage di tahap selanjutnya.</p>
                                             </div>
                                        )}
                                        {/* Arus Kas Placeholder (Karena keterbatasan panjang, difokuskan ke fitur utama yg diminta) */}
                                        {activeTab === 'keuangan' && (
                                             <div className="space-y-6 fade-in text-center p-10 bg-white rounded-2xl border border-slate-200">
                                                 <i className="fa-solid fa-wallet text-6xl text-slate-300 mb-4"></i>
                                                 <h2 className="text-2xl font-black text-slate-800">Manajemen Arus Kas</h2>
                                                 <p className="text-slate-500 font-medium">Data Kas Berjalan: {formatRupiah(finance.kasBerjalan)}</p>
                                             </div>
                                        )}
                                    </>
                                )}
                            </div>
                        </main>
                    </div>
                    {renderModals()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
