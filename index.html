<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servisika Management App</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ef4444; }
        body { -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
    </style>
</head>
<body class="text-slate-800 font-sans selection:bg-red-200 selection:text-red-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // INI ADALAH KUNCI DATABASE SUPABASE KAMU YANG ASLI
        const SUPABASE_URL = 'https://fpvnlwcjnmfiyrlbhgvi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdm5sd2Nqbm1maXlybGJoZ3ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1ODA0ODksImV4cCI6MjEwMDE1NjQ4OX0.Y5eBJEjxfOEv0ES-LUYfY6aP7zaRIdp5L2XAzvLZLks';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            // State Sesi & Login
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [role, setRole] = useState(null); // 'admin' atau 'teknisi'
            const [currentUser, setCurrentUser] = useState(null); // Data teknisi yg login
            const [loginError, setLoginError] = useState('');
            
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isLoading, setIsLoading] = useState(true);

            // State Data Database
            const [transactions, setTransactions] = useState([]);
            const [technicians, setTechnicians] = useState([]);
            const [orders, setOrders] = useState([]);

            // State UI & Filter
            const [dashView, setDashView] = useState('mingguan');
            const [jadwalView, setJadwalView] = useState('list');
            const [financeFilter, setFinanceFilter] = useState({ search: '', category: 'Semua', startDate: '', endDate: '' });

            // State Modals
            const [showOrderModal, setShowOrderModal] = useState(false);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [showFinanceModal, setShowFinanceModal] = useState(false);
            const [showCashDetailModal, setShowCashDetailModal] = useState({ isOpen: false, type: null });
            const [showTechModal, setShowTechModal] = useState(false);

            useEffect(() => {
                const initApp = async () => {
                    setIsLoading(true);
                    try {
                        // Tarik semua data dari Supabase
                        const { data: trxData } = await supabase.from('transactions').select('*').order('date', { ascending: false });
                        if (trxData) setTransactions(trxData);

                        const { data: techData } = await supabase.from('technicians').select('*').order('created_at', { ascending: false });
                        if (techData) setTechnicians(techData);

                        const { data: ordData } = await supabase.from('orders').select('*, order_parts(*)').order('date', { ascending: false });
                        if (ordData) setOrders(ordData);

                        // Cek MAGIC LINK (URL Parameters)
                        const urlParams = new URLSearchParams(window.location.search);
                        const techCode = urlParams.get('tech');
                        
                        if (techCode && techData) {
                            const foundTech = techData.find(t => t.access_code === techCode);
                            if (foundTech) {
                                setIsLoggedIn(true);
                                setRole('teknisi');
                                setCurrentUser(foundTech);
                                // Bersihkan URL agar rapi kembali
                                window.history.replaceState({}, document.title, window.location.pathname);
                            }
                        }
                    } catch (error) {
                        console.error("Gagal load data:", error);
                    } finally {
                        setIsLoading(false);
                    }
                };
                initApp();
            }, []);

            const handleAdminLogin = (e) => {
                e.preventDefault();
                const pin = e.target.pin.value;
                if(pin === 'admin123') {
                    setIsLoggedIn(true);
                    setRole('admin');
                    setCurrentUser({ name: 'Admin Utama' });
                    setLoginError('');
                } else {
                    setLoginError('PIN Admin salah!');
                }
            };

            const handleTechLogin = (e) => {
                e.preventDefault();
                const code = e.target.code.value.trim();
                const foundTech = technicians.find(t => t.access_code === code);
                if(foundTech) {
                    setIsLoggedIn(true);
                    setRole('teknisi');
                    setCurrentUser(foundTech);
                    setLoginError('');
                } else {
                    setLoginError('Kode akses Teknisi tidak ditemukan!');
                }
            };

            const handleLogout = () => {
                if(window.confirm('Keluar dari portal?')) {
                    setIsLoggedIn(false);
                    setRole(null);
                    setCurrentUser(null);
                    setActiveTab('dashboard');
                }
            };

            const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number || 0);

            const kasBerjalan = transactions.filter(t => t.category === 'Kas Berjalan').reduce((sum, t) => t.type === 'in' ? sum + Number(t.amount) : sum - Number(t.amount), 0);
            const kasTetap = transactions.filter(t => t.category === 'Kas Tetap').reduce((sum, t) => t.type === 'in' ? sum + Number(t.amount) : sum - Number(t.amount), 0);

            const filteredTransactions = useMemo(() => {
                return transactions.filter(trx => {
                    const matchSearch = trx.description.toLowerCase().includes(financeFilter.search.toLowerCase());
                    const matchCategory = financeFilter.category === 'Semua' || trx.category === financeFilter.category;
                    const matchStart = financeFilter.startDate ? trx.date >= financeFilter.startDate : true;
                    const matchEnd = financeFilter.endDate ? trx.date <= financeFilter.endDate : true;
                    return matchSearch && matchCategory && matchStart && matchEnd;
                });
            }, [transactions, financeFilter]);

            const handleAddTransaction = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newTrx = {
                    date: formData.get('date'), type: formData.get('type'),
                    category: formData.get('category'), amount: parseFloat(formData.get('amount')),
                    description: formData.get('desc')
                };
                const { data, error } = await supabase.from('transactions').insert([newTrx]).select();
                if (!error && data) {
                    setTransactions([data[0], ...transactions]);
                    setShowFinanceModal(false);
                }
            };

            const handleDeleteTransaction = async (id) => {
                if(window.confirm('Yakin ingin menghapus mutasi ini? Saldo otomatis menyesuaikan.')) {
                    await supabase.from('transactions').delete().eq('id', id);
                    setTransactions(transactions.filter(t => t.id !== id));
                }
            };

            const handleAddTechnician = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const randomCode = 'tech_' + Math.random().toString(36).substring(2, 8);
                const newTech = { name: formData.get('name'), phone: formData.get('phone'), access_code: randomCode };
                
                const { data, error } = await supabase.from('technicians').insert([newTech]).select();
                if (!error && data) {
                    setTechnicians([data[0], ...technicians]);
                    setShowTechModal(false);
                }
            };

            const handleDeleteTechnician = async (id) => {
                if(window.confirm('Hapus teknisi ini secara permanen?')) {
                    await supabase.from('technicians').delete().eq('id', id);
                    setTechnicians(technicians.filter(t => t.id !== id));
                }
            };

            const handleCreateOrder = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newOrder = {
                    date: formData.get('date'), customer: formData.get('customer'),
                    phone: formData.get('phone'), address: formData.get('address'),
                    unit: formData.get('unit'), issue: formData.get('issue'),
                    technician_name: formData.get('technician'), status: 'Proses',
                    order_id_text: 'ORD-' + Math.floor(Math.random() * 10000)
                };
                const { data, error } = await supabase.from('orders').insert([newOrder]).select();
                if (!error && data) {
                    const defaultPart = { order_id: data[0].id, name: 'Jasa Kunjungan & Pengecekan', price: 250000, warranty_months: 0 };
                    await supabase.from('order_parts').insert([defaultPart]);
                    // Refresh orders
                    const { data: ordData } = await supabase.from('orders').select('*, order_parts(*)').order('date', { ascending: false });
                    if(ordData) setOrders(ordData);
                    setShowOrderModal(false);
                }
            };

            const handleSetLunas = async (order) => {
                if(window.confirm(`Set status order ${order.customer} menjadi LUNAS?\n\nDana akan otomatis masuk ke Kas Berjalan.`)) {
                    const totalAmount = (order.order_parts || []).reduce((sum, p) => sum + Number(p.price), 0);
                    
                    await supabase.from('orders').update({ status: 'Lunas' }).eq('id', order.id);
                    
                    if(totalAmount > 0) {
                        const newTrx = {
                            date: new Date().toISOString().split('T')[0],
                            type: 'in', category: 'Kas Berjalan',
                            amount: totalAmount, description: `Pelunasan Order: ${order.customer} (${order.order_id_text})`
                        };
                        const { data } = await supabase.from('transactions').insert([newTrx]).select();
                        if(data) setTransactions([data[0], ...transactions]);
                    }
                    
                    // Refresh orders
                    const { data: ordData } = await supabase.from('orders').select('*, order_parts(*)').order('date', { ascending: false });
                    if(ordData) setOrders(ordData);
                    setShowOrderModal(false);
                }
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
                            <div className="text-center mb-8">
                                <div className="bg-red-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i className="fa-solid fa-wrench text-2xl text-red-600"></i>
                                </div>
                                <h1 className="text-2xl font-black text-slate-800">SERVISIKA</h1>
                                <p className="text-slate-500 text-sm">Portal Manajemen & Teknisi</p>
                            </div>
                            
                            {loginError && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm font-bold text-center mb-6 border border-red-100"><i className="fa-solid fa-circle-exclamation mr-1"></i> {loginError}</div>}
                            
                            <div className="space-y-6">
                                <form onSubmit={handleAdminLogin} className="bg-slate-50 p-5 rounded-xl border border-slate-200">
                                    <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Akses Admin</h3>
                                    <div className="flex gap-2">
                                        <input type="password" name="pin" placeholder="PIN Admin (admin123)" required className="flex-1 p-2.5 rounded-lg border border-slate-300 outline-none focus:border-red-500 text-sm font-bold text-center" />
                                        <button type="submit" className="bg-slate-800 hover:bg-slate-900 text-white px-4 rounded-lg font-bold text-sm transition-colors">Masuk</button>
                                    </div>
                                </form>

                                <div className="relative flex items-center py-2">
                                    <div className="flex-grow border-t border-slate-200"></div>
                                    <span className="flex-shrink-0 mx-4 text-slate-400 text-xs font-medium">Atau</span>
                                    <div className="flex-grow border-t border-slate-200"></div>
                                </div>

                                <form onSubmit={handleTechLogin} className="bg-red-50 p-5 rounded-xl border border-red-100">
                                    <h3 className="text-xs font-bold text-red-400 uppercase tracking-wider mb-3">Akses Teknisi Lapangan</h3>
                                    <input type="text" name="code" placeholder="Kode Akses (cth: tech_abc)" required className="w-full p-2.5 rounded-lg border border-red-200 outline-none focus:border-red-500 text-sm font-bold text-center mb-3 bg-white" />
                                    <button type="submit" className="w-full bg-red-600 hover:bg-red-700 text-white py-2.5 rounded-lg font-bold text-sm transition-colors shadow-sm">Masuk Portal Teknisi</button>
                                </form>
                            </div>
                        </div>
                    </div>
                )
            }

            const Navigation = () => (
                <div className={`fixed inset-y-0 left-0 z-50 w-64 bg-red-700 text-white transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 transition-transform duration-300 shadow-2xl flex flex-col`}>
                    <div className="p-6 flex items-center justify-between border-b border-red-600/50">
                        <div className="flex items-center gap-3">
                            <i className="fa-solid fa-wrench text-xl bg-white/20 p-2 rounded-lg"></i>
                            <h1 className="text-xl font-black tracking-tight">SERVISIKA</h1>
                        </div>
                        <button className="md:hidden text-white/70 hover:text-white" onClick={() => setIsMobileMenuOpen(false)}>
                            <i className="fa-solid fa-xmark text-2xl"></i>
                        </button>
                    </div>

                    <div className="p-4 flex-1 overflow-y-auto">
                        <p className="text-red-200 text-[10px] font-bold uppercase tracking-wider mb-4 px-3">Menu {role === 'admin' ? 'Utama' : 'Teknisi'}</p>
                        <ul className="space-y-2">
                            {role === 'admin' ? (
                                <>
                                    {[{ id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard' },
                                      { id: 'jadwal', icon: 'fa-calendar-days', label: 'Jadwal & Order' },
                                      { id: 'keuangan', icon: 'fa-wallet', label: 'Arus Kas' },
                                      { id: 'tim', icon: 'fa-user-group', label: 'Tim Teknisi' }].map(item => (
                                        <li key={item.id}>
                                            <button onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === item.id ? 'bg-white text-red-700 shadow-md font-bold' : 'text-red-100 hover:bg-red-600/50 font-medium'}`}>
                                                <i className={`fa-solid ${item.icon} w-5 text-center`}></i> <span className="text-sm">{item.label}</span>
                                            </button>
                                        </li>
                                    ))}
                                </>
                            ) : (
                                <>
                                    <li>
                                        <button onClick={() => { setActiveTab('dashboard'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'dashboard' ? 'bg-white text-red-700 shadow-md font-bold' : 'text-red-100 hover:bg-red-600/50 font-medium'}`}>
                                            <i className="fa-solid fa-clipboard-list w-5 text-center"></i> <span className="text-sm">Tugas Saya</span>
                                        </button>
                                    </li>
                                </>
                            )}
                        </ul>
                    </div>
                    
                    <div className="p-5 border-t border-red-600/50 bg-red-800/30 mt-auto">
                        <div className="flex items-center gap-3 mb-4">
                            <div className="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center font-bold">{currentUser.name.charAt(0).toUpperCase()}</div>
                            <div className="overflow-hidden">
                                <p className="font-bold text-sm truncate leading-tight">{currentUser.name}</p>
                                <p className="text-[10px] text-red-200 capitalize">{role}</p>
                            </div>
                        </div>
                        <button onClick={handleLogout} className="w-full text-xs bg-red-900/50 hover:bg-red-900 text-white py-2.5 rounded-xl transition-colors font-bold border border-red-500/30">
                            <i className="fa-solid fa-arrow-right-from-bracket mr-1"></i> Keluar
                        </button>
                    </div>
                </div>
            );

            const renderDashboard = () => (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div><h2 className="text-2xl sm:text-3xl font-black text-slate-800">Overview</h2><p className="text-slate-500 text-sm mt-1">Ringkasan operasional Servisika.</p></div>
                        <button onClick={() => alert('Fitur berbagi laporan Bos (Read-Only) akan dibuat pada tahap update khusus analitik!')} className="w-full sm:w-auto bg-white border border-slate-200 text-slate-700 px-4 py-2.5 rounded-xl text-sm font-bold flex justify-center items-center gap-2 hover:bg-slate-50 shadow-sm">
                            <i className="fa-solid fa-arrow-up-right-from-square"></i> Link Laporan Bos
                        </button>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="glass-panel p-5 rounded-2xl flex items-center gap-4">
                            <div className="bg-blue-100 p-4 rounded-xl text-blue-600 shrink-0"><i className="fa-solid fa-wrench text-xl"></i></div>
                            <div><p className="text-xs text-slate-500 font-bold uppercase">Order Aktif</p><h3 className="text-2xl font-black text-slate-800">{orders.filter(o=>o.status==='Proses' || o.status==='Pending').length}</h3></div>
                        </div>
                        <div className="glass-panel p-5 rounded-2xl flex items-center gap-4">
                            <div className="bg-green-100 p-4 rounded-xl text-green-600 shrink-0"><i className="fa-solid fa-check text-xl"></i></div>
                            <div><p className="text-xs text-slate-500 font-bold uppercase">Selesai/Lunas</p><h3 className="text-2xl font-black text-slate-800">{orders.filter(o=>o.status==='Selesai' || o.status==='Lunas').length}</h3></div>
                        </div>
                        <div className="glass-panel p-5 rounded-2xl flex items-center gap-4">
                            <div className="bg-red-100 p-4 rounded-xl text-red-600 shrink-0"><i className="fa-solid fa-triangle-exclamation text-xl"></i></div>
                            <div><p className="text-xs text-slate-500 font-bold uppercase">Kendala/Pending</p><h3 className="text-2xl font-black text-slate-800">{orders.filter(o=>o.status==='Pending').length}</h3></div>
                        </div>
                        <div className="glass-panel p-5 rounded-2xl flex items-center gap-4">
                            <div className="bg-emerald-100 p-4 rounded-xl text-emerald-600 shrink-0"><i className="fa-solid fa-money-bill-wave text-xl"></i></div>
                            <div className="overflow-hidden">
                                <p className="text-xs text-slate-500 font-bold uppercase truncate">Kas Berjalan</p>
                                <h3 className="text-lg font-black text-slate-800 truncate">{formatRupiah(kasBerjalan)}</h3>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderJadwal = () => (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div><h2 className="text-2xl sm:text-3xl font-black text-slate-800">Jadwal & Order</h2><p className="text-slate-500 text-sm mt-1">Kelola data perbaikan & penugasan.</p></div>
                        <div className="flex gap-2 w-full sm:w-auto">
                            <button onClick={() => setJadwalView(jadwalView === 'list' ? 'calendar' : 'list')} className="bg-white border border-slate-200 text-slate-600 px-4 py-2.5 rounded-xl text-sm font-bold shadow-sm">
                                <i className={`fa-solid ${jadwalView === 'list' ? 'fa-calendar' : 'fa-list'} mr-2`}></i> {jadwalView === 'list' ? 'Kalender' : 'Daftar'}
                            </button>
                            <button onClick={() => { setSelectedOrder(null); setShowOrderModal(true); }} className="flex-1 bg-red-600 text-white px-4 py-2.5 rounded-xl text-sm font-bold shadow-md hover:bg-red-700">
                                <i className="fa-solid fa-plus mr-2"></i> Order Baru
                            </button>
                        </div>
                    </div>

                    <div className="glass-panel rounded-2xl overflow-hidden shadow-sm">
                        {jadwalView === 'list' ? (
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm min-w-[800px]">
                                    <thead className="bg-slate-50/80 text-slate-500 border-b border-slate-200">
                                        <tr>
                                            <th className="p-4 font-bold text-xs uppercase">Tanggal</th>
                                            <th className="p-4 font-bold text-xs uppercase">Klien & Unit</th>
                                            <th className="p-4 font-bold text-xs uppercase">Teknisi</th>
                                            <th className="p-4 font-bold text-xs uppercase">Status</th>
                                            <th className="p-4 font-bold text-xs uppercase text-center">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {orders.map(o => (
                                            <tr key={o.id} className="hover:bg-slate-50/50 transition-colors">
                                                <td className="p-4"><p className="font-bold text-slate-800">{o.date}</p><p className="text-[10px] text-slate-400">{o.order_id_text}</p></td>
                                                <td className="p-4"><p className="font-bold text-slate-800">{o.customer}</p><p className="text-xs text-slate-500 truncate max-w-[200px]">{o.unit}</p></td>
                                                <td className="p-4"><span className="bg-blue-50 text-blue-600 text-xs font-bold px-2 py-1 rounded">{o.technician_name}</span></td>
                                                <td className="p-4">
                                                    <span className={`text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider border ${
                                                        o.status === 'Proses' ? 'bg-yellow-50 text-yellow-700 border-yellow-200' : 
                                                        o.status === 'Lunas' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-slate-100 text-slate-600 border-slate-200'
                                                    }`}>{o.status}</span>
                                                </td>
                                                <td className="p-4 text-center">
                                                    <button onClick={() => { setSelectedOrder(o); setShowOrderModal(true); }} className="text-red-600 bg-red-50 hover:bg-red-600 hover:text-white px-4 py-2 rounded-lg text-xs font-bold transition-colors shadow-sm">Detail & Edit</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        ) : (
                            <div className="p-10 text-center text-slate-400">
                                <i className="fa-regular fa-calendar-xmark text-4xl mb-3"></i>
                                <p className="font-medium">Tampilan Kalender (Tahap Eksekusi Lanjutan)</p>
                            </div>
                        )}
                    </div>
                </div>
            );

            const renderKeuangan = () => (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div><h2 className="text-2xl sm:text-3xl font-black text-slate-800">Arus Kas</h2><p className="text-slate-500 text-sm mt-1">Pantau, catat, dan analisa keuangan.</p></div>
                        <button onClick={() => setShowFinanceModal(true)} className="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-sm flex justify-center items-center gap-2">
                            <i className="fa-solid fa-plus"></i> Catat Transaksi
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

                                    <div><label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Tgl Transaksi</label><input type="date" name="date" required defaultValue={new Date().toISOString().split('T')[0]} className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-emerald-500" /></div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <select name="type" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-emerald-500 bg-slate-50 cursor-pointer">
                                            <option value="in">Pemasukan (+)</option>
                                            <option value="out">Pengeluaran (-)</option>
                                        </select>
                                        <select name="category" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-emerald-500 bg-slate-50 cursor-pointer">
                                            <option value="Kas Berjalan">Kas Berjalan</option>
                                            <option value="Kas Tetap">Kas Tetap</option>
                                        </select>
                                    </div>
                                    <input type="number" name="amount" required placeholder="Nominal Rupiah..." className="w-full border-2 border-slate-200 p-4 rounded-xl font-black text-xl outline-none focus:border-emerald-500" />
                                    <input type="text" name="desc" required placeholder="Keterangan / Keperluan (cth: Beli oli)" className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-emerald-500" />
                                    <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl shadow-md mt-2 transition-colors">Simpan Transaksi</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Detail Kas (Bisa Edit/Hapus dari dalam) */}
                    {showCashDetailModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[85vh] flex flex-col shadow-2xl animate-in zoom-in duration-200">
                                <div className={`p-6 flex justify-between items-start rounded-t-2xl text-white ${showCashDetailModal.type === 'Kas Berjalan' ? 'bg-blue-600' : 'bg-red-600'}`}>
                                    <div><h3 className="font-black text-2xl mb-1">Rincian {showCashDetailModal.type}</h3><p className="text-sm font-medium text-white/80">Kelola riwayat khusus di laci kas ini.</p></div>
                                    <button onClick={() => setShowCashDetailModal({ isOpen: false, type: null })} className="bg-black/10 hover:bg-black/20 p-2 rounded-full transition-colors"><i className="fa-solid fa-xmark text-lg px-1"></i></button>
                                </div>
                                <div className="p-0 overflow-y-auto flex-1 bg-slate-50">
                                    <div className="divide-y divide-slate-100 bg-white">
                                        {transactions.filter(t => t.category === showCashDetailModal.type).map(trx => (
                                            <div key={trx.id} className="p-4 sm:p-5 flex justify-between items-center hover:bg-slate-50 transition-colors">
                                                <div>
                                                    <p className="font-bold text-slate-800 text-sm">{trx.description}</p>
                                                    <p className="text-xs text-slate-400 mt-1 font-medium"><i className="fa-regular fa-calendar mr-1"></i> {trx.date}</p>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <div className={`font-black text-base sm:text-lg ${trx.type === 'in' ? 'text-green-600' : 'text-red-600'}`}>
                                                        {trx.type === 'in' ? '+' : '-'}{formatRupiah(trx.amount)}
                                                    </div>
                                                    <button onClick={() => handleDeleteTransaction(trx.id)} className="text-slate-300 hover:text-red-600 p-2 bg-slate-50 hover:bg-red-50 border border-transparent hover:border-red-100 rounded-lg transition-all"><i className="fa-solid fa-trash"></i></button>
                                                </div>
                                            </div>
                                        ))}
                                        {transactions.filter(t => t.category === showCashDetailModal.type).length === 0 && <div className="py-12 text-center text-slate-400 font-medium">Belum ada transaksi tercatat di kas ini.</div>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Tambah Teknisi */}
                    {showTechModal && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in zoom-in duration-200">
                                <div className="bg-slate-50 border-b border-slate-100 p-5 flex justify-between items-center">
                                    <h3 className="font-black text-lg text-slate-800">Tambah Teknisi</h3>
                                    <button onClick={() => setShowTechModal(false)} className="text-slate-400 hover:text-slate-600 bg-white p-1.5 rounded-lg border border-slate-200"><i className="fa-solid fa-xmark text-lg px-1"></i></button>
                                </div>
                                <form onSubmit={handleAddTechnician} className="p-5 space-y-4">
                                    <div><label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Nama Panggilan</label><input type="text" name="name" required placeholder="Ketik nama..." className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-red-500" /></div>
                                    <div><label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Nomor WhatsApp</label><input type="text" name="phone" required placeholder="Cth: 081234..." className="w-full border-2 border-slate-200 p-3 rounded-xl font-bold outline-none focus:border-red-500" /></div>
                                    <button type="submit" className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3.5 rounded-xl shadow-md mt-4 transition-colors">Buat Akses Link</button>
                                </form>
                            </div>
                        </div>
                    )}
                </>
            );

            if (isLoading) return <div className="h-screen w-full flex flex-col items-center justify-center bg-slate-50"><i className="fa-solid fa-circle-notch fa-spin text-4xl text-red-600 mb-4"></i><p className="font-bold text-slate-500">Menghubungkan ke Database...</p></div>;

            return (
                <div className="h-screen w-full flex overflow-hidden">
                    <Navigation />
                    <div className="flex-1 md:ml-64 flex flex-col h-full overflow-hidden relative bg-slate-50/50">
                        <header className="glass-panel border-b border-slate-200 px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between z-40 relative sticky top-0">
                            <div className="flex items-center gap-3">
                                <button className="md:hidden text-slate-600 bg-slate-100 hover:bg-slate-200 p-2 rounded-lg transition-colors" onClick={() => setIsMobileMenuOpen(true)}><i className="fa-solid fa-bars text-xl"></i></button>
                                <div>
                                    <h1 className="text-lg sm:text-xl font-black text-slate-800 leading-tight">{role === 'admin' ? 'Portal Manajemen' : 'Aplikasi Lapangan'}</h1>
                                    <p className="text-[10px] sm:text-xs text-slate-500 font-medium">{new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                </div>
                            </div>
                            <div className="hidden sm:flex items-center gap-2">
                                <div className="bg-red-50 border border-red-100 px-3 py-1.5 rounded-lg text-xs font-bold text-red-700"><i className="fa-solid fa-circle text-[8px] mr-1 text-green-500 animate-pulse"></i> Database Online</div>
                            </div>
                        </header>
                        <main className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 pb-24">
                            <div className="max-w-6xl mx-auto">
                                {role === 'admin' && activeTab === 'dashboard' && renderDashboard()}
                                {role === 'admin' && activeTab === 'jadwal' && renderJadwal()}
                                {role === 'admin' && activeTab === 'keuangan' && renderKeuangan()}
                                {role === 'admin' && activeTab === 'tim' && renderTim()}
                                {role === 'teknisi' && renderTeknisiPortal()}
                            </div>
                        </main>
                    </div>
                    {renderModals()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
